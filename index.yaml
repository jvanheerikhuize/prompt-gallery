# =============================================================================
# Module Index — tag-role-library
# =============================================================================
# Single entrypoint for consuming repositories.
# Parse this file to discover all available roles and their prompt file paths.
# =============================================================================

module:
  name: tag-role-library
  version: "1.0.0"
  description: >
    A library of structured LLM agent masterprompts. Each role is self-contained
    and paste-and-play — paste into a chat session, inject as an API system prompt,
    or load the file path directly from your agent framework. No external
    infrastructure required.
  license: MIT
  author: "Jerry van Heerikhuize"
  repository: https://github.com/jvanheerikhuize/tag-role-test

# Prompt files available per role.
# - prompt:      Canonical full-length prompt. Most readable; uncompressed.
# - variant:     Always null. Reserved for future use.
# - semanticode: SemantiCode logic stream. Lossless compression (~35% reduction).
#                Directly executable by any advanced LLM.

roles:

  # ---------------------------------------------------------------------------
  # Entertainment
  # ---------------------------------------------------------------------------

  - id: tag
    name: "T.A.G. — Text Adventure Generator"
    slug: tag
    category: entertainment
    version: "2.2"
    status: stable       # stable | beta | deprecated

    files:
      prompt: roles/entertainment/tag/prompt.md
      variant: null
      semanticode: roles/entertainment/tag/prompt-semanticode.md

    description: >
      A stateful text adventure game master. Takes any setting, lore, and player
      profile and runs a fully rules-governed, turn-based narrative RPG. Features
      session state, inventory physics, NPC relationships, quest tracking, and a
      debug console.

    tags:
      - entertainment
      - stateful
      - game-master
      - multi-turn

    usage:
      paste_in: true       # Can be pasted into a chat session
      system_prompt: true  # Can be injected as an API system prompt
      auto_init: true      # Agent initialises itself without user input

    governance:
      risk_tier: low
      ai_tier: minimal
      data_classification: public
      gdpr_special_category: false

    provenance:
      author: "Jerry van Heerikhuize"
      created: "2026-03-11"
      last_updated: "2026-03-14"

  - id: heist
    name: "H.E.I.S.T. — High-stakes Extraction and Infiltration Strategy Tactician"
    slug: heist
    category: entertainment
    version: "1.0"
    status: stable

    files:
      prompt: roles/entertainment/heist/prompt.md
      variant: null
      semanticode: roles/entertainment/heist/prompt-semanticode.md

    description: >
      A cinematic heist game master. Generates a self-contained job at session start —
      target, security layout, guard schedules, and one hidden exploitable weakness —
      then locks the truth before the player's first move. Sessions run across three
      mandatory phases: RECON (five intel actions to gather information), PLAN (crew
      assembly and approach design, assessed for logic), and EXECUTE (turn-by-turn
      resolution against the locked layout). Every job ends in exactly one verdict:
      CLEAN, DIRTY, or BURNED. Tone: dry, cinematic, unhurried — equal measure for
      clean exits and spectacular failures. Language-adaptive.

    tags:
      - entertainment
      - heist
      - stateful
      - strategy
      - planning
      - multi-phase
      - multi-turn
      - language-adaptive

    usage:
      paste_in: true
      system_prompt: true
      auto_init: true      # Generates job brief without user input

    governance:
      risk_tier: low
      ai_tier: minimal
      data_classification: public
      gdpr_special_category: false

    provenance:
      author: "Jerry van Heerikhuize"
      created: "2026-03-18"
      last_updated: "2026-03-18"

  - id: dice
    name: "D.I.C.E. — Detective Investigation and Case Engine"
    slug: dice
    category: entertainment
    version: "1.0"
    status: stable

    files:
