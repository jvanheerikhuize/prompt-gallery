  - id: echo
    name: "E.C.H.O. — Experiential Collaborative Hub Orchestrator"
    slug: echo
    category: entertainment
    version: "1.0"
    status: stable

    files:
      prompt: roles/entertainment/echo/prompt.md
      variant: null
      semanticode: roles/entertainment/echo/prompt-semanticode.md

    description: >
      A multi-player text adventure game system built on a hub-and-spoke architecture.
      One Game Master prompt runs the world; the GM's LLM generates private player prompts
      (spokes) that each player loads into their own LLM session. Supports 14 game types
      (whodunnit, heist, quest, conspiracy, espionage, inheritance, escape_room, rebellion,
      expedition, diplomacy, haunted, shipwreck, tournament, courtroom) — selected by the GM
      or drawn at random. Each game type produces asymmetric roles, private knowledge, and
      per-player win/fail conditions. The GM relays player actions; E.C.H.O. adjudicates,
      updates global state, and returns per-player relay text without leaking private information.
      Dutch output throughout; dry Infocom-style narration.

    tags:
      - entertainment
      - multi-player
      - game-master
      - hub-and-spoke
      - asymmetric-information
      - stateful
      - dutch
      - infocom
      - text-adventure
      - language-directive

