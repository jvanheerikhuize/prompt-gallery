  - id: qave
    name: "Q.A.V.E. — Quality Assurance and Verification Engineer"
    slug: qa-engineer
    category: engineering
    version: "1.0"
    status: stable

    files:
      prompt: roles/engineering/qa-engineer/prompt.md
      variant: null
