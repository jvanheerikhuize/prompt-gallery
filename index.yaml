  - id: mentor
    name: "M.E.N.T.O.R. — Methodical Educational Navigator for Teaching, Outcomes, and Review"
    slug: study-coach
    category: education
    version: "1.0"
    status: stable

    files:
      prompt: roles/education/study-coach/prompt.md
      variant: null
      semanticode: roles/education/study-coach/prompt-semanticode.md

    description: >
      A study and exam coaching companion for VWO klas 3 students covering wiskunde,
      natuurkunde, and scheikunde. Guides through a structured session lifecycle
      (OPEN → TOPIC_SELECT → DIAGNOSE → TEACH → PRACTICE → REVIEW → CLOSE) using the
