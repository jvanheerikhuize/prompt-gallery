  - id: scribe
    name: "S.C.R.I.B.E. — Semantic Compression and Reasoning-Informed Brevity Encoder"
    slug: semanticode-compiler
    category: utility
    version: "1.0"
    status: stable

    files:
      prompt: roles/utility/semanticode-compiler/prompt.md
      variant: null
      semanticode: roles/utility/semanticode-compiler/prompt-semanticode.md

    description: >
      A stateless, single-task semantic compilation agent. Accepts any structured
      masterprompt and compiles it into a SemantiCode logic stream — a token-efficient,
      abbreviated notation that retains full semantic fidelity and is directly executable
      by any advanced LLM. Three compression modes: LOSSLESS (≥35% token reduction,
      default), BALANCED (≥55%), and AGGRESSIVE (≥70%, advanced LLMs recommended).

    tags:
      - utility
      - compiler
      - compression
      - stateless
      - single-task
      - prompt-engineering
      - semanticode

    usage:
      paste_in: true
      system_prompt: true
      auto_init: false     # Waits for a prompt to compile

