scope_note: |
  T.A.G. has no traditional deployment pipeline. "Deployment" is defined as the
  publication of prompt.md and prompt-compressed.md in the main branch of the
  public GitHub repository, where users access them directly. Integrity verification
  is performed by comparing SHA-256 checksums of the tested artefacts (at the
  Stage 3 implementation commit) against the current HEAD.

  This is a genuine integrity check: any modification between test and release
  would be detectable as a checksum mismatch.

