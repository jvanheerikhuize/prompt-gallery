rationale: >
  A.T.L.A.S. exposes no API. It is a prompt-only artefact delivered as a Markdown
  text file. Consumers use it by pasting into an LLM session or injecting as a system
  prompt via whatever API their LLM provider offers (e.g., Anthropic Messages API,
  OpenAI Chat API). A.T.L.A.S. itself defines no API endpoints, no authentication
  surface, no rate limiting, and no data access controls of its own.

  OWASP API Top 10 testing does not apply to this deliverable type.

