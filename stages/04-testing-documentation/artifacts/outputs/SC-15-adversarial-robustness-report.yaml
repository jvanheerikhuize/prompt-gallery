# is LIMITED tier. However: (a) the health-adjacent domain with potential DV and
# suicidal ideation disclosures warrants adversarial testing; (b) T-01 CRITICAL
# (crisis bypass) and T-02/T-03 HIGH threats in the STRIDE model require empirical
