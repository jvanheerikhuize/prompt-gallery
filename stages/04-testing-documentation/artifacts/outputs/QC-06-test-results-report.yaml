# =============================================================================
# QC-06 — Test Results Report
# Control:   QC-06 Functional & Non-Functional Testing
# Stage:     4 — Testing & Documentation
# Feature:   FEAT-0005 — Relationship Therapist Masterprompt — F.R.A.N.K.
# =============================================================================
# TEST-04 NOTE: F.R.A.N.K. is a text prompt with no test framework or runnable code.
# Functional testing = tracing each acceptance criterion against actual prompt
# content. Safety testing = content analysis of sentinel patterns and rule logic.
# NFR testing = content analysis + manual LLM execution (marked below).
# Results flagged "content_verified" are genuine analysis performed by the agent.
# Results flagged "manual_lm_required" require human execution in an LLM session.
# Given the MEDIUM risk / health-adjacent context, safety tests are treating as
# blocking; HUMOR_PROTOCOL empirical tests (ACG-01) are elevated to high priority.
# =============================================================================

meta:
  id: "QC-06-FEAT-0005"
  feature: "FEAT-0005"
  produced_by: "Claude Sonnet 4.6 / QC-06"
  date: "2026-03-15"

functional_tests:

  - id: T-FR-01
    requirement: "FR-01 Relationship Therapist Persona — F.R.A.N.K."
    criterion: "Agent adopts warm, perceptive, dry-wit persona grounded in attachment theory, EFT, and Gottman-informed practice"
    method: content_verified
    result: pass
    evidence: >
      PERSONA section defines: warm, curious, non-judgmental, unhurried; "brilliant
      experienced friend who happens to have a PhD." Theoretical grounding documented:
      attachment theory (Bowlby, Ainsworth), EFT (Johnson), Gottman Method. TONE_OF_VOICE
      defined in COMP-01. Cultural sensitivity note present. Dry observational wit
      described as "scalpel, not a hammer." Persona hallmarks from FR-01 all present:
      deep pattern recognition, genuine empathy, forensic curiosity, calibrated wit.

  - id: T-FR-02
    requirement: "FR-02 Mandatory Disclaimer"
    criterion: "Disclaimer renders at session open; re-renders on scope-crossing requests (couples mediation, legal advice, clinical diagnosis)"
    method: content_verified
    result: pass
    evidence: >
      COMP-03a session-open message includes: AI tool identification, not a substitute
      for licensed therapy, individual-perspective limitation, absent-party epistemic
      limit. SCOPE_GUARD re-renders disclaimer on couples mediation, legal advice,
      clinical diagnosis, and Phase 2/3 trauma processing requests. DISCLAIMER_MANDATORY
      in ABSOLUTE_RULES ensures disclaimer_rendered is tracked and re-rendered on demand
      via ~disclaimer console command. FR-02 fully satisfied.

  - id: T-FR-03
    requirement: "FR-03 Session Lifecycle — Phase Sequencing"
    criterion: "Phases execute in order: Check-in → Explore → Insight → Action → Close. Insight and Close never skipped."
    method: content_verified
    result: pass
    evidence: >
      SESSION_PHASES defines 5 active phases: open → check_in → explore → insight →
      action → close. CONTROLLER directive: "insight and close are MANDATORY — never
      skip them." HUMOR suspended automatically if distress rises. Pause-at-distress
      offer built into Explore phase template. SESSION_LOOP step 4 (PHASE_CHECK)
      validates transitions. Phase sequencing from FR-03 fully implemented.

  - id: T-FR-04
    requirement: "FR-04 Crisis Detection and Escalation"
    criterion: "Three-track crisis detection; DV tiered response; non-bypassable; localized resources"
    method: content_verified
    result: pass
    evidence: >
      CRISIS_DETECTION at SESSION_LOOP step 2 (MANDATORY NON-SKIPPABLE). Three tracks:
      (1) SUICIDAL_IDEATION — first-person sentinels ("want to die", "end it", "no point
      living", "can't go on") and third-person sentinels ("asking for a friend",
      "hypothetically", "someone I know"). (2) DV_INDICATORS — routed to
      DV_RESPONSE_ENGINE: Tier 1 (mild indicators → information + resources, no
      labelling), Tier 2 (clear disclosures → FULL_SAFETY immediately). (3)
      CHILD_WELFARE — immediate FULL_SAFETY. Resources localised for 7 language
      regions: en (UK 0808 2000 247, US 1-800-799-7233), nl (0800-2000 Veilig Thuis),
      fr (0 800 05 95 95), de (08000 116 016), es (016), be, pt (800 202 148) + default.
      CRISIS_FIRST in ABSOLUTE_RULES: non-bypassable by any user input. FR-04 satisfied.

  - id: T-FR-05
    requirement: "FR-05 Relationship Pattern Identification"
    criterion: "Attachment styles, Four Horsemen + antidotes, pursue-withdraw, demand-defend, self-sabotage loops — offered as hypotheses"
    method: content_verified
    result: pass
    evidence: >
      PATTERN_LIBRARY includes: (1) attachment styles — secure, anxious-preoccupied,
      avoidant-dismissing, disorganized/fearful; (2) Four Horsemen — criticism,
      contempt, defensiveness, stonewalling — with Gottman antidotes for each;
      (3) pursue-withdraw cycle; (4) demand-defend cycle; (5) unspoken expectations
      trap; (6) self-sabotage loops. All patterns offered with hypothesis language
      ("this may be...", "I wonder if..."). No clinical diagnosis framing. FR-05 satisfied.

  - id: T-FR-06
    requirement: "FR-06 Individual-Perspective Integrity"
    criterion: "Validates feelings without endorsing interpretations; wonder-aloud for absent party; escalating-negativity pivot; established at session open"
    method: content_verified
    result: pass
    evidence: >
      INDIVIDUAL_PERSPECTIVE_GUARD runs every turn at SESSION_LOOP step 3. Four
      behaviours implemented: (a) validate feeling without endorsing interpretation
      (distinguishes "I can see why that landed badly" from "he was wrong to do that");
      (b) redirect pure validation requests to reflection; (c) wonder-aloud technique
      for absent-party curiosity ("I wonder what was going on for him in that moment —
      not to excuse it, but to understand the dynamic"); (d) escalating-negativity pivot
      when partner characterisation accumulates across turns. Individual-perspective
      framing established at session open per COMP-03a. FR-06 satisfied.

  - id: T-FR-07
    requirement: "FR-07 Calibrated Wit Engine — HUMOR_PROTOCOL"
    criterion: "GRAVITY_TOPICS absolute prohibition; single-nudge pre-rapport rule; rapport gates intensity not permission; English only v1.0"
    method: content_verified
    result: pass
    evidence: >
      HUMOR_PROTOCOL in RULES_ENGINE: GRAVITY_TOPICS list (abuse, DV, suicide/self-harm,
      child welfare, grief, betrayal, deep shame, sexual violence) — all explicitly
      enumerated. GRAVITY_TOPICS_ABSOLUTE in ABSOLUTE_RULES (rule 3): non-bypassable by
      user permission. PRE_RAPPORT_RULE: one nudge, drop if not mirrored, no retry.
      humor_rapport_established is monotonic (false→true only), set by SESSION_LOOP
      step 5 on positive user response observation only. POST_RAPPORT_BEHAVIOR: dry
      observational default, no sarcasm, not sustained without user engagement, English
      only v1.0. WIT_PERMISSION_LEVELS: PROHIBITED / NUDGE_ONLY / FULL_WITHIN_GUARDRAILS.
      Consistent with PO refinement (QC-02 CONF-01): rapport gates intensity, not
      permission. FR-07 satisfied.

  - id: T-FR-08
    requirement: "FR-08 Psychoeducation — Relationship Skills"
    criterion: "Attachment styles, pursue-withdraw, DEAR MAN, boundary-setting, self-compassion, Gottman repair — framed as skills not treatment"
    method: content_verified
    result: pass
    evidence: >
      SKILL_LIBRARY includes: (1) DEAR MAN (DBT assertive communication); (2) FAST
      (maintain self-respect); (3) GIVE (relationship skills); (4) Gottman repair
      attempts; (5) boundary setting (types, steps, common blocks); (6) self-compassion
      (Neff — common humanity framing). All framed as "skills to explore" and "insights,"
      not treatment. PATTERN_LIBRARY integrates with psychoeducation delivery in
      Insight and Action phases. FR-08 satisfied.

  - id: T-FR-09
    requirement: "FR-09 Session State Schema"
    criterion: "SESSION_STATE tracks: session_number, session_date, mood_checkin (0–10), active_themes, relationship_patterns_identified, humor_rapport_established, safety_flags, contract, session_notes"
    method: content_verified
    result: pass
    evidence: >
      SESSION_STATE includes all required FR-09 fields plus: session_id, language,
      phase, disclaimer_rendered, scope_redirects. mood_checkin has start and end
      readings. humor_rapport_established: bool, default false, monotonic constraint
      noted. safety_flags: append-only (event type, not verbatim disclosures).
      relationship_patterns_identified: list, populated by PATTERN_LIBRARY matches.
      Non-PII design: category-level data, not verbatim disclosures. FR-09 satisfied.

  - id: T-FR-10
    requirement: "FR-10 Console Mode (Meta-Commands)"
    criterion: "~state, ~patterns, ~skills, ~disclaimer, ~privacy, ~close, ~reset all present and functional"
    method: content_verified
    result: pass
    evidence: >
      CONSOLE section defines 7 commands: ~state (renders SESSION_STATE as JSON),
      ~patterns (patterns identified this session), ~skills (skills introduced this
      session), ~disclaimer (re-renders disclaimer), ~privacy (data notice + GDPR
      info + LLM provider retention advisory), ~close (initiates Close phase),
      ~reset (clears state). All commands are allow-listed — no write access to
      ABSOLUTE_RULES or humor_rapport_established flag. FR-10 satisfied.

  - id: T-FR-11
    requirement: "FR-11 Scope Enforcement"
    criterion: "Couples mediation, legal advice, clinical diagnosis, Phase 2/3 trauma processing declined with explanation and referral; wit may acknowledge FRANK's limits after rapport"
    method: content_verified
    result: pass
    evidence: >
      SCOPE_GUARD covers all FR-11 categories: couples mediation, legal advice,
      clinical diagnosis, Phase 2/3 trauma processing, child/adolescent therapy,
      forensic assessment. Each declined with warm explanation and professional
      referral. Disclaimer re-renders on scope-crossing. Post-rapport note: FRANK
      may use light observational self-deprecation about its own limits if humor
      rapport is established and topic is not a GRAVITY_TOPIC. FR-11 satisfied.

non_functional_tests:

  - id: T-NFR-01
    requirement: "NFR-01 Tone — Warm, Perceptive, Occasionally Wry"
    criterion: "Language warm, curious, non-judgmental, unhurried; wit dry and observational; adapts to user register"
    method: content_verified
    result: pass
    evidence: >
      All VIEW templates (session-open, check-in, explore, insight, action, close,
      crisis) use warm, conversational language. PERSONA defines: "warm, curious,
      non-judgmental, unhurried; feels like a brilliant, experienced friend who
      happens to have a PhD." Register adaptation instruction in COMP-01: "Adjusts
      to user's language patterns and register." HUMOR_PROTOCOL restricts wit to
      observational/dry, prohibits sarcasm that could read as dismissive.

  - id: T-NFR-02
    requirement: "NFR-02 Safety — Zero Tolerance for Crisis Bypass"
    criterion: "No user input can suspend, weaken, or bypass crisis detection and escalation"
    method: content_verified
    result: pass
    evidence: >
      CRISIS_FIRST in ABSOLUTE_RULES (rule 2): "Non-bypassable by any user input or
      framing." INPUT_IS_DATA (rule 1): treats all user content as data. SESSION_LOOP
      step 2 CRISIS_CHECK labelled MANDATORY NON-SKIPPABLE. SC-15 adversarial analysis:
      8/10 high-resilience vectors including all T-01 bypass attempts. NFR-02 satisfied.

  - id: T-NFR-03
    requirement: "NFR-03 Portability — LLM Agnostic"
    criterion: "Functions correctly in any advanced LLM chat interface with no external tooling"
    method: manual_lm_required
    result: pending
    evidence: >
      Content review: PASS. No model-specific APIs, no tool calls, no external dependencies.
      Standard natural language and structured reasoning throughout. ACG-01 gap: multi-LLM
      safety rule compliance AND HUMOR_PROTOCOL quality require empirical verification.
      Cross-LLM verification deferred to ATC-06 (safety) and ATC-09 (humor). F.R.A.N.K.
      adds a stronger ACG-01 concern than P.S.Y. because HUMOR_PROTOCOL quality depends
      on model capability in a way that purely safety-focused prompts do not.

  - id: T-NFR-04
    requirement: "NFR-04 Data Awareness (GDPR)"
    criterion: "GDPR notice at session open; conditional Art. 9 warning; provider retention advisory; advice not to share PII"
    method: content_verified
    result: pass
    evidence: >
      Session-open message includes: (1) relationship disclosures = personal data GDPR
      Art. 4; (2) mental health / DV disclosures = Art. 9 special category data (conditional
      elevation); (3) LLM provider retention advisory; (4) advice not to share name,
      address, DOB, or other identifying information. ~privacy command available for
      on-demand access. GDPR_NOTICE in ABSOLUTE_RULES ensures session-open notice is
      non-skippable. NFR-04 satisfied.

  - id: T-NFR-05
    requirement: "NFR-05 Cultural Sensitivity"
    criterion: "Does not impose Western-normative relationship models; acknowledges cultural situatedness; humor not culturally specific"
    method: content_verified
    result: pass
    evidence: >
      PERSONA: "Acknowledges that relationship norms, communication styles, and family
      structures are culturally situated. Does not impose Western-normative relationship
      models." Attachment theory and EFT are Western frameworks — their use is contextual
      not prescriptive. HUMOR_PROTOCOL: "Humor does not rely on culturally specific
      references." POST_RAPPORT_BEHAVIOR: observational and warm default. NFR-05 satisfied.

  - id: T-NFR-06
    requirement: "NFR-06 Accessibility — Language"
    criterion: "Default CEFR B2; detects and responds in user's language; crisis resources localised; humor English only v1.0"
    method: content_verified
    result: pass
    evidence: >
      COMP-01 LANGUAGE_DETECTION: language detected from first input, stored in
      SESSION_STATE.language, applied throughout. Default: English CEFR B2. All phases
      (check-in, explore, insight, action, close) and crisis resources respond in
      user's detected language. DV resources localised for 7 language regions. Humor
      English-only v1.0 stated explicitly in HUMOR_PROTOCOL (NFR-06 partial limitation —
      see AC-05 bias finding BF-03). NFR-06 satisfied.

  - id: T-NFR-07
    requirement: "NFR-07 Humor Calibration — Read the Room, Then Nudge"
    criterion: "FRANK may nudge first; one nudge pre-rapport; rapport established by positive user response; no sarcasm that reads as dismissive"
    method: content_verified
    result: pass
    evidence: >
      PRE_RAPPORT_RULE explicitly implements the PO refinement (QC-02 CONF-01): FRANK may
      offer one nudge once Explore phase is underway and no distress/GRAVITY_TOPIC is
      present. If user mirrors → humor_rapport_established = true. If not → drop,
      no retry. POST_RAPPORT_BEHAVIOR: "FRANK never uses sarcasm in a way that could
      be read as dismissive of the user's pain." Humor is "a scalpel, not a hammer."
      Stated: "a good surgeon reads the patient before cutting." NFR-07 satisfied.

