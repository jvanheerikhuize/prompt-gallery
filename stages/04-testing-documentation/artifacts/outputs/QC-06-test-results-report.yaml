functional_tests:

  - id: T-FR-01
    requirement: "FR-01 DM Persona"
    criterion: "LLM assumes T.A.G. DM persona (brilliant/witty/sarcastic/Infocom-style) on first invocation"
    method: content_verified
    result: pass
    evidence: >
      CORE_DIRECTIVES/PERSONA defines ROLE (Senior DM, Storyteller, Arbiter) and
      TONE_OF_VOICE (brilliant, witty, sarcastic, Infocom-style). SESSION_PHASES/Introduction
      step 1 instructs the LLM to introduce itself. ABSOLUTE_RULES govern all behaviour.

  - id: T-FR-02
    requirement: "FR-02 Initialization Flow"
    criterion: "Three start modes functional: customized, random, load"
    method: content_verified
    result: pass
    evidence: >
      SESSION_PHASES/Introduction step 2 defines all three menu options with explicit
      instructions for each. IN_PROMPT_CONTEXT defines all required inputs.

  - id: T-FR-03
    requirement: "FR-03 STATE_SCHEMA"
    criterion: "JSON STATE_SCHEMA covers all required fields"
    method: content_verified
    result: pass
    evidence: >
      STATE_SCHEMA covers: gamesettings (difficulty, logo), setting, lore[], goal,
      player (location, pos xyz, all stats, inventory with flags, scoring_ledger),
      world (locations with dimensions/exits/objects, npcs with full state, quests,
      global_flags with turn_count, time, difficulty_history). All fields present.

  - id: T-FR-04
    requirement: "FR-04 SESSION_LOOP"
    criterion: "7-step loop executes deterministically every turn"
    method: content_verified
    result: pass
    evidence: >
      SESSION_LOOP defines steps 1–7 with explicit instructions. Step 7 prohibits
      raw JSON and internal reasoning in output. InputIsData reminder in step 1.

  - id: T-FR-05
    requirement: "FR-05 SESSION_RULES Engine"
    criterion: "Full rules engine present and complete"
    method: content_verified
    result: pass
    evidence: >
      SESSION_RULES covers all 9 rule categories: Physics, Inventory, State/Logic,
      Interaction, Time/World Clock, Difficulty, Scoring, Position, Combat, Death.
      All sub-rules present and consistent with FEAT-0001 spec.

  - id: T-FR-06
    requirement: "FR-06 Console Mode"
    criterion: "Console mode functional with all 9 commands; RESTRICTION enforced"
    method: content_verified
    result: pass
    evidence: >
      CONSOLE_COMMANDS defines all 10 entries (including ~). RESTRICTION comment
      positioned above command list. Trigger documented (~ character).

  - id: T-FR-07
    requirement: "FR-07 ASCII Map Bot"
    criterion: "ASCII_MAP_BOT generates correct structured map"
    method: content_verified
    result: pass
    evidence: >
      ASCII_MAP_BOT sub-agent defined with 5 rules covering dimensions, structure,
      components, content placement, and legend. All rule details present.

  - id: T-FR-08
    requirement: "FR-08 Compressed variant in sync"
    criterion: "prompt-compressed.md functionally equivalent to prompt.md"
    method: content_verified
    result: pass
    evidence: >
      Manual diff confirmed: all MVC sections, SESSION_RULES, CONSOLE_COMMANDS,
      ASCII_MAP_BOT, Stage 3 hardening (T-01/T-05/T-07), and templates present
      in compressed notation. GC-03 equivalence_check: confirmed.

  - id: T-FR-09
    requirement: "FR-09 Ending Phase"
    criterion: "Ending phase triggers on goal/death with correct menu"
    method: content_verified
    result: pass
    evidence: >
      SESSION_PHASES/Ending defines trigger (goal met or player dead) and menu
      (Debriefing, Different Choice, Create Next Chapter). ENDING VIEW template
      defines output format with score/turns.

  - id: T-FR-10
    requirement: "FR-10 Auto-initialize"
    criterion: "Auto-init is MUST in both ABSOLUTE_RULES and CONTROLLER DIRECTIVES"
    method: content_verified
    result: pass
    evidence: >
      ABSOLUTE_RULES: "you MUST auto-initialize yourself without waiting for user input."
      CONTROLLER DIRECTIVES: "you MUST auto-initialize yourself without waiting for user input."
      Both instances use MUST, consistent with CONF-03 resolution.

