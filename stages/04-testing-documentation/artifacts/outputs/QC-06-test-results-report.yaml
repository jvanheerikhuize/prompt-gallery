      Save command produces full STATE_SCHEMA JSON. Load command accepts JSON.
      Cross-LLM portability requires manual testing. Content review: PASS.
      LLM execution: deferred to developer.

  - id: T-NFR-05
    requirement: "NFR-05 Documentation"
    criterion: "README.md contains project description, how-to-play, example, tips"
    method: content_verified
    result: pass
    evidence: >
      README.md contains: project description (T.A.G. header + overview), Quick Start
      (how-to-play with 3 steps), What Makes T.A.G. Different (feature overview),
      tips in prompt.md (Tips for Best Experience section), Contributing guide.

