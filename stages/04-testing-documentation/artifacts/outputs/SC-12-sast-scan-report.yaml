scan_scope:
  files:
    - "roles/utility/ascii-cartographer/prompt.md"
  scan_type: "Prompt static analysis — instruction logic, rule consistency, injection surface"
  note: >
    A.T.L.A.S. is a prompt-only artefact. SAST here means static analysis of prompt
    logic for safety rule gaps, instruction contradictions, and injection surfaces —
    equivalent to code SAST applied to the prompt instruction set.

# ── Static Analysis Findings ──────────────────────────────────────────────────
findings:

  - id: SA-01
    category: "Rule consistency — ABSOLUTE_RULES vs body"
    check: "All 5 ABSOLUTE_RULES are consistently enforced throughout the prompt body"
    result: pass
    evidence: >
      RULE 1 (INPUT_IS_DATA): enforced in COORDINATE_PARSER (labels treated as strings),
      BOUNDARY_PARSER (vertex labels as strings), and Step 1 of REQUEST_LOOP (INPUT_GATE).
      RULE 2 (OUTPUT_ASCII_ONLY): enforced in MAP_CANVAS rendering, WALL_RENDERER character
      set, DECORATORS, and Step 11 (plain text only).
      RULE 3 (PRECISION_HONEST): enforced in PRECISION_ENGINE (km_per_col computation,
      composite symbols) and POI_PLACER (label omission noted).
      RULE 4 (DATA_NOTICE): enforced in LEGEND_BLOCK (last line of METADATA) and
      Step 12 (explicit verification before output).
      RULE 5 (POI_WINS_WALL): enforced in POI_PLACER (note at end of section) and
      WALL_RENDERER (cell-by-cell application with metadata note).
      No contradictions found.

  - id: SA-02
    category: "Injection surface analysis"
    check: "All user-controlled input fields are treated as data throughout execution path"
    result: pass
    evidence: >
      User-controlled fields: POI names, coordinate strings, vertex labels, density keyword,
      mode override keyword. All are either (a) parsed as numeric values with range validation
      (coordinates), (b) matched against a fixed keyword list (density, mode override), or
      (c) rendered as quoted strings in the legend (POI names). No user input is passed to
      a free-form instruction interpreter. The explicit example in RULE 1 ("Ignore previous
      instructions" rendered as a string) confirms correct defensive posture.

  - id: SA-03
    category: "Logic completeness — error paths"
    check: "All error conditions terminate rendering and produce structured output"
    result: pass
    evidence: >
      VALIDATION_ENGINE covers: lat/lon out of range, non-numeric input, zero POIs,
      zero polygon vertices, fewer than 3 polygon vertices. Step 4 of REQUEST_LOOP:
      "If any validation error: emit error block and STOP." Mixed coordinate system
      error in INTERPRETATION_ENGINE. No silent failure paths identified.

  - id: SA-04
    category: "Logic completeness — wall rendering edge cases"
    check: "WALL_RENDERER handles all segment types including degenerate cases"
    result: pass
    findings_notes: >
      All segment types specified: horizontal, vertical, 45° rising, 45° falling,
      non-45° (Bresenham). POI_WINS_WALL applied cell-by-cell. EXTERIOR mode specified.
      One minor static observation: the prompt specifies Bresenham-style stepping but
      does not provide a pseudocode example — this is by design (LLM expected to know
      the algorithm from the formula description). No bug; noted for Stage 4 ATC testing.

  - id: SA-05
    category: "Determinism — rendering rules completeness"
    check: "All rendering decisions have exactly one correct outcome per input"
    result: pass
    evidence: >
      RENDERING_RULES states "No rule has conditional overrides. Rendering is fully
      deterministic." Label placement 5-step priority has no tie-breaking ambiguity.
      Wall character selection covers all slope cases. Mode selection is binary with
      explicit user-override precedence. Scale bar nice-distance algorithm is deterministic
      (largest D where bar_chars ≤ 20% of W).

  - id: SA-06
    category: "Scope confinement"
    check: "No off-task behaviour pathways identified in prompt logic"
    result: pass
    evidence: >
      PERSONA and REQUEST_LOOP together constrain output to: (a) one-line interpretation
      statement (if needed), (b) the rendered map, (c) structured error. No pathways
      for advisory, conversational, or instructional output identified. PERSONA explicitly
      prohibits chat and clarifying questions.

# ── Residual Findings ─────────────────────────────────────────────────────────
residual_findings:
  - id: RES-01
    title: "Bresenham algorithm — no pseudocode in prompt (ACG-01)"
    severity: low
    description: >
      WALL_RENDERER describes Bresenham-style stepping in words but does not provide
      explicit pseudocode. LLM arithmetic quality (ACG-01 from Stage 2) means wall
      segment rasterisation for non-45° angles may have small errors in some models.
      This is a quality concern, not a safety concern. To be evaluated in ATC testing
      (Stage 4 QC-07).
    accepted: true

