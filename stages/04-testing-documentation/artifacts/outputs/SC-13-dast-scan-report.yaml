rationale: >
  A.T.L.A.S. is a prompt-only artefact with no running service, no HTTP endpoints,
  no API surface, no database, and no network stack. Dynamic Application Security
  Testing (DAST) requires a live application or service to probe at runtime.
  There is no such runtime for a masterprompt text file. DAST does not apply.

  Runtime adversarial testing is covered instead by SC-15 (Adversarial AI Robustness
  Testing), which tests the prompt's behaviour when instantiated in an LLM.

