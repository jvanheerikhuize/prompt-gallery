meta:
  id: "QC-07-FEAT-0006"
  feature: "FEAT-0006"
  produced_by: "Claude Sonnet 4.6 (QC Analyst / QC-07)"
  date: "2026-03-15"
  status: complete

purpose: >
  AI Output Validation (ATC) tests evaluate A.T.L.A.S.'s behaviour as an AI system
  with a focus on qualities that cannot be fully verified by static analysis alone:
  map accuracy, label correctness, wall rendering fidelity, scope discipline,
  and privacy-notice consistency across a range of inputs.

# ── AI Test Cases ─────────────────────────────────────────────────────────────
test_cases:

  - id: ATC-01
    title: "Basic geographic map — POI placement accuracy"
    scenario: >
      Three European cities: Amsterdam (52.3676N, 4.9041E), Paris (48.8566N, 2.3522E),
      Berlin (52.5200N, 13.4050E). Standard density. Verify relative positions.
    acceptance_criteria:
      - "Amsterdam and Berlin appear on approximately the same latitude band (top of map)"
      - "Paris appears significantly lower (south) of Amsterdam and Berlin"
      - "Berlin appears significantly to the right (east) of Amsterdam"
      - "Paris appears significantly to the left (west) of Berlin"
      - "Legend lists all three POIs with coordinates"
      - "DATA_NOTICE present in metadata"
    result: pass
    severity: critical
    notes: "Core proportional accuracy test. Equirectangular formula verified visually."

  - id: ATC-02
    title: "Interior floor plan — rectangular room with walls and POI"
    scenario: >
      boundary: V1:0,0  V2:0,30  V3:60,30  V4:60,0
      POIs: Desk: X:15 Y:20 | Door: X:30 Y:0
    acceptance_criteria:
      - "Interior map header line printed above map"
      - "Top and bottom walls rendered with - characters"
      - "Left and right walls rendered with | characters"
      - "All four corners rendered as +"
      - "Desk symbol (*A) appears inside the boundary, upper-left quadrant"
      - "Door symbol (*B) appears on or near the bottom wall"
      - "Legend lists both POIs with abstract coordinates"
      - "Mode: INTERIOR in metadata"
    result: pass
    severity: critical
    notes: >
      Core interior mode test. Wall rendering for orthogonal segments verified.
      Door POI on wall tests POI_WINS_WALL — symbol should render, wall gap noted.

  - id: ATC-03
    title: "Interior floor plan — L-shaped room"
    scenario: >
      boundary: V1:0,0  V2:0,20  V3:30,20  V4:30,10  V5:50,10  V6:50,0
      POI: Desk: X:15 Y:15
    acceptance_criteria:
      - "L-shape walls rendered with correct characters at all edges"
      - "Inner corner (V4 30,10 to V5 50,10) rendered correctly"
      - "All straight segments use - or | as appropriate"
      - "Corners use +"
      - "No wall characters outside the polygon outline"
      - "POI inside the L-shape is correctly placed"
    result: pass
    severity: high
    notes: "L-shape tests multi-segment interior polygon. Inner corner rendering verified."

  - id: ATC-04
    title: "Exterior map — soft boundary polygon"
    scenario: >
      POIs: Entrance: 52.3700N 4.9050E | Exit: 52.3650N 4.9100E
      boundary: 52.3720N 4.9020E | 52.3720N 4.9130E | 52.3630N 4.9130E | 52.3630N 4.9020E
      Mode: exterior
    acceptance_criteria:
      - "EXTERIOR mode selected (user override with 'exterior' keyword)"
      - "No interior map header"
      - "Boundary perimeter rendered as . (period) characters, not solid walls"
      - "POIs A and B plotted inside the dashed perimeter"
      - "Legend shows mode: EXTERIOR"
    result: pass
    severity: high
    notes: "CONF-06 user override to EXTERIOR. Dashed perimeter (.) vs solid walls confirmed."

  - id: ATC-05
    title: "DMS coordinate parsing accuracy"
    scenario: "Eiffel Tower: 48°51'30\"N 2°21'0\"E"
    acceptance_criteria:
      - "Coordinate parsed to lat=48.858333, lon=2.350000 (within ±0.000100)"
      - "Legend shows parsed coordinates, not DMS string"
      - "Map renders single POI with default radius"
      - "Single-POI note in metadata"
    result: pass
    severity: medium
    notes: "DMS conversion formula: 48 + 51/60 + 30/3600 = 48.8583. Verified."

  - id: ATC-06
    title: "World-knowledge named location — transparency"
    scenario: "Two named locations: 'London' and 'Edinburgh'"
    acceptance_criteria:
      - "Pre-render statement lists approximate coordinates for both"
      - "~ prefix on coordinates in legend for both POIs"
      - "[world knowledge] tag in legend"
      - "Coordinates are approximately correct (London ≈ 51.5074N 0.1278W, Edinburgh ≈ 55.9533N 3.1883W)"
      - "Edinburgh appears significantly north of London"
    result: pass
    severity: medium
    notes: "CONF-03 world-knowledge transparency. Approximate coordinates disclosed."

  - id: ATC-07
    title: "Precision metadata — character resolution reported"
    scenario: "Amsterdam and Rotterdam at standard density"
    acceptance_criteria:
      - "Metadata contains: 'Scale: ~X.X km/col, ~Y.Y km/row'"
      - "km_per_col is approximately 0.5-0.7 km for this region at 72 cols"
      - "km_per_row is approximately double km_per_col (2:1 aspect ratio effect)"
      - "No precision warnings (both cities well separated)"
    result: pass
    severity: medium
    notes: "PRECISION_ENGINE output verification. ACG-01: minor arithmetic variance acceptable."

  - id: ATC-08
    title: "Scale bar accuracy"
    scenario: "Amsterdam–Rotterdam map, standard density"
    acceptance_criteria:
      - "Scale bar present below map"
      - "Bar represents a 'nice' distance (1, 2, 5, 10, 25... km)"
      - "Bar length is ≤ 20% of map width in characters"
      - "Distance label matches bar length"
    result: pass
    severity: medium
    notes: "Nice-distance algorithm output verification."

  - id: ATC-09
    title: "45° diagonal wall — character correctness"
    scenario: >
      Diamond boundary: V1:20,0  V2:40,20  V3:20,40  V4:0,20
      No POIs.
    acceptance_criteria:
      - "Bottom-left to top-left segment (V4:0,20 → V1:20,0): / characters"
      - "Top-left to top-right segment (V1:20,0 → V2:40,20): \\ characters"
      - "Top-right to bottom-right segment (V2:40,20 → V3:20,40): / characters"
      - "Bottom-right to bottom-left segment (V3:20,40 → V4:0,20): \\ characters"
      - "Corner cells at V1-V4: + characters"
      - "No metadata note about approximation (all segments are exactly 45°)"
    result: pass
    severity: high
    notes: >
      ACG-01 test — LLM must correctly identify 45° slopes from Δcol/Δrow ratios
      and select / or \\ accordingly. Critical for wall rendering accuracy.
      This is the primary ACG-01 test case for ATLAS.

  - id: ATC-10
    title: "Non-45° diagonal wall — approximation noted in metadata"
    scenario: >
      boundary: V1:0,0  V2:30,10  V3:30,30  V4:0,30
      (V1→V2 segment has slope Δrow/Δcol = 10/30 ≈ 18.4° — not 45°)
    acceptance_criteria:
      - "V1→V2 segment rendered as stepped orthogonal characters"
      - "Metadata note: 'Segment V1→V2 approximated (angle ~18.4° → stepped orthogonal)'"
      - "Other segments (V2→V3, V3→V4, V4→V1) rendered correctly (vertical, horizontal, stepped)"
      - "Map is readable despite approximation"
    result: pass
    severity: medium
    notes: "Non-45° approximation transparency. Metadata disclosure confirmed."

  - id: ATC-11
    title: "DATA_NOTICE consistency — verified across all output types"
    scenario: "Three test inputs: (a) valid map, (b) error response, (c) world-knowledge map"
    acceptance_criteria:
      - "(a) Valid map: DATA_NOTICE in metadata block. Always present."
      - "(b) Error response: DATA_NOTICE NOT required in error-only output (error is pre-render)."
      - "(c) World-knowledge map: DATA_NOTICE in metadata block. Present."
    result: pass
    severity: high
    notes: >
      ATC-11 clarifies the DATA_NOTICE scope: it applies to the metadata block of every
      rendered map. Error-only responses (Step 4 STOP) do not produce a metadata block
      and thus do not require DATA_NOTICE. This is consistent with ABSOLUTE RULE 4
      ("include in map metadata") — no map, no metadata, no notice required.

# ── ACG-01 Assessment ─────────────────────────────────────────────────────────
acg_01_assessment:
  id: ACG-01
  title: "LLM arithmetic accuracy — projection and wall rasterisation"
  tests_covering: [ATC-01, ATC-07, ATC-09, ATC-10, NFT-01, NFT-04]
  finding: >
    The equirectangular projection formula is explicit and correct by design — the
    round() function bounds POI placement error to ≤ 0.5 characters, satisfying
    NFR-01 (±1 character). The primary quality risk is wall rasterisation for non-45°
    diagonal segments, which requires Bresenham-style stepping without explicit
    pseudocode. ATC-09 (45° diagonals) and ATC-10 (non-45° approximation) both
    pass — the algorithm description is sufficient for capable LLMs. Minor arithmetic
    variance may occur on weaker models. Overall ACG-01 status: ACCEPTED as residual
    low-quality risk. No safety implications.
  severity: low
  accepted: true

# ── Summary ───────────────────────────────────────────────────────────────────
summary:
  total_atcs: 11
  passed: 11
  failed: 0
  critical: 1   # ATC-01 — basic geographic placement
  high: 4       # ATC-02, ATC-03, ATC-04, ATC-09, ATC-11
  medium: 5     # ATC-05, ATC-06, ATC-07, ATC-08, ATC-10
  novel_mandatory_atcs: []
  acg_01_status: accepted_low

status: complete
