  immutable: true

# -----------------------------------------------------------------------------
# Stage 4 control roll-up
# -----------------------------------------------------------------------------
control_results:

  - control: SC-12
    name: "SAST Scan (Content Analysis)"
    status: pass
    blockers: 0
    residuals:
      - id: "CWE-345-session-state-integrity"
        severity: low
        disposition: accepted
        rationale: "No cryptographic runtime available for a prompt-only system. ~state and ~reset provide transparency and recovery."
      - id: "CWE-200-gdpr-context-retention"
        severity: low
        disposition: accepted
        rationale: "Structural LLM provider limitation; mandatory disclosure at session open + ~privacy command are appropriate controls."

  - control: QC-06
    name: "Functional & NFR Tests"
    status: pass
    blockers: 0
    residuals:
      - id: "NFR-03-cross-llm-portability"
        severity: medium
        disposition: deferred_to_developer
        rationale: "Requires live LLM execution across Claude + GPT-4 minimum. ACG-01 gap. Deferred to ATC-06, ATC-07. Not a blocking residual per MEDIUM tier threshold."
    note: >
      16/17 tests pass content verification. 1 test (NFR-03 cross-LLM) deferred.
      All 11 functional requirements and 5/6 NFRs verified by content analysis.

  - control: SC-13
    name: "DAST Scan"
    status: not_applicable
    blockers: 0
    rationale: "No runtime deployment."
    manual_testing_recommended: true
    manual_testing_priority: high

  - control: SC-14
    name: "API Security Testing"
    status: not_applicable
    blockers: 0
    rationale: "No APIs exposed."

  - control: SC-15
    name: "Adversarial AI Robustness Testing (Voluntarily Executed)"
    status: pass
    blockers: 0
    residuals:
      - id: "SC-15-language-detection-mixed"
        severity: low
        disposition: accepted
        rationale: "Highly mixed-language input may fall back to English resources. English fallback is a reasonable global default. Accepted."
      - id: "SC-15-context-drift-long-sessions"
        severity: medium
        disposition: accepted
        rationale: >
          In very long sessions (50+ turns), LLM context drift may affect boundary_crossings
          counter accuracy. PHASE_1_ONLY absolute rule (embedded in prompt structure, not
          SESSION_STATE) provides a backstop independent of the counter. Risk level is
          acceptable for a psychoeducation tool given the structural backstop.
      - id: "acg01-multi-llm-safety-gap"
        severity: medium
        disposition: deferred_to_developer
        rationale: >
          ACG-01: safety rule compliance (crisis detection, safe-messaging) has not been
          empirically verified across multiple LLMs. Content analysis indicates high
          resilience for all vectors. Empirical verification deferred to ATC-06, ATC-07.
          Given MEDIUM risk, this is elevated to high-priority post-release test.

  - control: QC-07
    name: "AI Output Validation"
    status: pass_with_deferred_lm_tests
    blockers: 0
    residuals:
      - id: "qc07-lm-execution-tests"
        severity: medium
        disposition: deferred_to_developer
        rationale: >
          8 manual LLM execution tests required (ATC-01 through ATC-08). Safety-critical
          tests (ATC-01 through ATC-05) verify crisis detection, bypass resistance, and
          Phase 2/3 boundary. Content-level analysis confirms design intent. Empirical
          verification deferred with elevated priority. ATC-01 through ATC-05 are
          designated critical and must be completed before marking FEAT-0004 closed.

  - control: AC-05
    name: "Bias & Fairness"
    status: pass
    blockers: 0
    residuals:
      - id: "ac05-western-clinical-tradition"
        severity: low
        disposition: accepted
        rationale: "Structural limitation of Phase 1 psychoeducation; NFR-05 and CONF-04 provide agent-level mitigation."
      - id: "ac05-adult-only-scope"
        severity: low
        disposition: accepted
        rationale: "Explicit out-of-scope declaration; no harm to adult users of any age."
      - id: "ac05-sensory-disability-technique"
        severity: low
        disposition: accepted
        rationale: "User always chooses technique; cultural context invitations allow opt-out. Future enhancement."
      - id: "ac05-spirituality-absence"
        severity: low
        disposition: accepted
        rationale: "NFR-05 instructs agent to adapt to spiritual framing when disclosed. Absence is scope limit, not discriminatory design."

  - control: QC-08
    name: "Documentation Completeness"
    status: complete
    blockers: 0
    residuals: []

