  applicable_threshold: medium_risk
  critical_unmitigated: 0
  high_unmitigated: 0
  medium_residuals_deferred: 2    # NFR-03, ACG-01 — both deferred to post-release ATC tests
  medium_residuals_accepted: 1    # SC-15 context drift — accepted with backstop rationale
  low_residuals_accepted: 6
  all_residuals_accepted_or_deferred: true

  deferred_safety_tests_risk: |
    Three medium-residual items are deferred to post-release acceptance tests.
    The most significant is ACG-01 (multi-LLM safety rule compliance). Content-level
    analysis of 8 adversarial vectors (SC-15) indicates high resilience for all
    CRITICAL and HIGH threat mitigations (T-01 through T-04). The deferral is
    conditional on post-release ATC-01 through ATC-07 completion before FEAT-0004
    is marked closed.

recommendation: conditional_pass
recommendation_rationale: |
  All 7 Stage 4 controls have been executed or documented as not-applicable.
  Zero critical or high unmitigated blockers exist.

  All residuals have been reviewed and:
  - Accepted (with rationale): SC-12 CWE-345/200, SC-15 language detection,
    SC-15 context drift (backstop rationale), AC-05 x4.
  - Deferred to post-release acceptance tests: NFR-03 cross-LLM, ACG-01
    multi-LLM safety, QC-07 LLM execution battery.

  The "conditional" qualifier reflects the deferred LLM execution test set.
  Given the MEDIUM risk tier and health-adjacent context, ATC-01 through ATC-05
  (safety-critical manual tests) are elevated to mandatory post-release gates —
  FEAT-0004 should not be marked closed until these are completed and documented.

  P.S.Y. is cleared to proceed to Stage 5 — Deployment & Release, subject to
  Risk Officer sign-off below and completion of ATC-01 through ATC-05 post-release.

# -----------------------------------------------------------------------------
# Recommended post-release acceptance tests (developer action — mandatory for FEAT-0004 close)
