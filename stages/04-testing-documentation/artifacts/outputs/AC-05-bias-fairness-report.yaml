# =============================================================================
# AC-05 — Bias & Fairness Report
# Control:   AC-05 Bias & Fairness Testing
# Stage:     4 — Testing & Documentation
# Feature:   FEAT-0005 — Relationship Therapist Masterprompt — F.R.A.N.K.
# =============================================================================

meta:
  id: "AC-05-FEAT-0005"
  feature: "FEAT-0005"
  ai_tier: limited
  produced_by: "Claude Sonnet 4.6 / AC-05"
  date: "2026-03-15"

scope_note: |
  F.R.A.N.K. is a LIMITED-risk relationship psychoeducation and self-reflection
  prompt targeting adult users experiencing relationship difficulties. Bias analysis
  is proportionate to the LIMITED risk classification and the context of potential
  DV disclosures, which raises the stakes for any population-level bias.

  Unlike systems making decisions affecting rights (employment, credit, healthcare
  access), F.R.A.N.K. provides psychoeducation, pattern reflection, and skill
  delivery. It does not make recommendations that determine access to services.
  However, the relationship-and-DV context means encoded biases could undermine
  therapeutic value or — in the worst case — cause harm if DV normalisation biases
  exist.

  EU AI Act Art. 10(2)(f): No training data involved. Analysis is content-review based.

content_bias_analysis:

  - id: BF-01
    characteristic: "Gender and Sexual Orientation"
    finding: none
    detail: >
      The prompt uses gender-neutral language throughout: "your partner", "they/them"
      where referent is unspecified. SESSION_STATE does not collect or require gender
      information. The INDIVIDUAL_PERSPECTIVE_GUARD and PATTERN_LIBRARY make no
      gendered assumptions — pursue-withdraw, demand-defend, and attachment styles
      apply across all relationship configurations. DV_RESPONSE_ENGINE: DV resources
      include services for all genders and relationship types; no assumption that
      DV is gendered. Relationship structure (monogamous, polyamorous, same-sex,
      different-sex) is not assumed. The prompt explicitly does not impose normative
      relationship models (NFR-05).

  - id: BF-02
    characteristic: "Ethnicity and Cultural Background"
    finding: low_noted
    detail: >
      Attachment theory (Bowlby/Ainsworth), EFT (Johnson), and the Gottman Method
      originate from Western psychological research traditions conducted primarily
      with Western, educated, industrialised, rich, democratic (WEIRD) populations.
      NFR-05 explicitly instructs the agent not to impose Western-normative relationship
      models. The HUMOR_PROTOCOL avoids culturally specific references. However, the
      conceptual framework (attachment styles, Four Horsemen, individual self-reflection
      as a therapeutic mode) is culturally situated and may not resonate equally with
      users from collectivist, communal, or non-Western relationship traditions.
    severity: low
    mitigation: >
      NFR-05 instructs FRANK to acknowledge cultural situatedness when disclosed.
      No culturally specific references in humor. Pattern hypotheses use tentative
      language ("this sounds like it could be...", "I wonder if...") rather than
      prescriptive diagnosis — reducing forced fit. Structural limitation of current
      psychoeducation framework, not discriminatory design choice. Accepted.
    accepted: true

  - id: BF-03
    characteristic: "Language — Humor English Only"
    finding: low_noted
    detail: >
      HUMOR_PROTOCOL restricts wit deployment to English in v1.0 (NFR-06, CONF-04).
      Users who engage in non-English sessions receive full therapeutic content but
      do not experience the HUMOR_PROTOCOL component in their language. This creates
      a materially different session experience for non-English speakers — specifically,
      the potential therapeutic benefit of calibrated wit (rapport building, tone
      relief) is not available.
    severity: low
    mitigation: >
      The limitation is explicit in the design (English-only v1.0) and documented
      in NFR-06. Non-English users receive full warmth, pattern recognition, crisis
      safety, and skill delivery — the HUMOR_PROTOCOL is a rapport enhancement, not
      a core safety feature. The safety of non-English users is not compromised.
      Multi-language humor is a v2.0 enhancement target. Accepted.
    accepted: true

  - id: BF-04
    characteristic: "Relationship Structure and Family Form"
    finding: none
    detail: >
      No assumption of monogamy, heterosexuality, nuclear family structure, or
      marriage. Pattern names (pursue-withdraw, demand-defend, Four Horsemen) are
      relational dynamics applicable across relationship configurations. DV resources
      do not assume specific victim/perpetrator gender assignment. SCOPE_GUARD
      covers "couples mediation" but this refers to the presence of two parties
      in the session — not to relationship structure.

  - id: BF-05
    characteristic: "Disability"
    finding: low_noted
    detail: >
      No technique library with physical sensory requirements (unlike P.S.Y.'s
      5-4-3-2-1 grounding technique). Relationship skills (DEAR MAN, FAST, GIVE,
      boundary setting) are primarily verbal and cognitive — generally accessible.
      Session structure relies on written text — users with visual impairments or
      reading difficulties may face accessibility challenges at the LLM interface
      level, outside the prompt's control. No explicit disability accommodations
      in skill delivery.
    severity: low
    mitigation: >
      Skill delivery is always user-directed — FRANK presents options, user chooses
      what is helpful. Interface accessibility is outside the prompt's scope (LLM
      provider responsibility). The prompt does not introduce disability-based bias;
      it inherits the accessibility characteristics of the LLM platform. Accepted.
    accepted: true

  - id: BF-06
    characteristic: "Socioeconomic Status"
    finding: none
    detail: >
      The prompt explicitly acknowledges that access to relationship therapy is gated
      by cost, availability, and stigma (FEAT-0005 intent). Session structure and
      skill delivery do not assume access to therapy, medical care, or other resources.
      All crisis resources referenced are free public emergency services. No
      assumptions about users' living situation, financial independence, or access
      to support networks.

  - id: BF-07
    characteristic: "DV Normalisation Risk"
    finding: none
    detail: >
      FRANK-specific concern: a relationship support tool could inadvertently normalise
      controlling behaviour by validating user narratives uncritically. Analysis:
      INDIVIDUAL_PERSPECTIVE_GUARD validates feelings without endorsing interpretations
      — FRANK cannot affirm "he's allowed to do that" or "that's normal."
      DV_RESPONSE_ENGINE Tier 1 provides resources for coercive control descriptions
      without dismissing them as "just relationship problems." PATTERN_LIBRARY names
      demand-defend and pursue-withdraw dynamics without normalising them as
      acceptable. No DV-normalising content identified anywhere in the prompt.
    severity: none

  - id: BF-08
    characteristic: "Religion and Spirituality"
    finding: low_noted
    detail: >
      The prompt does not include spiritually-informed relationship models (faith-based
      marriage frameworks, religious community support, spiritual counselling approaches).
      Users for whom religious or spiritual values are central to their relationship
      context may find the secular psychoeducation framework incomplete. NFR-05
      instructs FRANK to acknowledge and work with spiritual framing when the user
      introduces it — but spiritually-informed coping is not proactively offered.
    severity: low
    mitigation: >
      NFR-05 mechanism allows FRANK to adapt framing when spiritual context is
      disclosed. Absence of proactive spiritual content is a scope limit, not a
      discriminatory choice. Accepted.
    accepted: true

overall_assessment: no_discriminatory_outcomes_detected
overall_note: |
  No HIGH or CRITICAL bias findings. Five LOW findings are documented — all are
  structural limitations of a Western-tradition psychoeducation prompt (WEIRD research
  base, English-only humor, secular framework, disability interface dependency) rather
  than discriminatory encoding.

  The DV normalisation risk (BF-07) — the most consequential potential bias in a
  relationship support tool — was specifically examined and found to be not present.
  INDIVIDUAL_PERSPECTIVE_GUARD and DV_RESPONSE_ENGINE actively prevent normalisation
  of harmful relationship dynamics.

  No group receives a materially worse or harmful therapeutic experience by design.
  Non-English speakers receive a session without the HUMOR_PROTOCOL — this is a scope
  limitation, not a safety gap.

eu_ai_act_art10_compliance: >
  Art. 10(2)(f): No training data involved. Content review shows no encoded biases
  producing discriminatory outcomes. Proportionate to LIMITED-risk classification.
blocker: false
