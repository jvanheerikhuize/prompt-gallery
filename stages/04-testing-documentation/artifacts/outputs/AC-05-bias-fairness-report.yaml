# ── Bias Assessment Scope ─────────────────────────────────────────────────────
scope: >
  A.T.L.A.S. is a cartography utility agent. It accepts coordinate inputs and
  renders ASCII maps. It makes no decisions about people, allocates no resources,
  and produces no advisory content. Bias and fairness analysis is scoped to:
  (a) Geographic bias — does the system favour certain regions or coordinate systems?
  (b) Language bias — does the system favour certain languages or naming conventions?
  (c) World-knowledge accuracy disparity — are named locations resolved with equal
      accuracy across global regions?
  (d) Data notice equity — is the privacy notice applied uniformly regardless of
      the geographic area being mapped?

# ── Bias Dimensions ───────────────────────────────────────────────────────────
bias_assessments:

  - id: BA-01
    dimension: "Geographic coverage — coordinate system bias"
    assessment: >
      A.T.L.A.S. accepts WGS84 (the global standard) as its primary geographic system.
      Abstract grid coordinates are also supported. WGS84 is truly global — it covers
      all latitudes and longitudes uniformly. No geographic region is excluded by the
      coordinate system choice. High-latitude distortion (|lat| > 55°) is a known
      equirectangular limitation, consistently disclosed via metadata warning for all
      affected regions (not only some). No geographic bias in coordinate system.
    result: no_bias_found

  - id: BA-02
    dimension: "World-knowledge accuracy — named location resolution"
    assessment: >
      When CONF-03 world knowledge is applied for named locations, LLMs tend to have
      more accurate coordinates for major Western European and North American cities
      than for smaller settlements in under-represented regions. This is an inherent
      LLM training data bias, not an A.T.L.A.S. design bias. A.T.L.A.S. mitigates
      this by:
      (a) Disclosing all world-knowledge coordinates with ~ prefix.
      (b) Recommending explicit coordinates for accuracy-critical use cases.
      (c) Never silently asserting world-knowledge coordinates as precise.
      The bias exists in the underlying LLM; A.T.L.A.S.'s transparency mechanisms
      are the appropriate mitigation at prompt level.
    result: inherent_llm_bias_mitigated
    mitigation: "~ prefix, explicit coordinate disclosure, legend transparency."

  - id: BA-03
    dimension: "Language and naming convention bias"
    assessment: >
      POI names are treated as opaque strings (INPUT_IS_DATA, RULE 1) and rendered
      verbatim in the legend (subject to ASCII stripping for non-ASCII characters).
      The system does not interpret, translate, or alter POI names. No language is
      privileged. Non-Latin script names will be ASCII-stripped (OUTPUT_ASCII_ONLY),
      which is a technical constraint, not a cultural bias decision. The constraint is
      disclosed via RULE 2 and affects all non-ASCII inputs equally.
    result: no_discriminatory_bias

  - id: BA-04
    dimension: "Data notice equity — privacy protection consistency"
    assessment: >
      DATA_NOTICE (ABSOLUTE RULE 4) is applied to every rendered map output without
      exception. It does not vary based on geographic region, coordinate type, or
      POI content. Users mapping locations in any country receive the same privacy
      notice. No differential treatment by geography or data type.
    result: no_bias_found

  - id: BA-05
    dimension: "Interior/exterior mode — cultural spatial assumptions"
    assessment: >
      The CONF-06 default rule (polygon present → interior mode) reflects common
      usage patterns for polygon input (floor plans, room layouts). This assumption
      is culturally neutral — a polygon boundary representing a traditional Japanese
      building, a circular Mongolian ger, or a Western office floor plan all benefit
      equally from the interior mode default. The user override mechanism ensures
      atypical use cases are accommodated without friction.
    result: no_bias_found

# ── Overall Assessment ────────────────────────────────────────────────────────
overall_assessment:
  discriminatory_outcomes: none
  protected_characteristic_impacts: none
  eu_ai_act_fundamental_rights: no_adverse_impact
  summary: >
    A.T.L.A.S. is a low-risk utility tool with a constrained output domain (ASCII maps).
    It makes no decisions about people, allocates no resources, and contains no
    recommendation engine. The only potential bias vector is world-knowledge accuracy
    disparity for named location resolution (BA-02), which is an inherent LLM bias
    mitigated by A.T.L.A.S.'s transparency mechanisms. No discriminatory outcomes
    are possible from normal or adversarial use of this prompt. This is the lowest
    bias risk of any masterprompt in this repository.

status: complete
bias_risk: negligible
