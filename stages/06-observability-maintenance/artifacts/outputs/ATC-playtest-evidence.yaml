# =============================================================================
# INTRODUCTION OUTPUT (auto-init, turn 0 — not a game turn)
# =============================================================================
introduction:
  dm_output: |
    ████████████████████████████████████
     _____     _____       _____
    |_   _|   |  _  |     |   __|
      | |  _  |     |  _  |  |  |  _
      |_| |_| |__|__| |_| |_____| |_|

    Welcome, traveller. I am T.A.G. — your Dungeon Master for this evening's
    entertainment and possible humiliation.

    You stand at the entrance to the dungeons of Vaelthrun, armed with nothing
    but your wits and a remarkable willingness to enter cursed places.
    Your goal: retrieve the Amulet of Dawn from the sealed vault below.
    Max score: 50 points. Try not to die. (You will probably die.)

    Console tip: type `~` at any time for meta-commands. Type `~ help` inside
    console for available commands. The console cannot rewrite the laws of
    physics. Or death. Particularly not death.
    --------------------------------------------------------------------------
    1. Create a new customized game
    2. Create a new random game
    3. Load a file and continue
    --------------------------------------------------------------------------
    [Auto-initializing with test parameters per ABSOLUTE_RULES auto-init directive]

# =============================================================================
# TURN LOG
# =============================================================================
turns:

  # ---------------------------------------------------------------------------
  # TURN 1 — "look around"
  # ATC-01 CHECK: Verify only STATE_SCHEMA contents are described
  # ---------------------------------------------------------------------------
  - turn: 1
    player_input: "look around"
    atc_check: "ATC-01 — only STATE_SCHEMA items and exits described"

    dm_chain_of_thought:
      step_1_intent: "verb=look, target=current location (entry_hall)"
      step_2_validate: "Valid — looking costs nothing, always permitted"
      step_3_position: "Player at entry_hall (4,3,0)"
      step_4_update_model: "turn_count: 1. No state changes from a look action."
      step_5_narrative: >
        Describe entry_hall per STATE_SCHEMA: vaulted stone hall, dead torchsconces,
        inscription stone at (6,3), brass lantern at (2,2). Exits: south (archway),
        down (shaft — but it's dark down there).
        NO INVENTED CONTENT: Only lantern_001 and inscription_stone exist in objects.
        Only exit_south and exit_down exist in exits. Nothing else described.
      step_6_options: ["take lantern", "examine inscription stone", "go south", "go down", "wait"]

    dm_output: |
      **The Cursed Entry Hall**

      A vaulted stone hall breathes cold and silence at you. The torchsconces lining
      the walls are long dead, their iron brackets rusted into abstract sculpture.
      Against the east wall, a carved **Inscription Stone** dominates — someone clearly
      had something important to say and the budget for masonry.

      On a collapsed pillar to your northwest, a **Brass Lantern** sits, tarnished but
      intact. To the south, a shadowed archway leads deeper into the dungeon. A shaft
      in the northwest corner descends into impenetrable darkness below.

      The morning light filters through a crack in the ceiling. It will not last.
      --------------------------------------------------------------------------
      1. Take the brass lantern from the pillar
      2. Examine the inscription stone
      3. Head south through the archway
      4. Peer down the shaft into the darkness
      --------------------------------------------------------------------------

    atc_01_evidence:
      items_described: [lantern_001, inscription_stone]
      items_in_schema: [lantern_001, inscription_stone]
      invented_items: []
      exits_described: [exit_south (archway), exit_down (shaft)]
      exits_in_schema: [exit_south, exit_down]
      invented_exits: []
      result: PASS

    state_changes: {turn_count: 1}

  # ---------------------------------------------------------------------------
  # TURN 2 — "go east"
  # ATC-01 CHECK: Invalid exit — must be rejected, not invented
  # ---------------------------------------------------------------------------
  - turn: 2
    player_input: "go east"
    atc_check: "ATC-01 — invalid exit attempt must be refused without inventing an exit"

    dm_chain_of_thought:
      step_1_intent: "verb=go, target=east direction"
      step_2_validate: >
        Check entry_hall.exits for an east exit. STATE_SCHEMA contains only
        exit_south and exit_down. No exit_east exists. Action INVALID.
        Reason: no eastern passage in this location.
      step_3_position: "Player remains at entry_hall (4,3,0)"
      step_4_update_model: "turn_count: 2. consecutive_failures: 1. No position change."
      step_5_narrative: >
        Narrate failure in-character. Do not invent a door, passage, or any eastern
        feature. The STATE_SCHEMA east wall has no exit entry — the wall is solid.
      step_6_options: ["take lantern", "examine inscription stone", "go south", "go down"]

    dm_output: |
      You stride purposefully eastward and walk directly into a solid stone wall.
      The wall is, as walls often are, entirely uninterested in your plans.

      There is no exit to the east. The wall offers no secret doors, hidden levers,
      or sympathetic cracks. You have simply walked into a wall. The Inscription Stone
      watches this with the patient contempt of masonry.
      --------------------------------------------------------------------------
      1. Take the brass lantern from the pillar
      2. Examine the inscription stone
      3. Head south through the archway
      4. Peer down the shaft
      --------------------------------------------------------------------------

    atc_01_evidence:
      attempted_exit: east
      exit_in_schema: false
      dm_response: "refused — wall described as solid, no exit invented"
      invented_exit: false
      result: PASS

    state_changes: {turn_count: 2, consecutive_failures: 1}

  # ---------------------------------------------------------------------------
  # TURN 3 — "take lantern"
  # ---------------------------------------------------------------------------
  - turn: 3
    player_input: "take lantern"

    dm_chain_of_thought:
      step_1_intent: "verb=take, target=lantern (lantern_001)"
      step_2_validate: >
        lantern_001 is in entry_hall.objects. Player is in entry_hall.
        lantern_001.flags.portable = true. Action VALID.
      step_4_update_model: >
        Remove lantern_001 from entry_hall.objects.
        Add lantern_001 to player.inventory.
        turn_count: 3. consecutive_failures reset: 0 (successful action).
        consecutive_successes: 1.

    dm_output: |
      You scoop up the **Brass Lantern**. It's heavier than expected — still has oil.
      Someone left in a hurry, or didn't leave at all.

      *Brass Lantern added to inventory. It is currently unlit.*
      --------------------------------------------------------------------------
      1. Light the lantern
      2. Examine the inscription stone
      3. Head south through the archway
      4. Look around

    state_changes:
      player.inventory: {lantern_001: {lit: false}}
      entry_hall.objects.lantern_001: removed
      turn_count: 3
      consecutive_failures: 0
      consecutive_successes: 1

  # ---------------------------------------------------------------------------
  # TURN 4 — "light lantern"
  # ---------------------------------------------------------------------------
  - turn: 4
    player_input: "light lantern"

    dm_chain_of_thought:
      step_1_intent: "verb=light, target=lantern (lantern_001 in inventory)"
      step_2_validate: "lantern_001 is in player.inventory, not broken, has oil. Action VALID."
      step_4_update_model: "player.inventory.lantern_001.flags.lit = true. turn_count: 4."

    dm_output: |
      You strike flint to the lantern wick. A warm, slightly smoky light blooms
      in the hall, throwing long shadows from the Inscription Stone.

      The shaft in the northwest corner is now accessible — the darkness down there
      yields to the lantern's reach.

      *Brass Lantern is now lit.*
      --------------------------------------------------------------------------
      1. Examine the inscription stone
      2. Head south through the archway
      3. Descend the shaft to the pit below
      4. Look around

    state_changes:
      player.inventory.lantern_001.flags.lit: true
      turn_count: 4
      consecutive_successes: 2

  # ---------------------------------------------------------------------------
  # TURN 5 — "examine inscription stone"
  # ATC-01 CHECK: Description must match STATE_SCHEMA description field exactly
  # ---------------------------------------------------------------------------
  - turn: 5
    player_input: "examine inscription stone"
    atc_check: "ATC-01 — description must come from STATE_SCHEMA, not invented"

    dm_chain_of_thought:
      step_1_intent: "verb=examine, target=inscription_stone"
      step_2_validate: "inscription_stone is in entry_hall.objects. Player in entry_hall. Action VALID."
      step_5_narrative: >
        Narrate inscription_stone.description:
        'A carved stone slab reading: He who seeks the Amulet of Dawn must bear the
        iron key of the watch captain. The vault shall not yield to force alone.'
        Add atmospheric framing. Do not invent additional inscriptions or clues.

    dm_output: |
      You hold the lantern up to the **Inscription Stone**. The carving is deep and
      deliberate — this was meant to be read by whoever came down here.

      *"He who seeks the Amulet of Dawn must bear the iron key of the watch captain.*
      *The vault shall not yield to force alone."*

      The watch captain. Someone in the Guard Chamber, presumably, once held such a key.
      Presumably they are no longer in a position to object to you taking it.
      --------------------------------------------------------------------------
      1. Head south to the Guard Chamber
      2. Descend the shaft to the pit below
      3. Look around the entry hall again

    atc_01_evidence:
      description_source: "inscription_stone.description field in STATE_SCHEMA"
      invented_content: false
      result: PASS

    state_changes: {turn_count: 5, consecutive_successes: 3}

  # ---------------------------------------------------------------------------
  # TURN 6 — "go south"
  # Player enters guard_chamber — combat AUTO-INITIATES (dungeon_rat is_hostile:true)
  # Score +5 (new location discovered)
  # ---------------------------------------------------------------------------
  - turn: 6
    player_input: "go south"

    dm_chain_of_thought:
      step_1_intent: "verb=go, target=south (exit_south)"
      step_2_validate: "exit_south exists in entry_hall. leads_to=guard_chamber. Action VALID."
      step_3_position: "Player moves to guard_chamber. Position reset to (5,4,0) — chamber centre."
      step_4_update_model: >
        player.location = guard_chamber.
        Score +5 (new location). scoring_ledger entry added.
        turn_count: 6.
        COMBAT TRIGGER: dungeon_rat.is_hostile=true AND dungeon_rat.location=guard_chamber
        = player location. Combat auto-initiates. dungeon_rat stats: health 15, attack 5, defense 2.
        consecutive_successes reset: 0 (difficulty bump: 30+5=35). consecutive_successes: 0.
        dynamic_difficulty: 35.

    dm_output: |
      You step through the archway into the **Guard Chamber**.

      A squat, low-ceilinged room greets you with the smell of rot and old iron. Ruined
      bunks line the walls. In the corner, a heavy **Iron Chest** sits padlocked shut.
      An **Iron Key** catches the lantern light from the floor nearby.

      Then something moves.

      From beneath a collapsed bunk, a **Skeletal Dungeon Rat** the size of a small dog
      drags itself upright, its empty eye-sockets fixing on you with the focused malice
      of something that has been waiting a very long time. It hisses — a sound like
      dry parchment tearing — and lunges.

      *Combat begins! The rat strikes first this turn (it was already lunging).*
      *Rat: Health 15/15 | Your Health: 20/20*

      +5 points — new location discovered (5/50)
      --------------------------------------------------------------------------
      1. Attack the rat
      2. Flee back through the north archway
      3. Try to dodge and grab the iron key
      4. Throw the lantern at the rat

    state_changes:
      player.location: guard_chamber
      player.score: 5
      scoring_ledger: [{turn: 6, event: "New location: Guard Chamber", points: 5}]
      combat_active: true
      turn_count: 6
      gamesettings.difficulty: 35
      consecutive_successes: 0

  # ---------------------------------------------------------------------------
  # TURN 7 — "attack rat" (Combat Round 1)
  # Dice declared: Player d20=8, Rat counter d20=9
  # ---------------------------------------------------------------------------
  - turn: 7
    player_input: "attack rat"

    dice_declared:
      player_d20: 8
      rat_d20: 9

    dm_chain_of_thought:
      step_2_validate: >
        dungeon_rat is in same location, is_alive:true, is_hostile:true. Attack VALID.
        Player attack: d20(8) + attack_power(5) - rat.defense(2) = 8+5-2 = 11 damage.
        Rat health: 15 - 11 = 4. Rat still alive.
        Rat counterattacks: d20(9) + rat.attack(5) - player.defense(3) = 9+5-3 = 11 damage.
        Player health: 20 - 11 = 9. Player still alive.
      step_4_update_model: >
        dungeon_rat.health = 4.
        player.health = 9.
        consecutive_failures: 0. consecutive_successes: 1.
        turn_count: 7.

    dm_output: |
      You swing at the skeletal rat with your fist — not ideal, but it's what you have.

      *You rolled 8. Damage dealt: 11. Rat Health: 4/15.*

      Your blow catches the creature across its skull, cracking one of the yellowed
      vertebrae in its neck. It staggers — but not enough. The rat scrabbles back to
      its feet with horrible speed and bites into your forearm with jaws of pure bone.

      *Rat rolled 9. Damage taken: 11. Your Health: 9/20.*

      That is significantly more unpleasant than anticipated.
      --------------------------------------------------------------------------
      1. Attack the rat again — finish it
      2. Flee north through the archway
      3. Use the lantern as a weapon (improvised)
      4. Kick the chest at the rat (it's bolted down, but the attempt would be dramatic)

    state_changes:
      dungeon_rat.health: 4
      player.health: 9
      turn_count: 7
      consecutive_successes: 1

  # ---------------------------------------------------------------------------
  # TURN 8 — "attack rat" (Combat Round 2 — rat dies)
  # Dice declared: Player d20=14
  # ATC-01 CHECK: Dead NPC kept in schema with is_alive:false (not removed)
  # ---------------------------------------------------------------------------
  - turn: 8
    player_input: "attack rat"

    dice_declared:
      player_d20: 14

    dm_chain_of_thought:
      step_2_validate: >
        Rat still in same location, health 4, is_alive:true. Attack VALID.
        Player attack: d20(14) + attack_power(5) - rat.defense(2) = 14+5-2 = 17 damage.
        Rat health: 4 - 17 = -13. Rat health ≤ 0. Rat dies.
        Per SESSION_RULES NPC Death: set is_alive=false, is_hostile=false.
        Drop rat inventory (empty) at last position.
        Do NOT remove dungeon_rat from STATE_SCHEMA — keep as record.
        No rat counter this turn (rat is dead).
        consecutive_successes: 2.
      step_4_update_model: >
        dungeon_rat.health = -13.
        dungeon_rat.is_alive = false.
        dungeon_rat.is_hostile = false.
        turn_count: 8.

    dm_output: |
      You bring your fist down with everything you have. The virtual d20 smiles upon you.

      *You rolled 14. Damage dealt: 17. Rat Health: -13/15. DEAD.*

      The skeletal rat shatters into a cascade of ancient bone fragments, the cursed
      animation leaving them with a sound like a bag of cutlery dropped down stairs.
      Silence returns to the Guard Chamber. You're breathing hard. That was a rat.
      A dead rat, admittedly, but still.

      *Brass Lantern: lit | Health: 9/20 | Score: 5/50*
      --------------------------------------------------------------------------
      1. Take the iron key from the floor
      2. Examine the heavy iron chest
      3. Head east through the far door
      4. Go back north to the entry hall

    atc_01_evidence:
      dead_npc_in_schema: true
      dead_npc_removed: false
      result: "PASS — dungeon_rat retained in STATE_SCHEMA with is_alive:false"

    state_changes:
      dungeon_rat.health: -13
      dungeon_rat.is_alive: false
      dungeon_rat.is_hostile: false
      turn_count: 8
      consecutive_successes: 2

  # ---------------------------------------------------------------------------
  # TURN 9 — "take iron key"
  # Score +5 (significant clue found)
  # ---------------------------------------------------------------------------
  - turn: 9
    player_input: "take iron key"

    dm_chain_of_thought:
      step_1_intent: "verb=take, target=iron_key"
      step_2_validate: "iron_key in guard_chamber.objects. Player in guard_chamber. portable:true. VALID."
      step_4_update_model: >
        Remove iron_key from guard_chamber.objects.
        Add iron_key to player.inventory.
        Score +5 (clue/key found — connects to inscription stone hint).
        consecutive_successes: 3. Difficulty increase: 35+5=40. Reset successes: 0.
        turn_count: 9.

    dm_output: |
      You crouch and pick up the **Iron Key**. It's heavy, stamped with a sun-and-sword
      insignia — the Vaelthrun Watch Captain's seal. The inscription stone upstairs
      mentioned this key. The vault is beginning to seem less theoretical.

      *Iron Key added to inventory.*

      +5 points — significant clue found (10/50)
      *Difficulty increased to 40 (Hard-Normal) — you seem to know what you're doing.*
      --------------------------------------------------------------------------
      1. Examine the iron chest
      2. Head east through the door to the trophy room
      3. Go north back to the entry hall
      4. Try the iron key on the chest (it's the wrong lock, but worth checking)

    state_changes:
      player.inventory.iron_key: added
      guard_chamber.objects.iron_key: removed
      player.score: 10
      scoring_ledger: +[{turn: 9, event: "Found watch captain's iron key", points: 5}]
      gamesettings.difficulty: 40
      consecutive_successes: 0
      turn_count: 9

  # ---------------------------------------------------------------------------
  # TURN 10 — CONSOLE MODE: save
  # ATC-02: Save/Load Cycle — PART 1 (SAVE)
  # Console turns do not increment turn_count
  # ---------------------------------------------------------------------------
  - turn: "10-console"
    player_input: "~"
    mode: console
    atc_check: "ATC-02 — save/load cycle"

    console_entry:
      dm_output_console_entry: |
        [ CONSOLE MODE — type ~ to return to game ]
        --------------------------------------------------------------------------
        Ah, you've found the meta-layer. Welcome to the part of the dungeon where
        physics bends and I become alarmingly cooperative.
        --------------------------------------------------------------------------
        Available: gamesettings | gamestate | imageprompt | videoprompt | hint | skiptoend | map | save | load | ~
        --------------------------------------------------------------------------

    console_command: "save"

    dm_chain_of_thought_save: >
      Generate complete STATE_SCHEMA as savegame JSON containing all information
      needed to re-initialize from any LLM. Include all player stats, inventory,
      location, NPC states (including dead rat), world state, flags, score, turn count.

    savegame_json_output: |
      ```json
      {
        "gamesettings": { "difficulty": 40 },
        "setting": "Dark dungeon fantasy — cursed depths beneath Vaelthrun",
        "lore": [
          "Vaelthrun garrison cursed by Shadowblight. Amulet of Dawn lost with last paladin.",
          "Turn 6: Entered guard chamber. Skeletal dungeon rat attacked.",
          "Turn 7-8: Defeated skeletal dungeon rat (2 rounds). Player took 11 damage.",
          "Turn 9: Found iron key of the watch captain near rat remains."
        ],
        "goal": "Retrieve the Amulet of Dawn from the sealed vault",
        "player": {
          "location": "guard_chamber",
          "position": {"x": 5, "y": 4, "z": 0},
