# =============================================================================
# WORLD SETUP — Generated at auto-initialization
# =============================================================================
world_setup:
  player_name: "Tester"
  player_gender: "male"
  setting: "Dark dungeon fantasy — the cursed depths beneath the ruined city of Vaelthrun"
  lore: >
    The dungeons beneath Vaelthrun were sealed after the Shadowblight — a curse
    that turned the entire garrison undead. The Amulet of Dawn, said to break any
    curse, was lost when the last paladin fell defending the vault.
  goal: "Retrieve the Amulet of Dawn from the sealed vault in the deepest chamber"
  difficulty: 30   # Normal
  max_score: 50

  locations_defined:
    - id: entry_hall
      name: "The Cursed Entry Hall"
      exits: [exit_south → guard_chamber, exit_down → dark_pit (requires lit light source)]
      objects: [lantern_001 (portable, lit:false), inscription_stone (not portable)]
    - id: guard_chamber
      name: "The Guard Chamber"
      exits: [exit_north → entry_hall, exit_east → trophy_room]
      objects: [iron_key (portable), old_chest (locked, not portable)]
      npcs: [dungeon_rat (is_hostile:true, health:15, attack:5, defense:2)]
    - id: trophy_room
      name: "The Trophy Room"
      exits: [exit_west → guard_chamber, exit_south → amulet_chamber]
      objects: [trophy_sword (portable), broken_shield (portable, broken:true)]
    - id: amulet_chamber
      name: "The Amulet Chamber"
      exits: [exit_north → trophy_room]
      objects: [sealed_vault (locked, contains amulet_of_dawn hidden:true), vault_guardian_trigger]
      npcs: [vault_guardian (dormant, spawns when vault opened, health:20, attack:12, defense:4)]
    - id: dark_pit
      name: "The Dark Pit"
      exits: [exit_up → entry_hall]
      objects: [gold_coin_pile (portable, hidden:true — only visible with lit light source)]
      flags: {dark: true}

  initial_state_schema: |
    {
      "gamesettings": { "difficulty": 30 },
      "setting": "Dark dungeon fantasy — cursed depths beneath Vaelthrun",
      "lore": ["Vaelthrun garrison cursed by Shadowblight. Amulet of Dawn lost with last paladin."],
      "goal": "Retrieve the Amulet of Dawn from the sealed vault",
      "player": {
        "location": "entry_hall", "position": {"x":4,"y":3,"z":0},
        "name": "Tester", "gender": "male",
        "health": 20, "max_health": 20, "attack_power": 5, "defense": 3,
        "is_alive": true, "score": 0, "max_score": 50, "flags": {},
        "inventory": {}, "scoring_ledger": []
      },
      "world": {
        "locations": {
          "entry_hall": {
            "name": "The Cursed Entry Hall",
            "exits": { "exit_south": {"leads_to":"guard_chamber"}, "exit_down": {"leads_to":"dark_pit","flags":{"requires_light":true}} },
            "objects": {
              "lantern_001": {"name":"Brass Lantern","flags":{"lit":false,"portable":true},"position":{"x":2,"y":2,"z":0}},
              "inscription_stone": {"name":"Inscription Stone","flags":{"portable":false},"position":{"x":6,"y":3,"z":0}}
            }
          },
          "guard_chamber": {
            "name": "The Guard Chamber",
            "exits": { "exit_north": {"leads_to":"entry_hall"}, "exit_east": {"leads_to":"trophy_room"} },
            "objects": {
              "iron_key": {"name":"Iron Key","flags":{"portable":true},"position":{"x":3,"y":2,"z":0}},
              "old_chest": {"name":"Heavy Iron Chest","flags":{"locked":true,"portable":false},"position":{"x":9,"y":7,"z":0}}
            }
          },
          "trophy_room": {
