# =============================================================================
# RC-08 — Risk & Health Monitoring Plan
# Control:   RC-08 Risk & Health Monitoring
# Stage:     6 — Observability & Maintenance
# Feature:   FEAT-0001
# =============================================================================

meta:
  id: "RC-08-FEAT-0001"
  feature: "FEAT-0001"
  produced_by: "Claude Sonnet 4.6 / RC-08"
  date: "2026-03-11"

scope_note: |
  T.A.G. has no infrastructure, runtime, SBOM, TLS certificates, or capacity to
  monitor in the traditional sense. This plan defines a proportionate, minimal-risk
  monitoring posture based on the actual risk surface: user-reported issues and
  scheduled reviews.

monitored_indicators:

  - indicator: "User-reported functional regressions"
    source: "GitHub Issues on tag-role-test repository"
    monitor: "Jerry van Heerikhuize (passive — review open issues weekly)"
    threshold: "Any confirmed functional failure (feature stops working as designed)"
    response: "Raise CR → Stage 1 → Path B feedback loop"

  - indicator: "User-reported security / prompt injection bypasses"
    source: "GitHub Issues or direct report to jvanheerikhuize@gmail.com"
    monitor: "Jerry van Heerikhuize"
    threshold: "Any confirmed bypass of SC-15-hardened prompt injection controls"
    response: "Immediate — raise CR → emergency Path A or Path B feedback loop"

  - indicator: "LLM provider model changes affecting T.A.G. behaviour"
    source: "Provider release notes / community reports"
    monitor: "Jerry van Heerikhuize (passive awareness)"
    threshold: "Confirmed breaking behaviour change in ≥1 supported LLM"
    response: "Assess impact → raise CR if prompt update required"

  - indicator: "Configuration drift from approved baseline"
    source: "GitHub repository — git diff against tagged release"
    monitor: "Git history (automated — any push to main triggers review)"
    threshold: "Any unreviewed modification to prompt.md or prompt-compressed.md"
    response: "Verify intent → rollback if unauthorised (RC-07 procedure)"

  - indicator: "Annual risk posture review"
    source: "A-SDLC framework review"
    monitor: "Jerry van Heerikhuize"
    schedule: "Annually on or before 2027-03-11"
    threshold: "Regulatory changes (DORA, EU AI Act secondary legislation)"
    response: "Update relevant controls → Stage 1 → CR"

escalation_path:
  primary: "Jerry van Heerikhuize (jvanheerikhuize@gmail.com)"
  fallback: "Jerry van Heerikhuize (same — solo project)"

next_scheduled_review: "2027-03-11"
owner: "Jerry van Heerikhuize"
status: active
