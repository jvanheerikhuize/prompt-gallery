# =============================================================================
# AC-06 — AI Post-Market Surveillance Plan
# Control:   AC-06 AI Post-Market Surveillance
# Stage:     6 — Observability & Maintenance
# Feature:   FEAT-0001
# =============================================================================

meta:
  id: "AC-06-FEAT-0001"
  feature: "FEAT-0001"
  ai_tier: minimal
  produced_by: "Claude Sonnet 4.6 / AC-06"
  date: "2026-03-11"

regulatory_basis:
  eu_ai_act_art72: |
    Art. 72 post-market monitoring obligations apply primarily to high-risk AI
    systems (Annex III). T.A.G. is classified minimal-risk. This plan applies
    Art. 72 proportionately.
  eu_ai_act_art73: |
    Art. 73 serious incident reporting applies to providers of high-risk AI
    systems. T.A.G. is minimal-risk. Serious incident reporting obligations
    are not mandated but a voluntary procedure is documented here.

performance_monitoring:

  - metric: "Prompt functional correctness"
    definition: "Users report the prompt produces coherent, rule-consistent gameplay"
    monitoring_method: "GitHub Issues — community-reported bugs"
    review_frequency: "Weekly passive review; formal review annually"
    owner: "Jerry van Heerikhuize"
    threshold: "≥1 confirmed functional failure per release triggers CR"

  - metric: "Prompt injection resilience"
    definition: "ABSOLUTE_RULES and console RESTRICTION hold under user testing"
    monitoring_method: "Community reports and self-testing"
    review_frequency: "On report; annual re-test against SC-15 vectors"
    owner: "Jerry van Heerikhuize"
    threshold: "Any confirmed bypass triggers immediate CR"

bias_retesting:
  schedule: "Annually on or before 2027-03-11"
  method: "Repeat AC-05 content analysis against updated prompt version"
  trigger_for_unscheduled: "Any user report of discriminatory or harmful narrative output"
  owner: "Jerry van Heerikhuize"

serious_incident_definition: |
  For minimal-risk T.A.G., a 'serious AI incident' (voluntary definition) would be:
  - The prompt reliably produces content that causes real-world harm to a user
  - The prompt is weaponised at scale for harassment or harmful purposes
  - A confirmed security vulnerability in the prompt is actively exploited

serious_incident_response:
  1: "Document the incident with evidence"
  2: "Assess severity and scope"
  3: "Initiate rollback (RC-07) if prompt is the root cause"
  4: "Raise CR → Stage 1 for fix"
  5: "Voluntarily notify if exploitation is confirmed at scale"

technical_documentation_currency:
  requirement: "FEAT-0001 spec and all stage artefacts remain current"
  review: "Annual review by Jerry van Heerikhuize; update on any CR"
  current_as_of: "2026-03-11 (v2.1 release)"

next_surveillance_review: "2027-03-11"
owner: "Jerry van Heerikhuize"
status: active
