rationale: |
  T.A.G. is a plain-text prompt with no runtime service, no API endpoints, no
  servers, and no infrastructure. There are no SLIs (latency, availability,
  error rate, throughput) to measure and no error budget to track. Traditional
  SLA/SLO monitoring is not applicable.

proportionate_alternative: |
  Quality is monitored through user feedback (GitHub issues) and the scheduled
  annual review defined in RC-08. Any reported functional regression is treated
  as a feedback loop trigger (Path B) and enters Stage 1 as a new change request.

