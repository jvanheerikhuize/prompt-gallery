# =============================================================================
# RC-04 — Decision Log
# Control:   RC-04 Decision Log
# Stage:     3 — Coding & Implementation
# Feature:   FEAT-0006 — ASCII Cartographer Masterprompt — A.T.L.A.S.
# =============================================================================

meta:
  id: "RC-04-FEAT-0006"
  feature: "FEAT-0006"
  produced_by: "Claude Sonnet 4.6 (Implementer / RC-04)"
  date: "2026-03-15"

decisions:

  - id: DEC-01
    title: "Prompt output format — plain text, no markdown fences"
    context: >
      The design specified 7-bit ASCII output (NFR-02). The question arose whether the
      prompt itself should be delivered in a markdown code block (as per repository
      convention in prompt.md files) or whether the agent's runtime output should also
      use a code block.
    decision: >
      The prompt.md file wraps the masterprompt in a code block for readability (repository
      convention). The agent's runtime output (the actual rendered map) is explicitly
      specified as plain text only — Step 11 of REQUEST_LOOP states: "Output is plain text
      only. No markdown fences, no HTML, no code blocks." This distinction prevents the
      agent from wrapping its map in backticks, which would waste characters and potentially
      misalign monospace rendering.
    rationale: "Consistent with NFR-02 and prior masterprompts in this repository."
    decided_by: "Claude Sonnet 4.6 (Implementer)"

  - id: DEC-02
    title: "Interior mode header line placement — above map, not inside border"
    context: >
      COMP-04a specified that INTERIOR mode should be identified in the map output.
      Options were: (a) a header line above the map border, (b) a line inside the top border,
      (c) metadata-only notation.
    decision: >
      One-line header above the map border: "[ INTERIOR MAP — {W}x{H} ]"
      This is the clearest signal to the user that they are viewing an interior floor plan
      before they start reading the map. Metadata also records mode for machine-readable use.
    rationale: >
      Placing text inside the border would consume an interior canvas row and push the compass
      rose. Metadata-only notation is too subtle for a significant behavioural change (walls
      vs no walls). Header above the border is unambiguous and costs nothing.
    decided_by: "Claude Sonnet 4.6 (Implementer)"

  - id: DEC-03
    title: "Compass rose embedded in canvas — rendering layer order"
    context: >
      The compass rose occupies the top-right corner cells of the interior canvas. POI labels
      placed in the same corner could collide. The design did not specify which takes precedence.
    decision: >
      The MAP_CANVAS rendering order places the compass rose on layer 2 (after filling with
      spaces but before walls and POIs). POI labels placed via POI_PLACER (layer 5) will
      overwrite the compass rose characters if they collide. The right-preferring label
      placement logic will attempt to avoid the top-right corner; if it cannot, the POI wins.
      Compass rose degradation is noted in metadata if a POI label overwrites it.
    rationale: >
      POI accuracy is a MUST requirement (NFR-01, PRECISION_HONEST); compass rose is decorative.
      POI information must always win over decoration.
    decided_by: "Claude Sonnet 4.6 (Implementer)"

  - id: DEC-04
    title: "Abstract grid scale bar — omit bar, use text only"
    context: >
      For abstract grid coordinates, km_per_col is meaningless. The scale bar cannot use a
      proportional bar since there is no real-world distance reference.
    decision: >
      For abstract coordinates: omit the proportional bar entirely. Replace with a single text
      line: "Scale: 1 grid unit = 1 cell". This is honest and informative without fabricating
      a scale relationship that does not exist.
    rationale: "PRECISION_HONEST (ABSOLUTE RULE 3) prohibits representing metrics that are not meaningful."
    decided_by: "Claude Sonnet 4.6 (Implementer)"

  - id: DEC-05
    title: "Polygon vertex deduplication — silent or noted"
    context: >
      BOUNDARY_PARSER deduplicates adjacent vertices that project to the same grid cell.
      The question was whether to note this in metadata or perform it silently.
    decision: >
      Always note deduplicated vertices in metadata: "Vertex V[i] deduplicated — maps to same
      cell as V[i-1] at projected resolution." This is consistent with PRECISION_HONEST and
      the general transparency principle. The user should know their polygon was simplified.
    rationale: "Silent simplification could mislead the user about their boundary shape."
    decided_by: "Claude Sonnet 4.6 (Implementer)"

  - id: DEC-06
    title: "POI outside boundary polygon — render or error"
    context: >
      In INTERIOR mode, a user may provide POI coordinates that fall outside the defined
      boundary polygon. Options: error (reject), silently plot, or plot with notation.
    decision: >
      Plot the POI at its correct grid position and note in legend: "[X] [outside boundary]".
      Do not error. The user may intentionally want to show an external reference point
      relative to their interior space. PRECISION_HONEST is satisfied — the position is correct,
      and the exterior relationship is disclosed.
    rationale: >
      Rejecting would be overly strict; silent plotting would hide useful information.
      Notation is the minimal-friction, maximally-transparent approach.
    decided_by: "Claude Sonnet 4.6 (Implementer)"

  - id: DEC-07
    title: "Wall character for EXTERIOR polygon — period (.) vs dashes"
    context: >
      EXTERIOR mode with a polygon was specified as "dashed perimeter". The exact character
      was not specified in the design — options included . (period), ~ (tilde), or a
      repeating - pattern.
    decision: >
      Use . (period) for all EXTERIOR perimeter cells. Period is the lightest ASCII character,
      clearly distinct from the solid wall characters (|, -, +, /, \), and visually resembles
      a soft or permeable boundary. Consistent with common ASCII art conventions.
    rationale: "Distinct from INTERIOR wall characters; unambiguous; 7-bit clean."
    decided_by: "Claude Sonnet 4.6 (Implementer)"

  - id: DEC-08
    title: "Prompt file location — roles/utility/ (new category)"
    context: >
      A.T.L.A.S. is the first utility-category agent in this repository. No roles/utility/
      directory existed. Options: place in an existing category or create roles/utility/.
    decision: >
      Create roles/utility/ascii-cartographer/. The utility category was established in
      Stage 1 (QC-01) and approved by the PO. Creating the directory at Stage 3 is the
      correct implementation of that decision. Registry and README updated accordingly.
    rationale: "Consistent with Stage 1 design decision; clean category separation."
    decided_by: "Claude Sonnet 4.6 (Implementer)"
