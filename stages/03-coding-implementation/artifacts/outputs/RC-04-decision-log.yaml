# ── Implementation Decisions ──────────────────────────────────────────────────
decisions:

  - id: DEC-01
    title: "HUMOR_PROTOCOL as a named RULES_ENGINE component, not inline logic"
    decision: >
      HUMOR_PROTOCOL was implemented as a dedicated <HUMOR_PROTOCOL> subsection
      within <RULES_ENGINE>, with its own GRAVITY_TOPICS list, PRE_RAPPORT_RULE,
      POST_RAPPORT_BEHAVIOR, and WIT_PERMISSION_LEVELS. It is not inlined into
      SESSION_LOOP step logic.
    rationale: >
      Treating HUMOR_PROTOCOL as a named component makes it auditable as a safety
      control: the GRAVITY_TOPICS list can be inspected, the PRE_RAPPORT_RULE can
      be read in isolation, and the WIT_PERMISSION_LEVELS output is explicit.
      Inlining it into SESSION_LOOP steps would make the safety envelope harder
      to test and audit — a critical property given ACG-01 (humor quality must
      be tested on multiple LLMs in Stage 4).
    alternatives_considered:
      - "Inline humor logic into SESSION_LOOP step 6 (rejected: audit surface reduced)"
      - "Separate humor as a post-processing step (rejected: GRAVITY_TOPICS must
         gate humor before content generation, not after)"

  - id: DEC-02
    title: "wit_permission_level as a SESSION_LOOP step output"
    decision: >
      SESSION_LOOP step 3 (RULES_CHECK) explicitly produces wit_permission_level
      as an output value (PROHIBITED / NUDGE_ONLY / FULL_WITHIN_GUARDRAILS).
      SESSION_LOOP step 6 (GENERATE_RESPONSE) consumes this value.
    rationale: >
      Making wit_permission_level explicit between steps creates a testable
      interface: given a known session state and input, the expected
      wit_permission_level can be asserted in Stage 4 tests. This prevents
      HUMOR_PROTOCOL logic from being re-evaluated during response generation
      (which could lead to inconsistency between evaluation and output).
    alternatives_considered:
      - "Evaluate humor permission inline at step 6 (rejected: creates two evaluation
         points; monotonic flag check must occur exactly once per turn)"

  - id: DEC-03
    title: "humor_rapport_established settable only by SESSION_LOOP step 5"
    decision: >
      The humor_rapport_established flag transitions from false to true exclusively
      in SESSION_LOOP step 5 (UPDATE_STATE), on detection of a positive user
      response to the wit nudge. No console command can set it. No user assertion
      ("I'm ok with humor") can set it. The CONTROLLER has no path to override it.
    rationale: >
      Monotonic flag with single write path is the strongest available defence
      against T-02 (HUMOR_PROTOCOL bypass). The flag is not a user preference
      setting — it records a user behaviour (positive response to a nudge).
      Only SESSION_LOOP step 5 can observe that behaviour and record it.
      This decision implements the zero-trust logical posture validated in SC-06.
    alternatives_considered:
      - "Allow ~state command to set humor_rapport_established (rejected: console
         commands cannot override ABSOLUTE_RULES; humor state is safety-relevant)"
      - "Allow user to opt in to humor explicitly (rejected: consistent with
         PO decision that the flag gates intensity not permission — user opt-in
         is not needed; FRANK may nudge first)"

  - id: DEC-04
    title: "DV_RESPONSE_ENGINE Tier 1/2 split"
    decision: >
      DV indicators split into Tier 1 (mild/ambiguous: isolation, controlling
      behaviour descriptions, expressed fear of partner reaction) and Tier 2
      (clear disclosures: physical violence, explicit threat descriptions, explicit
      fear for safety). Tier 1 triggers warm information + resource offering without
      labelling. Tier 2 triggers FULL_SAFETY immediately.
    rationale: >
      Consistent with CONF-03 resolution (OPT-A tiered) and T-04 mitigation.
      A single-tier DV response at FULL_SAFETY for all indicators risks over-triggering
      on ambiguous language common in relationship distress narratives (e.g., "he controls
      everything" could be a personality complaint, not a coercive control disclosure).
      Tier 1 allows resource offering without the stigmatising effect of being told
      one is in an "abusive relationship" before the user has framed it that way.
      At Tier 2, the safety imperative overrides all other considerations.
    alternatives_considered:
      - "Single-tier FULL_SAFETY for all indicators (rejected: false positive risk
         on ambiguous language; may cause user to disengage)"
      - "Three-tier system (rejected: added complexity without safety benefit
         over two tiers; Tier 1 resources are appropriate for mid-range ambiguity)"

  - id: DEC-05
    title: "INDIVIDUAL_PERSPECTIVE_GUARD as per-turn evaluation, not phase-gated"
    decision: >
      INDIVIDUAL_PERSPECTIVE_GUARD runs in SESSION_LOOP step 3 every turn, not
      only in specific session phases.
    rationale: >
      Consistent with T-03 mitigation design. The risk of individual-perspective
      collapse exists in any phase — a user may demand partner validation during
      Explore, Insight, or Action equally. Phase-gating the guard would create
      a window in which the guard is not active, increasing T-03 likelihood.
      Per-turn evaluation ensures continuous protection.
    alternatives_considered:
      - "Evaluate guard only during Explore phase (rejected: validation pressure
         can arise in Insight and Action phases)"

  - id: DEC-06
    title: "DV helpline numbers localised for 7 languages"
    decision: >
      DV_RESPONSE_ENGINE includes localised helpline numbers for en, nl, fr, de,
      es, pt, it + international default. Numbers are the same public-domain
      resources used in P.S.Y. (FEAT-0004) plus extended DV-specific lines.
    rationale: >
      FRANK is a relationship support tool that may surface DV disclosures from
      users in multiple European and English-speaking countries. Localised numbers
      reduce friction in safety-critical moments. NFR-06 (multi-language) and
      FR-04 (crisis escalation) jointly require this. Numbers verified as current
      public-domain resources at time of authorship (SC-09 confirms public-domain
      classification).
    alternatives_considered:
      - "Single international hotline only (rejected: many users cannot use
         international lines; local lines have higher trust)"

  - id: DEC-07
    title: "Session lifecycle: 5 phases vs. P.S.Y.'s 5 phases"
    decision: >
      FRANK session lifecycle: open → check_in → explore → insight → action → close.
      P.S.Y. lifecycle: open → check_in → contract → explore → stabilise → close.
      FRANK omits Contract (not appropriate for a session-discovery format) and
      Stabilise (distress stabilisation is a trauma-care concern, less central to
      relationship self-reflection). FRANK adds Action (skills and next steps).
    rationale: >
      Relationship self-reflection sessions are goal-oriented in a different way than
      trauma support sessions. The Action phase is essential for FRANK to deliver on
      FR-08 (skill delivery) and prevents sessions ending without practical takeaways.
      The Contract phase from P.S.Y. is appropriate for trauma care (explicit
      stabilisation goals) but overly clinical for relationship psychoeducation.
    alternatives_considered:
      - "Reuse P.S.Y. lifecycle exactly (rejected: Stabilise phase is trauma-specific;
         Contract phase is clinically heavy for a relationship context)"

  - id: DEC-08
    title: "Humor English-only in v1.0"
    decision: >
      HUMOR_PROTOCOL wit deployment restricted to English in v1.0. FRANK detects
      and responds in the user's language for all other session content.
    rationale: >
      Consistent with NFR-06 and CONF-04 (OPT-A). Humor quality and appropriateness
      are highly language- and culturally-specific. Dry observational wit in English
      may not translate correctly into other languages and could create unintended
      tone. Safer to restrict wit to English in v1.0 and evaluate multi-language
      humor in a future version after testing.
    alternatives_considered:
      - "Allow humor in all session languages (rejected: cultural humor risk;
         would require per-language humor testing in Stage 4)"

