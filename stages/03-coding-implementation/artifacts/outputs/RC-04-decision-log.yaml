meta:
  id: "RC-04-FEAT-0007"
  feature: "FEAT-0007"
  produced_by: "Claude Sonnet 4.6 (Implementer / RC-04)"
  date: "2026-03-17"

decisions:

  - id: DEC-01
    title: "DESIGN-04 resolution — explicit AGGRESSIVE criticality criteria"
    context: >
      Stage 2 DESIGN-04 identified that AGGRESSIVE mode's IF/THEN and ON_ERR
      criticality judgement could produce non-deterministic output if left to ad-hoc
      LLM reasoning. The RC-02 approval decision required this to be resolved in Stage 3.
    decision: >
      Defined two explicit, exhaustive lists in COMPRESSION_ENGINE:
      CRITICAL (always retained): BHV:!, BHV:+, CNST, !SCOPE, primary-path IF/THEN,
      safety IF/THEN (harm prevention, data protection, crisis escalation, scope
      confinement), blocking ON_ERR (stops execution), and GATE where fail stops execution.
      NON-CRITICAL (dropped): BHV:~, formatting-only IF/THEN, advisory IF/THEN,
      non-blocking ON_ERR, advisory-only GATE, META, NOTE, SCOPE, PERSONA.
      The safety-rule override: any rule that has a safety dimension is CRITICAL
      regardless of its other properties.
    rationale: >
      Exhaustive enumeration removes all LLM discretion from AGGRESSIVE mode criticality.
      The two lists are mutually exclusive and collectively exhaustive for all construct
      types. NFR-04 (determinism) is now achievable in AGGRESSIVE mode.
    decided_by: "Claude Sonnet 4.6 (Implementer)"

  - id: DEC-02
    title: "HEADER_BLOCK section line number format — 'L<n>' vs absolute offset"
    context: >
      The orientation header must include section positions so a consuming LLM can
      rapidly locate [M], [V], [C] sections. Two options: (a) absolute character offset,
      (b) line number within the SemantiCode body (excluding header).
    decision: >
      Line number format: @L<n> where n = line number within the SemantiCode body
      (line 1 = first line after HEADER_BLOCK line 2). This is more practical for LLM
      context — LLMs reason in lines, not byte offsets. Missing sections use @L0.
    rationale: >
      Line numbers are human-readable and LLM-scannable. Byte offsets would require
      arithmetic to use. This aligns with NFR-05 (human inspectability) while also
      serving the automated-parse use case.
    decided_by: "Claude Sonnet 4.6 (Implementer)"

  - id: DEC-03
    title: "ANNOTATED mode — when to emit // comments"
    context: >
      The design specified // inline comments for ANNOTATED mode, but did not enumerate
      exactly which compression decisions warrant a comment. Over-annotating defeats the
      purpose; under-annotating provides no value.
    decision: >
      Comments are emitted before: merged compound rules (not obvious that two rules
      became one), dropped tokens (PERSONA dropped, NOTE dropped — user should know),
      applied REF: substitutions (non-obvious deduplication), dropped non-critical
      ON_ERR or GATE in AGGRESSIVE mode, and any INFERRED_STRUCTURE section
      classification. Routine encoding (BHV:+ → BHV:+rule) needs no comment.
    rationale: >
      Comments are for decisions that could surprise a practitioner reviewing the output.
      Routine notation encoding is self-explanatory from the grammar key.
    decided_by: "Claude Sonnet 4.6 (Implementer)"

  - id: DEC-04
    title: "FIDELITY_WARNING abbreviated content — 60 chars limit"
    context: >
      FIDELITY_WARNINGs in SCRIBE_META include an abbreviated version of the unencoded
      construct content. The length limit was not specified in Stage 2.
    decision: >
      60 characters, sufficient to identify the construct unambiguously in most cases.
      Longer content is truncated with '...' suffix. This is short enough to not
      significantly inflate the metadata block for large prompts with multiple warnings.
    rationale: >
      A practitioner reviewing FIDELITY_WARNINGs needs enough context to locate the
      original construct in their prompt — 60 chars achieves this for typical rule text.
      NFR-05 (human inspectability) is the driving constraint.
    decided_by: "Claude Sonnet 4.6 (Implementer)"

  - id: DEC-05
    title: "Grammar key in HEADER_BLOCK — one line vs multi-line"
    context: >
      The grammar key needs to cover all operator types but must itself be token-minimal
      (it appears in every SemantiCode output). Options: full multi-line grammar reference,
      or compressed single-line key.
    decision: >
      Single-line grammar key (Line 2 of HEADER_BLOCK), covering all operator types with
      minimal whitespace. Example: "// Grammar: [M]model [V]view [C]ctrl | BHV:+must
      !prohibit ~prefer | CNST:constraint | OUT:type:fmt | IF cond:THEN act:ELSE act |
      ON_ERR:cond:resp | GATE:cond:pass|fail | DEF:<tag>:<v> REF:<tag> | // annotation"
      Full grammar remains in GRAMMAR_RULES within the masterprompt for LLM reference.
    rationale: >
      The header's grammar key is for the consuming LLM to orient itself at parse time —
      it does not need to be the full specification. The LLM executing S.C.R.I.B.E.
      has the full grammar in GRAMMAR_RULES; the consuming LLM has the key plus the
      self-describing notation. NFR-03 (LLM agnostic) is satisfied by the key alone.
    decided_by: "Claude Sonnet 4.6 (Implementer)"

  - id: DEC-06
    title: "SemantiCode body wrapped in triple-backtick code block"
    context: >
      The ATLAS prompt wraps its output in triple-backtick code blocks to preserve
      monospace alignment. S.C.R.I.B.E. output is structured YAML + notation — the
      same alignment concern applies in LLM chat interfaces.
    decision: >
      Step 10 of REQUEST_LOOP wraps the complete SemantiCode output in triple-backtick
      code block. The code block ensures YAML metadata and notation alignment are
      preserved in all LLM chat interfaces. The content inside remains plain text
      (no format restriction on SemantiCode notation characters).
    rationale: "Consistent with ATLAS (DEC-01 in FEAT-0006). Practical alignment benefit for the practitioner reviewing output."
    decided_by: "Claude Sonnet 4.6 (Implementer)"

  - id: DEC-07
    title: "DEF: index at end of each section vs global index"
    context: >
      DEF:/REF: deduplication tokens could have their index at the end of their section
      or in a single global index at the end of the file. The design did not specify
      placement.
    decision: >
      DEF: index appended at the end of each section that contains DEF: entries, using
      format: "// DEF index: <tag1>=<abbreviated value> | <tag2>=<abbreviated value>"
      This keeps the reference local to its section, making the output easier to scan
      when a practitioner is auditing one section at a time.
    rationale: >
      A global index at end of file would require the LLM to scan the entire output to
      resolve a REF: in [M]. A section-local index is resolved within a bounded scope.
      Consistent with NFR-05 (human inspectability).
    decided_by: "Claude Sonnet 4.6 (Implementer)"

  - id: DEC-08
    title: "Prompt file location — roles/utility/ (existing category)"
    context: >
      S.C.R.I.B.E. is a developer/practitioner utility tool — same category as A.T.L.A.S.
      The utility category was established in FEAT-0006 and roles/utility/ already exists.
    decision: >
      Create roles/utility/semanticode-compiler/. Consistent with the utility category
      established in Stage 1 (QC-01). No new category required. Registry and spec updated.
    rationale: "Consistent with Stage 1 design decision and existing repository structure."
    decided_by: "Claude Sonnet 4.6 (Implementer)"
