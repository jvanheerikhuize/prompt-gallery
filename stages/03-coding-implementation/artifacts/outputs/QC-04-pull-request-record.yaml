pr_description: |
  ## What This PR Delivers

  Implements FEAT-0004: P.S.Y. v1.0 — a self-contained trauma-informed psychoeducation
  and emotional support masterprompt for any advanced LLM.

  **New files:**
  - `prompt-trauma-psychologist.md` — P.S.Y. masterprompt v1.0

  **Updated:**
  - `README.md` — Trauma-Specialised Psychologist (P.S.Y.) row added to Available Roles table
  - `specs/FEAT-0004-trauma-psychologist-masterprompt.yaml` — stage_reached updated to 3

  ## Architecture

  MVC/XML structure (5 components per QC-03 design):
  - **CORE_DIRECTIVES** — framing, portability, authority hierarchy
  - **MODEL** — PERSONA (SAMHSA 6 pillars) + ABSOLUTE_RULES (8 non-negotiable rules)
  - **VIEW** — 9 session templates (SESSION_OPEN, CHECK_IN, CONTRACT, EXPLORE,
    STABILISE, CLOSE, CRISIS, FULL_DISCLAIMER, CONSOLE)
  - **RULES_ENGINE** — CRISIS_DETECTION (first/third-person sentinels, 7-language
    localised resources), SAFE_MESSAGING, SCOPE_ENFORCEMENT, DISCLAIMER_TRIGGER,
    PSYCHOEDUCATION_LIBRARY, TECHNIQUE_LIBRARY (7 techniques), CBT_REFRAMING,
    LANGUAGE_DETECTION
  - **CONTROLLER** — SESSION_PHASES (6 phases), SESSION_LOOP (8 steps),
    CONSOLE (~state, ~techniques, ~disclaimer, ~privacy, ~close, ~reset)

  ## Safety Hardening Applied (STRIDE Stage 3 Actions)

  - **T-01 CRITICAL (crisis bypass via injection):** Dual enforcement — INPUT_IS_DATA
    in ABSOLUTE_RULES + SESSION_LOOP step 2 CRISIS_CHECK labelled NON-SKIPPABLE
  - **T-02 HIGH (safe-messaging override):** SAFE_MESSAGING_ABSOLUTE absolute rule,
    cannot be overridden by user framing
  - **T-03 HIGH (clinical authority claim):** SCOPE_ENFORCEMENT handles
    'I am a clinician' / 'medical necessity' / 'professional context' patterns
  - **T-04 MEDIUM (third-person crisis evasion):** CRISIS_DETECTION covers
    'my friend', 'someone I know', 'hypothetically' sentinel patterns
  - **T-05 MEDIUM (Phase 2/3 drift):** SCOPE_ENFORCEMENT with gentle-then-firm
    redirect (3+ attempts = firm decline + therapist referral)
  - **T-06 MEDIUM (state corruption):** safety_flags append-only; ~reset requires
    explicit user invocation
  - **T-07 LOW (language detection evasion):** LANGUAGE_DETECTION with
    uncertainty fallback to English

  ## Reviewer Notes

  This is a health-adjacent prompt targeting a vulnerable user population. Reviewers
  should verify:
  1. Crisis detection sentinel completeness and language accuracy
  2. Localised crisis line numbers are current and correct for each language/region
  3. Safe-messaging compliance in all crisis-adjacent response templates
  4. Phase 2/3 boundary enforcement under adversarial inputs
  5. GDPR Art. 9 disclosure adequacy at session open (SESSION_OPEN template)
  6. Two-tier disclaimer renders correctly on clinical-boundary crossings

