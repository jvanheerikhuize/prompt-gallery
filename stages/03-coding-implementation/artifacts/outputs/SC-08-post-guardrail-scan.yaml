scan_categories:

  - category: Backdoors and logic flaws
    status: clear
    detail: >
      No hidden conditions, alternate execution paths, or logic designed to subvert
      the session rules. SESSION_LOOP is explicit and deterministic. CRISIS_CHECK at
      step 2 has no bypass path. ABSOLUTE_RULES have no exception clauses.

  - category: Supply chain attacks
    status: clear
    detail: >
      No external URLs embedded in the prompt instructions that could be replaced or
      hijacked. Crisis line numbers are literal public-domain telephone numbers, not
      URLs. No dependency references.

  - category: Malicious instructions to the LLM
    status: clear
    detail: >
      All instructions in the prompt govern psychoeducation session behaviour. The
      ABSOLUTE_RULES, CRISIS_FIRST, and SAFE_MESSAGING_ABSOLUTE rules actively
      harden the prompt against misuse. No instructions designed to make the LLM
      exfiltrate data, harm users, or bypass safety measures. The health-adjacent
      context was specifically reviewed: all instructions are protective, not harmful.

  - category: Adversarial framing against the user
    status: clear
    detail: >
      All instructions serve user safety and wellbeing. No adversarial framing.
      Phase 2/3 scope limits and crisis escalation exist to protect users from harm,
      not to manipulate them.

  - category: Prompt injection vectors introduced by the agent
    status: clear
    detail: >
      The Stage 3 hardening (INPUT_IS_DATA rule, CRISIS_CHECK non-skippable,
      SAFE_MESSAGING_ABSOLUTE, third-person sentinel patterns) reduces injection
      surface, not expands it. No new injection vectors introduced.

  - category: Hardcoded credentials
    status: clear
    detail: None present. See SC-09 for secrets scan confirmation.

  - category: Data exfiltration patterns
    status: clear
    detail: >
      No URLs, webhooks, or external references in any prompt instruction.
      SESSION_STATE is explicitly scoped to in-context only; the prompt contains
      no mechanism to send data outside the conversation.

  - category: Crisis content romanticisation or method disclosure (health-specific)
    status: clear
    detail: >
      SAFE_MESSAGING rules prohibit method disclosure and romantic framing.
      Crisis resources section renders phone numbers and directive safe messaging
      only. No content in the prompt could be read as romanticising or glorifying
      self-harm or suicide. Safe-messaging guidelines (AFSP, Samaritans) applied.

  - category: Re-traumatisation risk via unconstrained narrative generation
    status: clear
    detail: >
      SCOPE_ENFORCEMENT explicitly blocks Phase 2/3 trauma memory processing.
      SESSION_PHASES Explore phase is gated on distress monitoring with offer to
      defer. safety_flags are append-only and not casually reproduced in narrative.
      DHR-03 (from SC-05) implemented in RULES_ENGINE STATE_DIRECTIVES.

