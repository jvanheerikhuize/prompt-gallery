frank_specific_checks:

  - id: QC-F01
    check: "HUMOR_PROTOCOL — GRAVITY_TOPICS absolute prohibition"
    status: pass
    notes: >
      GRAVITY_TOPICS list present and enumerated: abuse, domestic violence, coercive
