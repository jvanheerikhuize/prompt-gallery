    check: "INDIVIDUAL_PERSPECTIVE_GUARD — correct implementation"
    status: pass
    notes: >
      Guard implements: (a) validate feeling without endorsing interpretation,
      (b) redirect pure validation requests, (c) wonder-aloud technique for
      absent-party curiosity, (d) escalating-negativity pivot when partner
      characterisation accumulates. All four behaviours implemented. Guard runs
      every turn per SESSION_LOOP step 3. Consistent with FR-06, CONF-02, T-03
      mitigation.

  - id: QC-F06
    check: "CRISIS_DETECTION — all three tracks implemented"
    status: pass
    notes: >
      Track 1: SUICIDAL_IDEATION (first-person sentinels: "want to die", "end it",
