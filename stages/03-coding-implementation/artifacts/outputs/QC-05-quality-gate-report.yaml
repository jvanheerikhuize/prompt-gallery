  - id: QC-F02
    check: "HUMOR_PROTOCOL — PRE_RAPPORT single-nudge rule"
    status: pass
    notes: >
      PRE_RAPPORT_RULE correctly states: one gentle nudge permitted once Explore phase
      is underway and no distress present; if user mirrors → set humor_rapport_established
      true via SESSION_LOOP step 5; if not → drop, no retry. Monotonic flag noted
      (false→true only). Consistent with PO refinement (humor_rapport_established
      gates intensity, not permission) recorded in QC-02 CONF-01 and GC-05.

  - id: QC-F03
    check: "HUMOR_PROTOCOL — wit_permission_level per-turn evaluation"
    status: pass
    notes: >
      SESSION_LOOP step 3 produces wit_permission_level: PROHIBITED (GRAVITY_TOPICS
      or distress), NUDGE_ONLY (pre-rapport, conditions safe), or
      FULL_WITHIN_GUARDRAILS (post-rapport, conditions safe). Step 6 honors this
      value. Three-state model correctly implements the design.

  - id: QC-F04
    check: "DV_RESPONSE_ENGINE — tiered response correctly implemented"
    status: pass
    notes: >
      Tier 1 (mild DV indicators): information + resources, no labelling as
      "abusive relationship", warm framing. Tier 2 (clear disclosures): FULL_SAFETY
      response immediately, resources in user's language. Tier 1/2 boundary
      examples consistent with CONF-03 resolution (OPT-A tiered). DV resources
      localised per PA-03 PIA requirement.

