  - check: "Individual-perspective integrity maintained"
    verified: true
    notes: >
      INDIVIDUAL_PERSPECTIVE_GUARD runs every turn. Validates feelings without endorsing
      interpretations. Does not vilify or excuse absent party. Wonder-aloud technique
      for curiosity. Consistent with FR-06.

  - check: "No clinical diagnosis capability"
    verified: true
