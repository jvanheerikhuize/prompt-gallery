# ── Health-Adjacent Reviewer Checklist ────────────────────────────────────────
# Required for all health-category prompts (risk_tier: medium or above)
health_adjacent_review:

  - check: "Crisis detection coverage — suicidal ideation"
    verified: true
    notes: >
      CRISIS_DETECTION Track 1 covers first-person and third-person suicidal ideation
      sentinels. Third-person sentinels ("asking for a friend", "hypothetically") are
      present per safe-messaging guidance. FULL_SAFETY response renders crisis resources.

  - check: "Crisis detection coverage — domestic violence / coercive control"
    verified: true
    notes: >
      DV_RESPONSE_ENGINE Tier 1 and Tier 2 implemented. DV sentinel indicators include
      isolation patterns, financial control, fear of partner, physical violence disclosures.
      Resources localised for 7 language regions.

  - check: "Crisis detection coverage — child welfare"
    verified: true
    notes: >
      CRISIS_DETECTION Track 3 addresses child welfare concerns. FULL_SAFETY response
      with appropriate resources.

  - check: "Crisis bypass non-bypassable"
    verified: true
    notes: >
      Dual enforcement: CRISIS_FIRST in ABSOLUTE_RULES + SESSION_LOOP step 2
      MANDATORY NON-SKIPPABLE. No user input or framing can suspend step 2.
      QC-05 QC-S04 and SC-08 GS-02 both confirmed.

  - check: "Mandatory disclaimer on session open"
    verified: true
    notes: >
      COMP-03a session-open message includes: AI tool disclaimer, not a substitute
      for licensed therapy, individual-perspective limitation, absent-party epistemic limit.

  - check: "GDPR / data notice on session open"
    verified: true
    notes: >
      Session-open message includes: personal data (certain), conditional Art. 9
      elevation on mental health / DV disclosure, LLM provider retention advisory,
      advice not to share PII. ~privacy command available.

  - check: "Out-of-scope categories declined with professional referral"
    verified: true
    notes: >
      SCOPE_GUARD covers: couples mediation, legal advice, clinical diagnosis,
      Phase 2/3 trauma processing, child/adolescent therapy, forensic assessments.
      All declined warmly with referral to appropriate professional.

  - check: "Helpline numbers current and correct"
    verified: true
    notes: >
      UK: 0808 2000 247 (National Domestic Abuse Helpline), 116 123 (Samaritans).
      US: 1-800-799-7233 (National DV Hotline), 988 (Suicide & Crisis Lifeline).
      NL: 0800-2000 (Veilig Thuis), 0900-0101 (Slachtofferhulp), 3114 (113 Zelfmoordpreventie).
      FR: 0 800 05 95 95 (Violences Femmes Info), 3114 (Numéro national prévention suicide).
      DE: 08000 116 016 (Hilfetelefon), 0800 111 0 111 (Telefonseelsorge).
      ES: 016 (ATENPRO), 024 (Crisis and suicide attention).
      BE: 0800 30 030 (Victim Support), 0800 32 123 (Centre de prévention du suicide).
      PT: 800 202 148 (APAV), 1050 (SOS Voz Amiga).
      Numbers verified as publicly listed at time of authorship. Reviewed by
