meta:
  id: "AC-03-FEAT-0007"
  feature: "FEAT-0007"
  ai_tier: minimal
  produced_by: "Claude Sonnet 4.6 (AI Governance Analyst / AC-03)"
  date: "2026-03-17"
  status: approved

ai_component_description: |
  S.C.R.I.B.E. is a system prompt that governs LLM behaviour to act as a semantic
  compression compiler. The AI component performs: MVC prompt parsing, semantic
  construct extraction, intermediate representation normalisation, SemantiCode
  grammar-driven compression, fidelity cross-checking, and output assembly.
  All processing is performed by the LLM executing the prompt — no external tools,
  APIs, training data, or retrieval mechanisms.

model_selection:
  approach: LLM-agnostic (user-selected)
  rationale: "S.C.R.I.B.E. is model-agnostic (NFR-03). Identical design decision to all prior masterprompts."
  supported_models: [Claude 3+, GPT-4+, Gemini 1.5+]
  model_pinning: false
  model_capability_note: |
    S.C.R.I.B.E. requires the LLM to perform semantic analysis and judgement-based
    extraction (identifying semantic construct types from prose). This is a higher
    cognitive demand than A.T.L.A.S.'s arithmetic tasks. Weaker models may produce
    lower-quality IR extraction, leading to more FIDELITY_WARNINGs.
    AGGRESSIVE mode is explicitly recommended for advanced LLMs only (CONF-05).
    LOSSLESS and BALANCED modes should function adequately on Claude 3+/GPT-4+ class models.

data_pipeline:
  exists: false
  rationale: "No data pipeline. In-request processing only. No training, fine-tuning, or retrieval."

explainability:
  mechanism: |
    1. The prompt is open-source — full compilation algorithm and SemantiCode grammar
       are visible and auditable in the Stage 2 design document.
    2. METADATA_BLOCK in every output declares: mode, compression ratio, fidelity status,
       construct counts, and any FIDELITY_WARNINGs — user can audit the compilation.
    3. HEADER_BLOCK grammar key enables any practitioner to read and audit the SemantiCode output.
    4. FIDELITY_CHECKER makes the IR→output mapping verifiable — not an opaque transform.
    5. ANNOTATED mode provides full inline commentary on every compression decision.
    6. INPUT_IS_PROMPT_DATA prevents opaque prompt-injection effects from corrupting output.

human_oversight:
  mechanisms:
    - "METADATA_BLOCK: status (COMPLETE/PARTIAL), fidelity warnings, inferred section flags — all auditable"
    - "FIDELITY_WARNING: any dropped or unencoded construct is explicitly surfaced"
    - "SemantiCode orientation header + grammar key: user can read and verify any compiled output"
    - "ANNOTATED mode: full human-readable commentary on all compression decisions"
    - "Open-source prompt and grammar spec: full algorithm is auditable at any time"
    - "User re-submission: stateless design means user can resubmit with a different mode or corrections"
    - "PARTIAL status flag: user must review before deploying any PARTIAL SemantiCode"

eu_ai_act_compliance:
  tier: minimal
  mandatory_obligations:
    - id: "General obligations (Art. 4)"
      obligation: "AI literacy — users understand they are using an LLM-based tool"
      status: compliant
      evidence: >
        The prompt opens with S.C.R.I.B.E. identifying itself as a semantic compilation
        instrument. The data notice (DHR-01) references the LLM provider. No obligation
        to explicitly label as AI system for MINIMAL tier — a developer compilation
        utility does not meet the Art. 52(1) limited-risk threshold.

gaps:
  - id: ACG-01
    severity: minor
    description: >
      LLM semantic extraction accuracy for construct identification cannot be guaranteed
      uniformly across all models and prompt styles. Dense or ambiguous prose may result
      in missed constructs (false FIDELITY_WARNINGs) or spurious constructs (IR bloat).
      This is a quality concern, not a safety concern — all effects are contained
      within the SemantiCode output and surfaced in the METADATA_BLOCK.
    stage_3_action: "Define explicit extraction heuristics per section type in Stage 3 prompt implementation; include worked examples in prompt for each construct category"

  - id: ACG-02
    severity: minor
    description: >
      AGGRESSIVE mode criticality judgement for IF/THEN and ON_ERR rules
      (DESIGN-04) requires explicit criteria definition in Stage 3 to achieve
      NFR-04 determinism. Without explicit criteria, AGGRESSIVE mode may vary
      across sessions.
    stage_3_action: "Stage 3 must define: a named list of rule types always classified as critical (e.g., safety rules, error-return rules, all absolute rules)"

approval:
  approved_by: "Jerry van Heerikhuize (AI Governance Lead)"
  approval_date: "2026-03-17"
  revisions_required: false
