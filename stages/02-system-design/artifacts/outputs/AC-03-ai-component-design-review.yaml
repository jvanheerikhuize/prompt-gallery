meta:
  id: "AC-03-FEAT-0006"
  feature: "FEAT-0006"
  ai_tier: minimal
  produced_by: "Claude Sonnet 4.6 (AI Governance Analyst / AC-03)"
  date: "2026-03-15"
  status: approved

ai_component_description: |
  A.T.L.A.S. is a system prompt that governs LLM behaviour to act as a stateless
  ASCII cartography service. The AI component performs: coordinate parsing, bounding
  box computation, equirectangular projection arithmetic, ASCII grid rendering,
  label placement, and metadata generation. All computation is performed by the LLM
  from the prompt instructions — no external tools or data sources.

model_selection:
  approach: LLM-agnostic (user-selected)
  rationale: "A.T.L.A.S. is model-agnostic (NFR-03). Identical design decision to all prior masterprompts."
  supported_models: [Claude 3+, GPT-4+, Gemini 1.5+]
  model_pinning: false
  model_capability_note: |
    A.T.L.A.S. requires the LLM to perform arithmetic (coordinate-to-grid mapping,
    haversine approximation for scale bar). Arithmetic accuracy varies across models
    and sessions. Design mitigation: the rendering algorithm is explicitly specified
    step-by-step in the prompt, reducing reliance on model initiative. Precision
    metadata is included in output so the user can assess accuracy.
    Unlike FRANK's HUMOR_PROTOCOL, this is a quality concern (slightly inaccurate
    grid placement) not a safety concern.

data_pipeline:
  exists: false
  rationale: "No data pipeline. In-request processing only. No training, fine-tuning, or retrieval."

explainability:
  mechanism: |
    1. The prompt is open-source — full rendering algorithm is visible and auditable.
    2. Map metadata block explicitly states: grid dimensions, scale (km/char), projection,
       and character resolution — so the user can verify or challenge the rendering.
    3. CONF-03 LLM world-knowledge use is declared in output (coordinates stated explicitly).
    4. INPUT_IS_DATA prevents opaque prompt-injection effects.
    5. All output is deterministic natural language — no opaque scoring.

human_oversight:
  mechanisms:
    - "Map metadata block: states all rendering parameters; user can audit"
    - "Legend: authoritative list of all POIs and their coordinates as applied"
    - "Precision warning: below-resolution POI pairs flagged in output"
    - "Open-source prompt: full algorithm including projection formula is auditable"
    - "User re-submission: stateless design means user can always re-submit with corrections"

eu_ai_act_compliance:
  tier: minimal
  mandatory_obligations:
    - id: "General obligations (Art. 4)"
      obligation: "AI literacy — users understand they are using an LLM-based tool"
      status: compliant
      evidence: >
        The prompt opens with A.T.L.A.S. identifying itself as an ASCII cartography
        system. The data notice (DHR-01) references the LLM provider. No obligation
        to explicitly label as AI system for MINIMAL tier (Art. 52(1) applies to
        limited-risk systems interacting with natural persons in a potentially deceptive
        way — a map-rendering utility does not meet this threshold).

gaps:
  - id: ACG-01
    severity: minor
    description: >
      LLM arithmetic accuracy for coordinate-to-grid projection cannot be guaranteed
      uniformly across all models and sessions. A model producing slightly incorrect
      grid positions would result in inaccurate proportional placement (violating
      NFR-01 ±1 character tolerance). This is a quality concern, not a safety concern.
    stage_3_action: "Specify projection arithmetic with explicit step-by-step formula in prompt; include precision metadata so users can detect errors"

approval:
  approved_by: "Jerry van Heerikhuize (AI Governance Lead)"
  approval_date: "2026-03-15"
  revisions_required: false
