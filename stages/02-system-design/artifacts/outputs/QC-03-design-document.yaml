# ── Technology Decisions ──────────────────────────────────────────────────────
technology_decisions:
  - decision: "Prompt format: XML-tagged structure for verbose variant"
    rationale: >
      XML tags provide unambiguous section boundaries that LLMs parse reliably.
      Human-readable and self-documenting. Consistent with v2.0 baseline.
    alternatives_considered: ["JSON-structured prompt", "markdown-only", "plain prose"]

  - decision: "Compressed variant: shorthand notation (::SYS notation with K{}/OP{}/IF{} blocks)"
    rationale: >
      The existing v2.0 compressed variant already uses this notation and has been
      validated against the verbose prompt. Retaining it avoids re-deriving from scratch.
    alternatives_considered: ["Remove compressed variant entirely", "Auto-generate via script"]

  - decision: "STATE_SCHEMA: in-context JSON (no external storage)"
    rationale: >
      The core constraint (NFR-01) requires self-containment. In-context JSON is the only
      viable persistent state mechanism without external infrastructure.
    alternatives_considered: ["External database", "File system", "LLM memory APIs"]

  - decision: "No model pinning — LLM-agnostic by design"
    rationale: >
      NFR-02 requires compatibility across Claude 3+, GPT-4+, Gemini 1.5+. Pinning to
      a specific model would violate this requirement. The prompt uses only standard
      natural language and structured reasoning instructions available in all target models.

