# ── Trust Boundaries ──────────────────────────────────────────────────────────
trust_boundaries:
  - id: TB-01
    name: "User ↔ LLM (primary input boundary)"
    description: >
      All user-supplied text enters through this boundary. Primary injection and
      manipulation surface. CRISIS_CHECK and RULES_CHECK guard this boundary every turn.
    risk: high
    controls: [COMP-01b, COMP-04a, COMP-04b, COMP-04c, COMP-04d, COMP-05b step 1-3]

  - id: TB-02
    name: "RULES_ENGINE ↔ CONTROLLER (safety rule integrity boundary)"
    description: >
      The CONTROLLER must not override, suppress, or bypass RULES_ENGINE safety outputs.
      Crisis detection result (COMP-04a) is unconditional — CONTROLLER has no authority
      to continue the session loop if a crisis trigger fires. This is a logical boundary
      enforced by the prompt's ABSOLUTE_RULES and SESSION_LOOP design.
    risk: high
    controls: [COMP-01b NFR-02, COMP-05b step 2]

  - id: TB-03
    name: "SESSION_STATE ↔ LLM provider (data retention boundary)"
    description: >
      Mental health data held in SESSION_STATE (mood scores, themes, safety flags) exists
      in the LLM context window which may be retained by the LLM provider per their
      data policy. This boundary is outside the prompt's control. Mitigated by GDPR
      notice at session open (COMP-03a) and ~privacy command (COMP-05c).
    risk: medium
    controls: [COMP-01b NFR-04, COMP-03a, COMP-05c ~privacy]

  - id: TB-04
    name: "CONTROLLER ↔ VIEW (disclaimer rendering integrity)"
    description: >
      CONTROLLER must route to FULL_DISCLAIMER_TEMPLATE when DISCLAIMER_TRIGGER fires.
      A failure in this path (CONTROLLER skips disclaimer) would allow clinical-care
      boundary crossings to go unmarked. SESSION_LOOP step 3/6 enforces the routing.
    risk: low
    controls: [COMP-04d, COMP-05b steps 3 and 6]

# ── Technology Decisions ──────────────────────────────────────────────────────
technology_decisions:
  - decision: "Prompt format: XML-tagged MVC structure"
    rationale: >
      Consistent with T.A.G. and C.R.A. in this module repository. XML tags provide
      unambiguous section delimiting across all major LLMs. Human-readable and auditable.
    alternatives_considered: ["JSON structure", "Markdown sections", "Plain prose"]
    trade_offs: "Slightly verbose vs. plain prose; significantly clearer separation of concerns"

  - decision: "SESSION_STATE: in-context JSON — no external persistence"
    rationale: >
      No external storage means no data breach risk from the prompt itself. Consistent
      with NFR-03 (self-contained). User is the data controller of their own session.
    alternatives_considered: ["External database", "Browser localStorage via API"]
    trade_offs: "No cross-session continuity; acceptable for v1.0 therapeutic support use case"

  - decision: "Crisis resources: localised to detected language/region"
    rationale: >
      NFR-06 (multi-language) requires crisis resources to be relevant to the user's
      locale. A hard-coded English-only crisis line list would be inadequate and potentially
      harmful if a non-English speaker cannot access the resources listed.
    alternatives_considered: ["Single global crisis line", "Ask user for country"]
    trade_offs: "Language detection may be imprecise; IMPL to define fallback behaviour"

  - decision: "Safety rules in ABSOLUTE_RULES + RULES_ENGINE (dual enforcement)"
    rationale: >
      Crisis detection and safe-messaging rules are declared in both COMP-01b
      (ABSOLUTE_RULES — highest precedence) and COMP-04 (RULES_ENGINE — evaluated
      every turn). Dual placement maximises resistance to prompt injection and
      context drift over long sessions.
    alternatives_considered: ["Rules in RULES_ENGINE only"]
    trade_offs: "Minor redundancy; justified by zero-tolerance safety requirement"

# ── Design Gaps & Flagged Items ────────────────────────────────────────────────
design_gaps:
  - id: DG-01
    severity: minor
    component: COMP-04f TECHNIQUE_LIBRARY
    description: >
      Specific protocol scripts for each technique category are deferred to Stage 3
      per GAP-01 PO decision. IMPL engineer selects protocols from evidence-based
      literature with SA review. Design specifies categories and collaboration approach
      only. No design change required; noted for Stage 3 handoff.

  - id: DG-02
    severity: minor
    component: COMP-04a CRISIS_DETECTION / COMP-03g CRISIS_TEMPLATE
    description: >
      Crisis resource localisation (NFR-06 + CONF-01 OPT-C) requires region-specific
      emergency service numbers and crisis lines for each supported language. The design
      specifies the requirement; the actual resource list is a Stage 3 implementation
      decision. IMPL must compile and verify crisis resources for all major languages
      before prompt release.

  - id: DG-03
    severity: minor
    component: COMP-04h LANGUAGE_DETECTION
    description: >
      Language detection relies on the LLM's native language recognition capability —
      no formal language detection module exists in a prompt-only system. Behaviour
      may vary across LLMs for mixed-language or ambiguous inputs. IMPL to add a
      fallback instruction: if language detection is uncertain, ask the user to confirm
      preferred language before proceeding.

unmapped_requirements: []
design_directive_compliance:
  DESIGN-01: compliant  # All 17 requirements mapped to components
  DESIGN-02: compliant  # No intentional weaknesses; dual safety enforcement
  DESIGN-03: compliant  # No cryptographic operations in scope

