  unmapped: 0

# ── Design Gaps ───────────────────────────────────────────────────────────────
design_gaps:
  - id: DESIGN-01
    description: >
      Equirectangular projection becomes distorted at |lat| > ~55°. The PRECISION_ENGINE
      issues a warning but does not correct the distortion. For v1.0, this is an
      accepted limitation documented in metadata.
    severity: low
    deferred_to: v2.0 (Mercator-corrected variant)

  - id: DESIGN-02
    description: >
      Label collision avoidance for very dense POI clusters (15+ POIs in a compact map)
      may result in many labels falling back to "omitted" status. Legend remains
      authoritative. Stage 3 should specify the minimum map density required to
      label all POIs in the legend.
    severity: low
    deferred_to: Stage 3 implementation

  - id: DESIGN-03
    description: >
      Non-45° diagonal wall segments are approximated as stepped orthogonal characters
      using Bresenham-style rasterisation. For shallow angles (< 20° from horizontal)
      or steep angles (> 70°), the stepped approximation may be visually misleading.
      The approximated angle is recorded in metadata with the original angle so the
      user can assess fidelity. A wider character set (Unicode box-drawing) could
      improve accuracy in v2.0.
    severity: low
    deferred_to: v2.0 (Unicode variant)

