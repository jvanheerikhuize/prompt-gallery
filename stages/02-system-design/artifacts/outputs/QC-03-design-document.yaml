# ── Trust Boundaries ──────────────────────────────────────────────────────────
trust_boundaries:
  - id: TB-01
    name: "User ↔ LLM (primary input boundary)"
    description: >
      All user-supplied text enters through this boundary. Primary injection,
      manipulation, and social engineering surface. CRISIS_CHECK (step 2) and
      RULES_CHECK (step 3) guard this boundary every turn.
    risk: high
    controls: [COMP-01b, COMP-04a, COMP-04b, COMP-04c, COMP-04d, COMP-04e, COMP-04f, COMP-05b steps 1-3]

  - id: TB-02
    name: "RULES_ENGINE ↔ CONTROLLER (safety and humor rule integrity)"
    description: >
      The CONTROLLER must not override, suppress, or bypass RULES_ENGINE safety outputs
      or HUMOR_PROTOCOL decisions. Crisis detection output is unconditional — CONTROLLER
      has no authority to continue the session loop if a crisis trigger fires. The
      HUMOR_PROTOCOL's GRAVITY_TOPICS prohibition is similarly non-negotiable.
      This is a logical boundary enforced by ABSOLUTE_RULES and SESSION_LOOP ordering.
    risk: high
    controls: [COMP-01b, COMP-05b steps 2-3, COMP-04e GRAVITY_TOPICS_ABSOLUTE]

  - id: TB-03
    name: "SESSION_STATE ↔ LLM provider (data retention boundary)"
    description: >
      Relationship disclosures and safety flags in SESSION_STATE exist within the LLM
      context window which may be retained by the LLM provider. This boundary is outside
      the prompt's control. Mitigated by data notice at session open (COMP-03a) and
      ~privacy command (COMP-05c). DV safety_flags are particularly sensitive.
    risk: medium
    controls: [COMP-01b NFR-04, COMP-03a, COMP-05c ~privacy]

  - id: TB-04
    name: "HUMOR_PROTOCOL ↔ CONTROLLER (humor guard integrity)"
    description: >
      CONTROLLER must respect HUMOR_PROTOCOL decisions: GRAVITY_TOPICS prohibition
      must never be bypassed; the single-nudge rule must be honoured (no retry after
      a non-engaged nudge); humor_rapport_established may only be set by SESSION_LOOP
      step 5, never by user command or CONTROLLER branch. A failure in this path
      would allow wit deployment in contexts where it causes harm.
    risk: medium
    controls: [COMP-04e, COMP-02b STATE_DIRECTIVES humor_rapport_established rule, COMP-05c no ~humor command]

# ── Technology Decisions ──────────────────────────────────────────────────────
technology_decisions:
  - decision: "Prompt format: XML-tagged MVC structure"
    rationale: >
      Consistent with T.A.G., C.R.A., and P.S.Y. in this module repository. XML tags
      provide unambiguous section delimiting across all major LLMs. Human-readable
      and auditable.
    alternatives_considered: ["JSON structure", "Markdown sections", "Plain prose"]
    trade_offs: "Slightly verbose vs. plain prose; significantly clearer separation of concerns"

  - decision: "SESSION_STATE: in-context JSON — no external persistence"
    rationale: >
      No external storage = no data breach risk from the prompt itself. User is the
      data controller of their own session. Consistent with NFR-03 (self-contained).
    alternatives_considered: ["External database", "Browser localStorage"]
    trade_offs: "No cross-session continuity; acceptable for psychoeducation support use case"

  - decision: "HUMOR_PROTOCOL: safety-floor rules + contextual judgment (CONF-01 OPT-C)"
    rationale: >
      Pure rule-governance would make wit feel mechanical and unnatural. Pure judgment-trust
      creates an untestable safety property. The hybrid — absolute GRAVITY_TOPICS floor,
      single-nudge pre-rapport rule, then contextual judgment within guardrails — gives
      FRANK the craft of a skilled therapist within a testable and auditable safety envelope.
    alternatives_considered: ["OPT-A: full rule-governance", "OPT-B: full judgment-trust"]
    trade_offs: "Slightly more complex implementation; significantly better balance of safety and quality"

  - decision: "DV response: tiered (CONF-03 OPT-A)"
    rationale: >
      Labelling relationship behavior as 'domestic abuse' based on one account risks
      false positives that could damage therapeutic alliance or escalate conflict. The
      tiered approach (information + resources for mild indicators; full safety response
      for clear indicators) respects user agency while ensuring no serious situation is
      understated. Follows established DV advocacy practice.
    alternatives_considered: ["Binary trigger: always full safety response"]
    trade_offs: "More nuanced sentinel set required; mitigated by Stage 3 careful implementation"

  - decision: "humor_rapport_established: monotonic true-locking flag"
    rationale: >
      Once rapport is established it cannot be withdrawn mid-session — doing so would
      create a jarring tonal shift. The flag is monotonic (false→true only) to reflect
      how real rapport works. If FRANK misjudges and deploys a poorly-received nudge,
      the flag does not set (user must positively mirror) so no harm follows.
    alternatives_considered: ["Bidirectional flag that resets on distress", "Continuous score"]
    trade_offs: "Rapport may persist into a distress moment — GRAVITY_TOPICS prohibition is the safety net"

  - decision: "Dual safety enforcement: ABSOLUTE_RULES + RULES_ENGINE"
    rationale: >
      Same pattern as P.S.Y. (FEAT-0004) — proven effective for the CRITICAL threat
      (crisis bypass via injection). Safety rules declared in COMP-01b (highest authority)
      AND evaluated in COMP-04 (every turn). Dual placement maximises resistance to
      context drift and injection attacks.
    alternatives_considered: ["RULES_ENGINE only"]
    trade_offs: "Minor redundancy; fully justified by safety requirements"

# ── Design Gaps & Flagged Items ────────────────────────────────────────────────
design_gaps:
  - id: DG-01
    severity: minor
    component: COMP-04b DV_RESPONSE_ENGINE / COMP-04a CRISIS_DETECTION
    description: >
      The DV indicator sentinel pattern set (MILD and CLEAR tier) is not enumerated
      at design level — this is intentional, as sentinel patterns are an implementation
      detail requiring careful language choices that are best made in Stage 3 with
      reference to DV advocacy literature. Design specifies the tiering approach and
      response logic; Stage 3 enumerates specific sentinel language patterns.
      Flagged for Stage 3 close attention.

  - id: DG-02
    severity: minor
    component: COMP-04i LANGUAGE_DETECTION
    description: >
      Same as FEAT-0004 DG-03: language detection relies on LLM native capability.
      Fallback instruction added by design (ask user to confirm if uncertain).
      Crisis resources must be compiled for all major languages in Stage 3.

  - id: DG-03
    severity: minor
    component: COMP-04e HUMOR_PROTOCOL — GRAVITY_TOPICS list
    description: >
      The GRAVITY_TOPICS list (topics where humor is absolutely prohibited) is
      enumerated in the spec but the precise boundary conditions require Stage 3
      judgment. For example: the topic of "grief" may arise at different intensities;
      FRANK should distinguish between discussing grief as context vs. a user actively
      grieving in the session. Design specifies the list at category level; Stage 3
      adds precision.

unmapped_requirements: []
design_directive_compliance:
  DESIGN-01: compliant  # All 18 requirements (11 FR + 7 NFR) mapped to components — 0 unmapped
  DESIGN-02: compliant  # No intentional weaknesses; dual safety enforcement; HUMOR_PROTOCOL guardrails
  DESIGN-03: compliant  # No cryptographic operations in scope

