meta:
  id: "AC-04-FEAT-0004"
  feature: "FEAT-0004"
  produced_by: "Claude Sonnet 4.6 / AC-04"
  date: "2026-03-14"

applicable: false

rationale: |
  AC-04 is NOT APPLICABLE to this change.

  AC-04 applies "when the change introduces or modifies use of a GPAI or foundation
  model." P.S.Y. does NOT introduce, train, or pin a specific AI model. The prompt
  is model-agnostic by design (NFR-03): users run it on whichever LLM they choose.

  The LLMs that P.S.Y. runs on (Claude, GPT-4, Gemini) are:
  - Third-party models chosen and operated by end users independently.
  - Not introduced, modified, or version-pinned by this project.
  - Outside the project's supply chain and control plane.

  Therefore, no model registry entry, no version pinning, and no model update
  approval process is applicable to P.S.Y. itself.

  EU AI Act Arts. 51–56 (GPAI model documentation): not applicable — P.S.Y. is not
  a GPAI model provider; it is a consumer of third-party GPAI models.

note: |
  If a future version of P.S.Y. is deployed as a pre-configured agent on a specific
  LLM API (e.g. as a Claude API integration with a pinned model version), AC-04 would
  become applicable at that point. A model registry entry and version pinning record
  would be required. This is out of scope for FEAT-0004.

  Safety note: while AC-04 is not applicable, the model-agnostic design introduces
  a safety consideration documented in AC-03 (gap ACG-01): safety rule compliance
  may vary across LLMs. Stage 4 testing must cover at least two LLMs.
