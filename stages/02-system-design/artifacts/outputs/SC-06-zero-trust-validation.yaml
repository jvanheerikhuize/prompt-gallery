meta:
  id: "SC-06-FEAT-0006"
  feature: "FEAT-0006"
  produced_by: "Claude Sonnet 4.6 (Security Analyst / SC-06)"
  date: "2026-03-15"

network_zero_trust:
  applicable: false
  rationale: "No network architecture. A.T.L.A.S. is a prompt-only system with no network components."

logical_zero_trust:
  applicable: true
  overall: compliant

  criteria:

    - criterion: "Never trust, always verify — user input treated as untrusted"
      status: compliant
      evidence: >
        INPUT_IS_DATA is an absolute rule. VALIDATION_ENGINE verifies all coordinate
        values before processing. Labels are treated as inert strings, not trusted instructions.

    - criterion: "Least privilege — minimal operations performed on user data"
      status: compliant
      evidence: >
        A.T.L.A.S. performs only the computation required to render the requested map.
        No data stored beyond the request. No operations on user data beyond coordinate
        parsing and grid placement. Stateless by design — no accumulation of state.

    - criterion: "Explicit trust boundaries documented and controlled"
      status: compliant
      evidence: >
        Two trust boundaries defined (TB-01 user input, TB-02 LLM arithmetic).
        Both have documented controls. TB-01 controlled by INPUT_IS_DATA + VALIDATION_ENGINE.
        TB-02 controlled by explicit formula specification + precision metadata disclosure.

    - criterion: "Assume breach — design tolerates input that attempts to corrupt behaviour"
      status: compliant
      evidence: >
        T-01 (label injection) assumes hostile input is possible — INPUT_IS_DATA
        provides defence-in-depth. VALIDATION_ENGINE rejects invalid coordinates rather
        than attempting to render with them. Worst-case output is a structured error
        message, not a harmful response.

    - criterion: "Audit and transparency — user can inspect what was processed"
      status: compliant
      evidence: >
        Legend is always present, listing all coordinates as applied. Metadata block
        states all rendering parameters. CONF-03 world-knowledge use is declared.
        Below-resolution warnings are explicit. Full prompt is open-source.

status: compliant
