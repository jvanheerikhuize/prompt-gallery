# =============================================================================
# RC-03 — Privacy Impact Assessment
# Control:   RC-03 Privacy Impact Assessment Gate
# Stage:     2 — System Design
# Feature:   FEAT-0006 — ASCII Cartographer Masterprompt — A.T.L.A.S.
# Status:    minimal
# =============================================================================

meta:
  id: "RC-03-FEAT-0006"
  feature: "FEAT-0006"
  produced_by: "Claude Sonnet 4.6 / RC-03"
  date: "2026-03-15"

applicable: true
trigger: |
  A.T.L.A.S. processes geographic coordinates. Under GDPR Art. 4(1), precise
  location data can constitute personal data if it identifies or locates a natural
  person. This is CONDITIONAL — by default, the coordinates processed represent
  geographic features, not persons. A minimal PIA is appropriate.

# ── GDPR Art. 35 DPIA Trigger Assessment ─────────────────────────────────────
dpia_trigger_assessment:
  required: false
  triggers_evaluated:
    - trigger: "Systematic and extensive profiling with significant effects"
      applies: false
      rationale: "No profiling. A.T.L.A.S. renders a map from the coordinates provided in a single request — no aggregation, comparison, or scoring."

    - trigger: "Processing of special category data at large scale (Art. 9)"
      applies: false
      rationale: "Geographic coordinates are not Art. 9 special category data. Precise location may become Art. 4(1) personal data if tied to a natural person, but this is user-controlled and not systematic."

    - trigger: "Systematic monitoring of publicly accessible areas"
      applies: false
      rationale: "No monitoring. Single-request map rendering."

    - trigger: "High-risk AI processing (Art. 35(3)(a))"
      applies: false
      rationale: "AC-01 confirmed MINIMAL risk tier. No high-risk AI processing."

  dpia_rationale: >
    Full DPIA not required. Processing is a single-request utility task.
    Coordinates are public geographic data by default. If the user provides
    personal location data, this is user-controlled and out of scope for a
    cartography utility. A data notice (DHR-01) is appropriate and sufficient.

# ── Processing Activities ─────────────────────────────────────────────────────
processing_activities:

  - id: PA-01
    activity: "User provides coordinate list for map rendering"
    data_elements: ["Named coordinates (lat/lon or abstract)", "POI labels"]
    gdpr_category: "Public geographic data (default); Art. 4(1) personal data (conditional)"
    data_controller: "End user (self-directed)"
    data_processor: "LLM provider (user's chosen platform)"
    legal_basis: "Art. 6(1)(b) — necessary for service delivery (user initiates request)"
    necessity: "Coordinates are necessary for map rendering — no extraneous data collected"
    minimisation: "A.T.L.A.S. uses only the coordinates provided; requests nothing more"
    retention: "In-context only — no persistence beyond the single LLM request"
    recipient: "LLM provider (per their data policy)"

# ── Privacy Risks ─────────────────────────────────────────────────────────────
privacy_risks:

  - id: PR-01
    risk: "User provides coordinates of private locations (home, personal routines)"
    likelihood: low
    severity: low
    current_controls:
      - "DHR-01: brief data notice in map metadata advising against sharing private location data"
      - "DHR-02: A.T.L.A.S. does not ask for location context beyond what the user volunteers"
    residual_risk: low
    residual_risk_accepted: true
    acceptance_rationale: >
      A.T.L.A.S. is a utility tool that renders coordinates it is given. It cannot
      assess whether coordinates are personal — this is user-controlled. The data
      notice (DHR-01) is the appropriate and proportionate control for this residual.

  - id: PR-02
    risk: "LLM provider retains coordinate data per their data policy"
    likelihood: high   # LLM providers routinely retain conversation data
    severity: low      # Coordinates of public features have minimal privacy impact
    current_controls:
      - "DHR-01 data notice mentions LLM provider retention"
    residual_risk: low
    residual_risk_accepted: true

overall_privacy_risk: low
overall_risk_accepted: true
acceptance_rationale: >
  A.T.L.A.S. processes public geographic data in a stateless, single-request
  context. The conditional personal data risk (private location coordinates) is
  low-likelihood and mitigated by a data notice. Overall privacy risk is LOW.

lad_review:
  reviewed_by: "Jerry van Heerikhuize (Lead Architect)"
  review_date: "2026-03-15"
  findings: >
    PIA accepted. DPIA not required. The conditional Art. 4(1) risk is appropriately
    managed by DHR-01. No Art. 9 data involved. Privacy risk profile is the lowest
    in this repository.
  approved: true
