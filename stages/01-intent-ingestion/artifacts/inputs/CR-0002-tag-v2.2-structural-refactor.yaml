  - "No game mechanics may be added or removed — functional behaviour must be identical"
  - "prompt-compressed.md must be updated in sync with every structural change to prompt.md"
  - "a-sdlc/ governance submodule is read-only"
  - "No LLM-specific API calls or features may be introduced"

known_dependencies:
  - "FEAT-0001 complete (v2.1 baseline in prompt.md)"
  - "CR-0003 / FEAT-0003 (game features) may run in parallel but must not conflict"

ai_component_involved: true
  # This CR modifies a system prompt governing LLM behaviour.
