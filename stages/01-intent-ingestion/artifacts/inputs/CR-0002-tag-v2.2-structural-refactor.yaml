id: "CR-0002"
title: "T.A.G. v2.2 — Structural & Architectural Refactor of the masterprompt"
type: improvement
urgency: routine

requester:
  name: "Jerry van Heerikhuize"
  team: "Solo"
  contact: "jvanheerikhuize@gmail.com"

description: |
  Refactor the structural and architectural skeleton of the T.A.G. v2.1 masterprompt
  to close a set of design debts identified during a post-release audit (2026-03-13).

  The v2.1 prompt claims strict MVC adherence but its own top-level structure violates it:
  SESSION_RULES (declarative) and ASCII_MAP_BOT (utility) are nested inside CONTROLLER
  (procedural), making CONTROLLER a god object. Alongside this there are 16 discrete
  structural and architectural gaps ranging from security directives buried in HTML
  comments to a missing snapshot mechanism that makes the "Different Choice" rewind
  functionally undefined.

  This CR addresses the structural and architectural issues only. New game mechanics
  are handled in CR-0003.

  Issues addressed (audit IDs):
    S-01  CONTROLLER is a god object
    S-02  Console security restriction lives in an HTML comment
    S-03  Duplicate auto-initialize directive
    S-04  IN_PROMPT_CONTEXT not linked to SESSION_PHASES
    S-05  VISION/MISSION are flavor tokens, not directives
    S-06  No JSON/XML boundary sentinel in STATE_SCHEMA
    A-01  No previous_state snapshot mechanism for "Different Choice" rewind
    A-02  Lore mutation logic placed in CONTROLLER instead of MODEL
    A-03  No VIEW↔CONTROLLER parameter contract
    A-04  SESSION_PHASES has no formal state-machine transition conditions
    A-05  No WORLD_GENERATION phase defined
    A-06  No ERROR_PROTOCOL for inconsistent or corrupted game state
    A-07  sub_quests array has no entry schema
    A-08  No save_version field; no migration guidance on load
    A-09  Console commands have no access-tier grouping
    A-10  SESSION_RULES have no cross-references to interacting rules

problem_statement: |
  The v2.1 masterprompt contains structural and architectural debt that:
  - Causes different LLMs to behave inconsistently at phase boundaries because transitions
    between Introduction, Loop, and Ending are implicit rather than formally triggered.
  - Makes the "Different Choice" rewind undefined: a "previous STATE_SCHEMA snapshot" is
    referenced in the rules but never defined or maintained during the SESSION_LOOP.
  - Leaves the most critical security restriction (console cannot modify rules) in an HTML
    comment — the weakest possible location for a load-bearing directive.
  - Produces non-portable saves: sub_quests has no entry schema, exits have no leads_to
    field, and there is no save_version to detect structural drift.
  - Violates its own MVC principle by placing declarative rules and utility bots inside
    the procedural CONTROLLER block.

desired_outcome: |
  A v2.2 prompt where:
  - The XML hierarchy is CORE_DIRECTIVES | MODEL | VIEW | RULES_ENGINE | CONTROLLER | UTILS,
    genuinely reflecting the MVC + rules + utility separation.
  - All security restrictions are first-class ABSOLUTE_RULES.
  - previous_state is maintained every turn, enabling the Ending rewind to work.
  - SESSION_PHASES declares explicit trigger conditions for every phase boundary.
  - A formal WORLD_GENERATION phase is defined between Introduction and Loop.
  - VIEW templates declare accepted parameters as a contract with the CONTROLLER.
  - sub_quests and exits have complete inline schemas.
  - Every save JSON includes save_version and load validation detects schema drift.

context: |
  Issues were identified during a structured post-release audit of the FEAT-0001 (v2.1)
  deliverable on 2026-03-13. The audit covered both the verbose prompt.md and the
  compressed prompt-compressed.md. The v2.2-vuln-test variant (FEAT-0001 Stage 6) also
  served as a reference, as it prototyped several game features that inform CR-0003.

  Risk: LOW. All changes are textual edits to a single file. The a-sdlc/ submodule
  is read-only and is not touched by this change. No external systems are affected.

constraints:
