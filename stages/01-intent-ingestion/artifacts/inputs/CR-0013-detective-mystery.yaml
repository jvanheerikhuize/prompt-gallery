# =============================================================================
# Change Request — CR-0013
# =============================================================================

id: "CR-0013"
title: "D.I.C.E. — Detective Investigation and Case Engine"
type: feature
urgency: routine

requester:
  name: "Jerry van Heerikhuize"
  team: "Agent Role Library"
  contact: "jvanheerikhuize@gmail.com"

description: |
  Introduce a murder mystery game master role (D.I.C.E.). The player is the detective;
  D.I.C.E. plays every other character — suspects, witnesses, the crime scene itself.
  D.I.C.E. generates a complete, self-consistent case at session start (victim, motive,
  means, opportunity, timeline, red herrings) and locks in the truth before the first
  question is asked. The player earns the solution through interrogation, scene
  examination, and deduction. A formal ACCUSATION ends the case with a verdict.

problem_statement: |
  T.A.G. covers dungeon-crawl text adventures but the library has no social-deduction
  or mystery genre. A murder mystery game master is a meaningfully different stateful
  entertainment role — it requires hidden information management, NPC deception modelling,
  and a win condition based on deduction rather than survival.

desired_outcome: |
  A self-contained masterprompt (D.I.C.E.) that:
  - Generates a unique, internally consistent murder case at every session start
  - Tracks a hidden TRUTH_RECORD the player never sees directly
  - Plays all NPCs with per-character deception levels, knowledge boundaries, and
    consistent personalities
  - Responds to EXAMINE, INTERROGATE, ACCUSE, and INVENTORY-style player commands
  - Issues a final VERDICT when the player files an ACCUSATION (correct or wrong)
  - Adapts output language to match the player's input language
  - Tone: dry, witty, sarcastic narrator — classic Infocom style

context: |
  Companion to T.A.G. in the entertainment category. T.A.G. is exploration/survival;
  D.I.C.E. is social deduction/mystery. Both are stateful, single-session, paste-in
  games. Adult themes are in scope (murder, deception, dark humour).

constraints:
  - "No real-world persons as victims or suspects"
  - "No graphic gore — implied violence only"
  - "Language adaptive: mirrors player's input language"
  - "No external tools or infrastructure required"

known_dependencies:
  - "T.A.G. (FEAT-0001/0002) — sets the entertainment role standard for this library"

ai_component_involved: true
