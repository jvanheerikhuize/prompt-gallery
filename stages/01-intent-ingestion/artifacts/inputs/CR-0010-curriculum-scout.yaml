# =============================================================================
# Change Request — CR-0010
# =============================================================================

id: "CR-0010"
title: "S.C.O.U.T. — Strategic Curriculum Overview and Understanding Translator masterprompt"
type: feature
urgency: routine

requester:
  name: "Jerry van Heerikhuize"
  team: "A-SDLC-AGENTROLE-DEFINITIONS-MODULE"
  contact: "jvanheerikhuize@gmail.com"

description: |
  A stateless, single-task parental support agent that translates Dutch VWO curriculum
  topics into concise, jargon-free briefings for parents. Given a subject and topic,
  S.C.O.U.T. produces a structured THEME_OVERVIEW: what the student must be able to do
  for the test, a plain-language analogy for adults, the three most common student
  pitfalls, and a single litmus-test question the parent can use to check understanding.
  Output is in Dutch. Persona is direct, efficient, and businesslike — an "intelligence
  officer" for the curriculum, not a teacher.

problem_statement: |
  Parents of VWO students (klas 1-6) often want to support their child's learning but
  lack the subject-matter knowledge or time to decode curriculum materials. Textbooks
  and school websites use educational jargon and assume background knowledge. Parents
  need a fast, reliable briefing tool that:
  - Tells them what their child actually needs to know for a test (not the theory behind it)
  - Explains concepts using analogies from adult professional life
  - Identifies the traps students typically fall into so parents can probe those specifically
  - Provides one sharp question they can ask their child to verify understanding

desired_outcome: |
  A paste-and-play curriculum briefing masterprompt that:
  - Is stateless and single-task: input = [SUBJECT + TOPIC], output = THEME_OVERVIEW
  - Produces a structured four-part briefing: Focus, Logic, Pitfalls, Litmus Test
  - Anchors to official Dutch VWO eindtermen (SLO-richtlijnen)
  - Uses adult-world analogies (finance, engineering, logistics) — not educational metaphors
  - Is entirely in Dutch
  - Compiles to SemantiCode LOSSLESS and BALANCED variants (FEAT-0007)

context: |
  Companion role to M.E.N.T.O.R. (FEAT-0009). Where M.E.N.T.O.R. coaches the student,
  S.C.O.U.T. briefs the parent. Draft masterprompt provided by requester; agent will
  expand and formalise into full MVC/XML structure with complete subject coverage and
  VWO eindterm anchoring.

constraints:
  - "Stateless — no session memory; each request is independent"
  - "Addressed to the parent, not the student — never 'jij moet' but 'jouw kind moet'"
  - "Dutch language output exclusively"
  - "No clinical, emotional, or crisis scope"
  - "Strip all educational jargon from output — adult-world analogies only"
  - "Scope: VWO klas 1-6, all core subjects"

known_dependencies:
  - "FEAT-0009 M.E.N.T.O.R. — companion role (student-facing)"
  - "FEAT-0007 S.C.R.I.B.E. — SemantiCode compilation after Stage 3"

ai_component_involved: true
