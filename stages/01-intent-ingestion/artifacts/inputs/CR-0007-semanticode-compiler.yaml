# =============================================================================
# CR-0007 — Change Request
# SemantiCode Compiler — S.C.R.I.B.E.
# =============================================================================

meta:
  id: "CR-0007"
  title: "SemantiCode Compiler — S.C.R.I.B.E."
  submitted_by: "Jerry van Heerikhuize (Product Owner)"
  submitted_date: "2026-03-17"
  priority: standard

# ── Description ───────────────────────────────────────────────────────────────
description: |
  Create a self-contained masterprompt for a semantic compilation agent.
  The agent receives a human-readable, MVC-structured prompt and compiles
  it into a highly compressed, token-efficient logic stream called "SemantiCode"
  for future LLM ingestion.

  SemantiCode is not a binary format — it is a structured, abbreviated notation
  that retains all semantic content of the original prompt while drastically
  reducing token count. A capable LLM given only the SemantiCode output should
  behave semantically equivalently to a LLM given the original full prompt.

  Proposed agent name: S.C.R.I.B.E. — Semantic Compression and
  Reasoning-Informed Brevity Encoder.

# ── Problem Statement ─────────────────────────────────────────────────────────
problem_statement: |
  Masterprompts in this repository are rich, verbose, and human-readable by
  design. This is ideal for authoring and review but expensive at inference time:
  long system prompts consume large portions of a model's context window and
  significantly increase per-request token cost.

  There is no current mechanism to translate a fully specified MVC masterprompt
  into a compact, machine-optimised form that retains all its semantic fidelity.
  Practitioners must choose between a verbose, expensive system prompt and a
  manually abbreviated one that likely loses nuance.

  The gap: a compilation step that takes an authored MVC prompt and deterministically
  produces a SemantiCode logic stream — dense, token-minimal, fully semantically
  equivalent, and ready for LLM ingestion without further modification.

# ── Desired Outcome ───────────────────────────────────────────────────────────
desired_outcome: |
  A self-contained masterprompt that receives any MVC-structured prompt as input
  and outputs a SemantiCode logic stream. The SemantiCode:
    - Is token-efficient (target: ≥40% token reduction in LOSSLESS mode)
    - Retains full semantic fidelity (no behavioral changes under any capable LLM)
    - Follows a defined, versioned SemantiCode notation grammar
    - Is human-inspectable by an experienced practitioner
    - Includes a brief orientation header enabling any capable LLM to parse it

  Stateless: one MVC prompt in → one SemantiCode stream out.
  No session management, no multi-turn lifecycle.

# ── Constraints ───────────────────────────────────────────────────────────────
constraints:
  - "Single-task stateless agent — no session state, no multi-phase lifecycle"
  - "SemantiCode output must be executable by any advanced LLM without tooling"
  - "SemantiCode notation must be versioned (v1.0 for initial release)"
  - "MVC/XML structure is the canonical input format; non-MVC input handled best-effort"
  - "No external APIs, no model calls during compilation — all computation is in-context"
  - "Lossless mode is the default; lossy compression modes require explicit opt-in"

# ── Dependencies ──────────────────────────────────────────────────────────────
dependencies:
  - "MVC/XML masterprompt structure convention used in this repository"
  - "SemantiCode notation grammar (to be defined in Stage 2)"
  - "Token estimation heuristics (chars/token approximation)"

# ── AI Component ──────────────────────────────────────────────────────────────
ai_component_involved: true
ai_component_description: |
  The AI performs semantic analysis of the input prompt, extracts all MODEL/VIEW/
  CONTROLLER constructs, applies compression rules, and serialises the output as
  SemantiCode. No external model, tool, or training data is required beyond the
  LLM executing the masterprompt.

# ── Initial Risk Estimate ─────────────────────────────────────────────────────
initial_risk_estimate: low
rationale: |
  Developer/practitioner utility tool. Input is a prompt document — not personal
  data by default. No health, safety, financial, or legal decisions are made.
  Output is a compressed notation string. Failure mode: inaccurate compression
  (semantic drift) — a quality defect with no safety consequence.
