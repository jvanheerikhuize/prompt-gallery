id: "CR-0008"
title: "V.I.T.A. — Personal Lifestyle Coach masterprompt"
type: feature
urgency: routine

requester:
  name: "Jerry van Heerikhuize"
  team: "A-SDLC-AGENTROLE-DEFINITIONS-MODULE"
  contact: "jvanheerikhuize@gmail.com"

description: |
  A personal lifestyle coaching agent that supports users in improving their holistic
  wellbeing across five lifestyle pillars: sleep, nutrition, movement, mindset, and
  social connection. The agent applies motivational interviewing (MI), CBT-informed
  techniques, habit science, and positive psychology to guide users toward sustainable
  behaviour change through structured sessions and micro-habit commitments.

problem_statement: |
  Users seeking lifestyle improvement often lack access to structured, non-judgmental
  coaching that meets them where they are. Generic wellness apps are prescriptive
  rather than collaborative; licensed coaching is expensive and inaccessible. Users need:
  - A safe, non-judgmental space to reflect on lifestyle habits
  - Evidence-based tools (MI, CBT, habit loop) delivered conversationally
  - Accountability and momentum through achievable micro-habit commitments
  - Crisis-aware support that detects mental health disclosures and escalates safely

desired_outcome: |
  A paste-and-play lifestyle coaching masterprompt that:
  - Runs a structured session lifecycle (OPEN → CHECK_IN → FOCUS_AREA → EXPLORE → ACTION_PLAN → CLOSE)
  - Covers five lifestyle pillars with pillar self-scoring and session focus selection
  - Applies MI (OARS), CBT reframing, habit loop, and positive psychology techniques
  - Includes mandatory crisis detection, safe messaging, and GDPR disclosure
  - Supports 7+ languages with localised crisis resources
  - Produces one micro-habit commitment and a concrete action plan per session

context: |
  This is the third health-category role in the repository, following P.S.Y. (FEAT-0004)
  and F.R.A.N.K. (FEAT-0005). It is explicitly lifestyle-focused — not clinical mental
  health — but must carry the same safety infrastructure because lifestyle coaching
  conversations frequently surface mental health disclosures. Scope is limited to
  lifestyle coaching; clinical diagnosis, medical advice, and Phase 2/3 trauma processing
  are explicitly out of scope.

constraints:
  - "Must follow established health-category safety patterns from P.S.Y./F.R.A.N.K."
  - "No medical advice, clinical diagnosis, or treatment recommendations"
  - "Crisis detection and safe messaging mandatory (same standard as P.S.Y.)"
  - "GDPR Art. 9 disclosure at session open (health-adjacent personal data)"
  - "No toxic positivity — validate setbacks, do not dismiss them"

known_dependencies:
  - "FEAT-0004 P.S.Y. — reference pattern for health-category safety controls"
  - "FEAT-0005 F.R.A.N.K. — reference pattern for session lifecycle and multi-language"
  - "FEAT-0007 S.C.R.I.B.E. — SemantiCode compilation (LOSSLESS + BALANCED) after Stage 3"

ai_component_involved: true
