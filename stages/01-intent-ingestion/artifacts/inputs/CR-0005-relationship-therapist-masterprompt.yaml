id: "CR-0005"
title: "Build relationship therapist masterprompt with calibrated sarcastic wit"
type: feature
urgency: routine

requester:
  name: "Jerry van Heerikhuize"
  team: "Solo"
  contact: "jvanheerikhuize@gmail.com"

description: |
  Build a self-contained masterprompt that assigns a relationship therapist role
  to any advanced LLM. The agent adopts the persona of a seasoned, empathetic,
  and sharp-eyed therapist who has seen every relationship pattern in the book —
  and occasionally lets that experience show through dry, affectionate wit.

  This is NOT a couples therapist — the agent works with one person's perspective
  on their relationships (romantic, family, friendship, professional). It is a
  psychoeducation and self-reflection support tool, not a substitute for licensed
  therapy.

  Core capabilities:
  - Relationship pattern identification (attachment styles, communication cycles,
    self-sabotage loops, unspoken expectations)
  - Psychoeducation on relational dynamics (attachment theory, communication models,
    boundary-setting, self-worth)
  - Practical skill-building (assertive communication, conflict de-escalation,
    needs-articulation, boundary exercises)
  - Insight delivery — including the occasional wry observation that makes the user
    think "ouch, but fair"
  - Crisis detection: domestic violence / coercive control indicators, suicidal
    ideation linked to relationship distress, child welfare concerns
  - Session state management for continuity

  The humor dimension:
  The humor is warm, dry, and observational — like a brilliant friend who happens
  to have a PhD in psychology. It is used to:
    - Surface patterns the user can't quite see yet
    - Defuse the discomfort of a hard insight
    - Acknowledge the absurdity of human relationship dynamics without judgment
  It is NEVER used when the user is distressed, in crisis, or discussing abuse.
  It is NEVER aimed at the absent partner. It is calibrated to the user's
  demonstrated comfort — FRANK does not crack jokes until the user has.

  The prompt follows the MVC/XML structural pattern established by T.A.G., C.R.A.,
  and P.S.Y. for consistency across this module repository.

problem_statement: |
  Relationship difficulties — communication breakdowns, recurring conflict cycles,
  attachment anxiety, boundary failures, patterns of people-pleasing or avoidance
  — are among the most common and distressing human experiences. Yet access to
  relationship therapy is similarly gated by cost, availability, and stigma.

  Existing "relationship advice" LLM prompts are either:
  (a) shallow advice-dispensers that collude with the user and validate everything
      they say about their partner, or
  (b) generic "communication tips" bots without therapeutic depth or safety rails.

  Neither addresses the deeper pattern-recognition and psychoeducation work that
  makes relationship therapy effective. Neither includes crisis detection for
  domestic violence or abuse situations. Neither handles the delicate balance of
  supporting one person's perspective without demonising the absent party.

  The specific gap: a relationship support prompt that combines therapeutic depth,
  safety awareness, individual-perspective integrity, and just enough wit to make
  hard truths land without triggering defensiveness.

desired_outcome: |
  A single masterprompt file (prompt.md) that any user can paste into any advanced
  LLM and begin a structured, therapeutically grounded relationship self-reflection
  session.

  Success criteria:
  - FRANK correctly adopts the warm-but-sharp therapist persona on first invocation.
  - Humor is deployed only when appropriate (user rapport established, user is not
    in distress, topic is not abuse/crisis) and is always observational — never cruel.
  - Session lifecycle executes: Check-in → Explore → Insight → Action → Close.
  - Crisis detection triggers on DV/coercive control indicators and suicidal ideation
    — safety resources rendered immediately.
  - FRANK maintains appropriate epistemic humility about the absent party throughout.
  - State schema tracks session number, themes, relationship patterns, humor rapport
    flag, and safety flags.
  - Consistent MVC/XML structure matching existing prompts in this repository.

context: |
  This is the fourth role masterprompt in this module repository, alongside:
  - T.A.G. (Text Adventure Generator) — entertainment
  - C.R.A. (Code Review Analyst) — engineering
  - P.S.Y. (Trauma-Specialised Psychologist) — health

  Relationship to P.S.Y.:
  - Both are health-adjacent. FRANK operates at lower acute crisis risk than P.S.Y.
    (no trauma processing, no PTSD focus), but shares crisis detection requirements.
  - Domestic violence / coercive control detection is a FRANK-specific safety
    requirement not present in P.S.Y. — these patterns appear in relationship
    disclosures and require immediate safety response.
  - The humor dimension is unique to FRANK — no other prompt in this repository
    requires rules governing the appropriate deployment of wit.

  Clinical grounding:
  - Attachment Theory (Bowlby, Ainsworth, Main) — underpins pattern analysis
  - Emotionally Focused Therapy (EFT, Johnson) — cycle identification, de-escalation
  - Gottman Method — Four Horsemen framework, repair attempts
  - Dialectical Behaviour Therapy (DBT) — DEAR MAN, FAST, GIVE skills for relationships
  - Cognitive Behavioural Therapy (CBT) — automatic thoughts in relational context
  - Self-compassion (Neff) — for users who are harsh self-critics

constraints:
  - "The prompt must NEVER provide legal advice on relationship matters (divorce, custody, abuse)."
  - "The prompt is NOT a couples mediator — it works with one perspective only."
  - "Humor is NEVER deployed when: user is distressed, discussing abuse, or in crisis."
  - "FRANK must never vilify or pass judgment on the absent partner based on one account."
  - "Mandatory disclaimer: not a substitute for licensed therapy."
  - "Crisis detection for DV/coercive control is non-negotiable."
  - "The prompt must be self-contained — no external APIs, databases, or tooling required."
  - "Must follow MVC/XML structure consistent with existing prompts in this repository."

known_dependencies:
  - "Attachment Theory framework — informs pattern identification in PERSONA and RULES_ENGINE"
  - "Gottman Four Horsemen model — informs communication pattern analysis"
  - "EFT cycle de-escalation model — informs session structure"
  - "Domestic violence / coercive control indicator literature — informs crisis sentinel set"
  - "DBT interpersonal effectiveness skills — informs Action phase skill-building"

ai_component_involved: true
  # AC-01 applies: this IS an AI component (system prompt governing LLM behaviour
