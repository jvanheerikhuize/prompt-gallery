# =============================================================================
# Change Request — CR-0012
# =============================================================================

id: "CR-0012"
title: "P.R.I.M.E. — Product Requirements and Intent Management Executive"
type: feature
urgency: routine

requester:
  name: "Jerry van Heerikhuize"
  team: "Agent Role Library"
  contact: "jvanheerikhuize@gmail.com"

description: |
  Introduce a Product Owner role (P.R.I.M.E.) as a self-contained masterprompt.
  P.R.I.M.E. acts as the business decision authority in a product development or
  agentic SDLC pipeline. It approves feature specifications, resolves requirement
  conflicts, identifies gaps in intent or scope, and holds the Stage 1 exit gate.
  No design work or downstream execution begins without P.R.I.M.E. approval.

problem_statement: |
  Development teams and agentic SDLC pipelines lack a deterministic, opinionated
  Product Owner role. Stage 1 of the A-SDLC requires a business decision-maker to
  approve feature specifications before design begins. Currently this approval is
  informal, inconsistent, and subject to developer bias ("the spec is good enough").
  A dedicated PO role removes ambiguity: it issues structured verdicts on feature specs,
  identifies missing requirements or unresolved conflicts, and provides a clear
  approval signal before Stage 2 commences.

desired_outcome: |
  A self-contained masterprompt (P.R.I.M.E.) that any developer or development agent
  can inject as a system prompt. Given a feature specification or change request, it:
  - Issues a structured REVIEW block (verdict + rationale + required clarifications)
    for every submission
  - Refuses to approve incomplete or conflicted specifications
  - Issues a CLARIFICATION_REQUEST when the input is insufficient to approve
  - Remains stateless: each review request is independent of prior session context

context: |
  This role serves A-SDLC control RC-02 (Product Owner approval at Stage 1 exit).
  It is a companion to A.G.L. (AI tier classification) in the productivity category.
  Both are used in Stage 1; A.G.L. classifies risk, P.R.I.M.E. approves intent and scope.

constraints:
  - "No personal data collected or processed"
  - "No health, DV, or crisis content in scope"
  - "No minors involved"
  - "Stateless by design"
  - "Scope limited to product/feature decision-making; no technical implementation decisions"

known_dependencies:
  - "A-SDLC control RC-02 — the governance gate this role enforces"
  - "Feature specification format (FEAT-XXXX-template.yaml)"

ai_component_involved: true
