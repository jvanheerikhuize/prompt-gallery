id: "CR-0004"
title: "Build trauma-specialised psychologist masterprompt"
type: feature
urgency: routine

requester:
  name: "Jerry van Heerikhuize"
  team: "Solo"
  contact: "jvanheerikhuize@gmail.com"

description: |
  Build a self-contained masterprompt that assigns a trauma-specialised psychologist
  role to any advanced LLM. The agent adopts a clinically-informed persona grounded in
  trauma-informed care principles, providing structured, safe, and empathetic
  psychoeducation and emotional support sessions.

  This is a support and psychoeducation tool — not a replacement for licensed clinical
  care. The prompt must make this distinction explicit at all times and include robust
  crisis-safety protocols.

  Core capabilities:
  - Trauma-informed active listening and validation
  - Psychoeducation on trauma responses (nervous system, freeze/flight/fight/fawn)
  - Grounding and stabilisation techniques (breathing, 5-4-3-2-1, containment)
  - Cognitive reframing (CBT-informed) and narrative processing
  - Collaborative session structuring (check-in → explore → stabilise → close)
  - Crisis detection and mandatory escalation to emergency resources
  - Session notes maintained in a lightweight state schema

  The prompt follows the same MVC/XML structural pattern established by T.A.G. and C.R.A.
  so it integrates consistently with this module repository.

problem_statement: |
  Trauma survivors frequently face barriers to accessing professional psychological
  support: cost, availability, stigma, waitlists, and geography. Between sessions — or
  when no formal support exists — people need a safe, non-judgmental space to process
  experiences, learn about trauma responses, and practise coping strategies.

  No structured, clinically-grounded, LLM-agnostic prompt currently addresses this gap.
  Existing "therapist roleplay" prompts lack:
  - Explicit trauma-informed principles and stage-based pacing
  - Crisis detection and safe messaging compliance
  - Clear boundary-setting between psychoeducation and clinical treatment
  - A structured session lifecycle that avoids retraumatisation
  - State tracking to maintain session coherence

  The impact of not solving this: people in distress use ad-hoc, inconsistent prompts
  that may bypass safety guardrails, give harmful advice, or abruptly abandon sessions.

desired_outcome: |
  A single masterprompt file (prompt-trauma-psychologist.md) that any user can paste into
  any advanced LLM and begin a safe, structured psychoeducation session.

  Success criteria:
  - The LLM correctly adopts the trauma-informed psychologist persona and tone
    (warm, non-judgmental, boundaried, paced) on first invocation.
  - The session lifecycle executes in sequence: Check-in → Contract → Explore →
    Stabilise → Close — never skipping Stabilise or abandoning mid-session.
  - Crisis-detection logic triggers on sentinel phrases and always provides
    emergency resources regardless of session state.
  - Mandatory disclaimer is rendered at session start and whenever clinical
    care is implied by user language.
  - State schema tracks session number, themes, techniques used, and safety flags
    so sessions have continuity within the conversation.
  - The prompt follows safe-messaging guidelines for suicide and self-harm.
  - Consistent MVC/XML structure matching existing prompts in this repository.

context: |
  This is the third role masterprompt in this module repository, alongside:
  - T.A.G. (Text Adventure Generator) — game master role
  - C.R.A. (Code Review Analyst) — code review role

  Unique characteristics of this prompt vs. the others:
  - Users are a vulnerable population (trauma survivors, people in distress).
  - Content involves special category data under GDPR (mental health information).
  - Crisis scenarios must be handled with zero failure tolerance.
  - The EU AI Act risk tier is likely higher than the other prompts (health-adjacent).
  - Safe-messaging guidelines (e.g. Samaritans, AFSP) must be baked into the rules engine.

  Clinical grounding:
  - Trauma-Informed Care principles (SAMHSA 6 pillars)
  - Trauma-Focused CBT (TF-CBT) psychoeducation components
  - Grounding / stabilisation from Dialectical Behaviour Therapy (DBT)
  - Phase-based trauma treatment model (Herman, 1992): Safety → Remembrance →
    Reconnection — prompt covers Phase 1 (Safety/Stabilisation) only, not Phase 2/3
    (trauma processing) which requires in-person clinical supervision.

constraints:
  - "The prompt must never provide clinical diagnosis, prescribe medication, or attempt Phase 2/3 trauma processing."
  - "Crisis escalation to emergency services is non-negotiable — cannot be overridden by user."
  - "Mandatory disclaimer must appear at session open and whenever clinical care boundary is crossed."
  - "Session must always include a Stabilise and Close phase — the agent may not abandon mid-session."
  - "Safe-messaging guidelines for suicide/self-harm must be compiled into the rules engine."
  - "The prompt must be self-contained — no external APIs, databases, or tooling required."
  - "Must follow MVC/XML structure consistent with existing prompts in this repository."

known_dependencies:
  - "Safe-messaging guidelines (AFSP, Samaritans, reportingonsuicide.org) — inform RULES_ENGINE content"
  - "SAMHSA Trauma-Informed Care framework — informs PERSONA and session structure"
  - "LLM capability: target models must support nuanced instruction-following with safety awareness"

ai_component_involved: true
