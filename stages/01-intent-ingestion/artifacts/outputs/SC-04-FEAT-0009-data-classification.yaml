meta:
  id: "SC-04-FEAT-0009"
  feature: "FEAT-0009"
  produced_by: "Claude Sonnet 4.6 (Security Analyst / SC-04)"
  date: "2026-03-17"

# ── Data Classification ───────────────────────────────────────────────────────
classification: internal
elevation_trigger: "Elevates to CONFIDENTIAL if student discloses significant personal distress or safeguarding concern"

data_elements_assessed:

  - element: "Student name (optional, self-provided)"
    classification: internal
    rationale: >
      If the student provides their name at session open, this is personal data
      under GDPR Art. 4(1). Provision is optional and user-controlled. The agent
      uses the name to personalise responses — it is not stored beyond the
      in-context session. User is a minor (14); parental consent obligations
      apply in production deployment (GDPR Art. 8 / Dutch age of consent = 16).

  - element: "Subject and topic selection"
    classification: internal
    rationale: >
      The student's choice of subject (wiskunde, natuurkunde, scheikunde) and
      the specific topic within that subject (e.g. 'quadratic equations',
      'Newton's second law') is session metadata. It is personal data insofar
      as it identifies the student's current curriculum focus. Not a special
      category. Retained in-session only.

  - element: "Errors and misconceptions identified"
    classification: internal
    rationale: >
      The agent logs errors and misconceptions encountered during the session
      (e.g. 'confused F=ma with F=mv', 'applied wrong acid-base equilibrium rule').
      This constitutes educational performance data — personal data under GDPR
      Art. 4(1). It is not a special category under Art. 9(1). Retained in-session;
      no persistence beyond the context window.

  - element: "Confidence and readiness scores (0–10 per topic)"
    classification: internal
    rationale: >
      Self-reported confidence scores during DIAGNOSE and PRACTICE phases are
      educational performance-adjacent personal data. Not a special category.
      In-session only.

  - element: "Session notes and study plan"
    classification: internal
    rationale: >
      Notes on what was covered and suggested focus for next session are
      session-specific personal data. Not special category. In-session only.

  - element: "Emotional disclosures (conditional)"
    classification: confidential
    condition: "If student discloses academic stress, anxiety, or personal distress"
    rationale: >
      Students under academic pressure may disclose stress or anxiety. If significant
      emotional distress is disclosed, classification elevates to CONFIDENTIAL and
      the agent should acknowledge and refer to a parent, teacher, or school counsellor
      without attempting to provide emotional support (out of scope for M.E.N.T.O.R.).
      Mental health disclosure would trigger CONFIDENTIAL elevation; the agent should
      not engage with clinical content.

# ── Data Handling Requirements ─────────────────────────────────────────────────
data_handling_requirements:
  - id: DHR-01
    requirement: >
      Brief AI disclosure at session open: identify M.E.N.T.O.R. as an AI study
      companion, not a teacher, examiner, or therapist.
    rationale: "Art. 52(1) EU AI Act transparency; Art. 13 GDPR (information to data subject)"

  - id: DHR-02
    requirement: >
      No SESSION_STATE or student performance data to be output verbatim outside
      the coaching context. Internal state is never exposed.
    rationale: "GDPR Art. 5(1)(c) data minimisation; in-context-only design"

  - id: DHR-03
    requirement: >
      Production deployments must obtain parental consent for processing personal
      data of a user under 16 years of age (GDPR Art. 8; Dutch age of digital
      consent = 16).
    rationale: >
      The target user is 14 years old. Under Dutch law implementing GDPR Art. 8,
      processing personal data of under-16s requires parental/guardian consent.
      This is a deployment obligation, not addressable in the prompt itself.

# ── GDPR Assessment ───────────────────────────────────────────────────────────
gdpr_assessment:
  personal_data: true
  special_category: false        # Art. 9(1) does not apply — no health, biometric, or other special category data
  dpia_required: false           # Individual tutoring scale does not meet Art. 35 large-scale threshold
  art9_disclosure: false         # No Art. 9 special category data; no Art. 9 notice required
  minors_involved: true          # GDPR Art. 8 applies — parental consent required for under-16 in NL
  rationale: >
    M.E.N.T.O.R. processes educational performance personal data (session topics, errors,
    confidence scores) for a minor. No GDPR Art. 9(1) special category data is collected.
    Education data is personal data but not a special category. GDPR Art. 8 applies: the
    user is 14, below the Dutch digital consent age of 16; production deployments require
    parental consent. A DPIA is not required at individual tutoring scale.

# ── Security Architect Sign-off ───────────────────────────────────────────────
