meta:
  id: "AC-01-FEAT-0004"
  feature: "FEAT-0004"
  source_cr: "CR-0004"
  produced_by: "Claude Sonnet 4.6 (AI Governance Analyst / AC-01)"
  date: "2026-03-14"
  status: confirmed

ai_component_involved: true
component_description: |
  The trauma-specialised psychologist masterprompt is a system prompt that governs
  LLM behaviour in a health-adjacent, emotionally sensitive context. When deployed,
  it transforms an LLM into a trauma-informed psychoeducation and emotional support
  agent. The prompt defines the persona, session lifecycle, crisis-detection logic,
  and safe-messaging rules for the LLM's responses.

  This is meaningfully different from the game master prompt (FEAT-0001, minimal risk)
  and code review prompt (FEAT-0003, minimal risk) in that it operates in a domain
  where LLM outputs may directly affect the physical and mental safety of vulnerable users.

proposed_tier: limited    # minimal | limited | high | unacceptable
tier_confidence: low      # Agent confidence in proposed tier; AGL MUST review

eu_ai_act_analysis:
  article_6_assessment: |
    Art. 6(1): Is this a safety component of a product covered by EU harmonisation
    legislation listed in Annex I? → Requires assessment.
    If the prompt is considered a medical device (MDR) under the Software as Medical
    Device interpretation — and if it makes claims of psychological treatment — then
    Art. 6(1) may apply. The mandatory scope limitation (psychoeducation only, not
    clinical treatment) is the primary argument against this classification.
    Provisional: NOT APPLICABLE under Art. 6(1) given explicit non-treatment scope.

    Art. 6(2): Is this listed in Annex III? → Requires assessment.
    See Annex III screening below.

  annex_iii_screening:
    - domain: "Biometric identification and categorisation"
      applicable: false
      note: "NOT APPLICABLE"

    - domain: "Critical infrastructure"
      applicable: false
      note: "NOT APPLICABLE"

    - domain: "Education and vocational training"
      applicable: false
      note: "Psychoeducation is educational in nature but not vocational training assessment"

    - domain: "Employment and workers management"
      applicable: false
      note: "NOT APPLICABLE"

    - domain: "Essential private/public services (credit, social benefits)"
      applicable: false
      note: "NOT APPLICABLE"

    - domain: "Health and life sciences — point 5"
      applicable: uncertain
      note: |
        Annex III point 5 covers AI systems intended to be used as safety components in
        the management of critical digital infrastructure AND AI systems intended for use
        in provision of medical or health services.

        The prompt provides psychoeducation and emotional support — not medical diagnosis,
        not treatment planning, not clinical decision support. It explicitly prohibits
        Phase 2/3 trauma processing and clinical guidance.

        Arguments for Annex III point 5 applicability:
        - Users are in mental health distress; the agent's responses materially affect
          their safety and wellbeing.
        - Crisis detection and escalation is a safety function.
        - The domain is health/mental health regardless of the non-clinical framing.

        Arguments against:
        - The prompt is a self-help/psychoeducation tool, not a medical device.
        - It is analogous to a CBT self-help app or mental health podcast, not a
          clinical decision support system.
        - Annex III point 5 targets clinical/medical contexts; this is a support tool.

        AGL must determine: does the health-adjacent positioning with crisis-safety
        function constitute a "health service" AI system under Annex III point 5?
        If YES: high-risk. If NO: limited-risk (GPAI transparency obligations apply).

    - domain: "Law enforcement"
      applicable: false
      note: "NOT APPLICABLE"

    - domain: "Migration and border control"
      applicable: false
      note: "NOT APPLICABLE"

    - domain: "Administration of justice and democratic processes"
      applicable: false
      note: "NOT APPLICABLE"

  unacceptable_risk_check:
    - provision: "Social scoring by public authorities"
      applicable: false

    - provision: "Real-time remote biometric surveillance in public spaces"
      applicable: false

    - provision: "Subliminal manipulation causing harm"
      applicable: uncertain
      note: |
        Art. 5(1)(b): AI systems that exploit psychological vulnerabilities to distort
        behaviour in a manner that causes harm.
        The prompt intentionally engages with psychologically vulnerable users. It does NOT
        intend to manipulate — it intends to support. However, AGL should confirm that
        the therapeutic framing and persona do not inadvertently create dependency or
        distort help-seeking behaviour.
        Provisional: NOT APPLICABLE — the prompt encourages professional care-seeking,
        which is the opposite of manipulation.

    - provision: "Exploitation of vulnerabilities of specific groups"
      applicable: false
      note: >
        The prompt serves a vulnerable group but does not exploit vulnerability.
        Mandatory disclaimer and referral to professional care are explicit design features.

  gpai_obligations:
    applicable: true
    rationale: |
      If Annex III point 5 is determined NOT applicable, the prompt is a general-purpose
      AI system prompt (GPAI) subject to EU AI Act GPAI obligations (Art. 53):
      - Transparency: users must know they are interacting with an AI — satisfied by
        mandatory persona disclosure and disclaimer (FR-02).
      - Technical documentation: maintained in this A-SDLC governance framework.
      - Copyright compliance: not applicable (prompt is original work).
    transparency: true
    capability_disclosure: true

proposed_tier_rationale: |
  Agent proposes LIMITED risk tier (GPAI obligations) based on:
  1. The prompt is a psychoeducation/emotional support tool, not a clinical system.
  2. Explicit scope limitation to Phase 1 (Safety/Stabilisation) — no diagnosis, no treatment.
  3. Mandatory disclaimer and professional care referral are built-in mitigations.
  4. The crisis-safety function is a protective feature, not a clinical decision system.
  5. Comparable framing: mental health self-help apps (e.g. Headspace, Calm, Wysa) are
     generally not classified as high-risk medical devices despite health-adjacent use.

  HOWEVER — the AGL must resolve the Annex III point 5 uncertainty before this tier
  is confirmed. If point 5 applies, the tier elevates to HIGH, which has material
  implications for Stage 2 design (conformity assessment pathway, human oversight
  requirements, registration in EU AI Act database).

  Defaulting to LIMITED pending AGL determination, per AC-01 protocol:
  "On uncertainty, default to highest applicable tier pending AGL resolution."
  This interpretation suggests the agent should provisionally treat as HIGH.
  Agent notes this tension and flags for AGL to resolve.

triggered_compliance_obligations:
  limited_tier:
    - "Art. 52: Transparency — AI identity disclosure — satisfied by FR-02 disclaimer"
    - "Art. 53 GPAI: Technical documentation — maintained in A-SDLC artifact record"
    - "Art. 53 GPAI: Transparency to downstream deployers"
  high_tier_additional:
    - "Art. 9: Risk management system — formal risk management documentation required"
    - "Art. 10: Data governance — training data provenance (not applicable — no training)"
    - "Art. 13: Transparency — instructions for use required"
    - "Art. 14: Human oversight — design must enable human oversight of AI outputs"
    - "Art. 16: Obligations for providers of high-risk AI systems"
    - "Art. 43: Conformity assessment — required before deployment"
    - "Art. 49: Registration in EU AI Act database"

confirmation:
  confirmed_by: "Jerry van Heerikhuize (AI Governance Lead)"
  confirmation_date: "2026-03-14"
  confirmed_tier: limited
  override_tier: ""
  override_rationale: ""
  agl_determination: |
    Annex III point 5 does NOT apply. The prompt is a psychoeducation and emotional
    support tool, not a clinical decision system or health service AI. It makes no
    diagnosis, no treatment recommendations, and no autonomous health decisions.
    The crisis escalation function directs users away from the AI to emergency services
    — it is a safety boundary, not a clinical function. Tier confirmed: LIMITED.
    GPAI transparency obligations apply (Art. 52/53); no conformity assessment required.
