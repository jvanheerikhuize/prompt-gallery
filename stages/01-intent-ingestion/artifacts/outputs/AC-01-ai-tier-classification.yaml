minimal_risk_rationale: |
  A.T.L.A.S. is MINIMAL risk under the EU AI Act:
  - Utility cartography tool with well-defined input (coordinates) and output (ASCII map).
  - No automated decisions affecting persons' rights or interests.
  - No interaction with vulnerable populations.
  - No profiling, emotion recognition, or biometric processing.
  - Failure mode: inaccurate map proportions — no safety or harm consequence.
  - Precedent: T.A.G. (FEAT-0001) and C.R.A. (engineering prompt) are both MINIMAL.
    A.T.L.A.S. is of equal or lower complexity and risk.

