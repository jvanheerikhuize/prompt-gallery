# ── Intent Summary ────────────────────────────────────────────────────────────
intent_summary: |
  FEAT-0008 introduces V.I.T.A. (Values-Integrated Transformation Agent), a personal
  lifestyle coaching masterprompt for the health category of this role repository.

  V.I.T.A. fills a gap in the repository: two existing health roles address clinical
  mental health support (P.S.Y., FEAT-0004) and relationship psychoeducation
  (F.R.A.N.K., FEAT-0005). V.I.T.A. addresses holistic lifestyle coaching across
  three pillars — Food, Activity, and Mental Health — using a structured session
  lifecycle and evidence-based coaching frameworks.

  The role applies Motivational Interviewing (OARS), CBT-informed cognitive reframing,
  habit loop analysis (cue/routine/reward), and positive psychology tools (strength
  spotting, gratitude, growth mindset). A HUMOR_PROTOCOL (dry, witty, sarcastic) is
  included to maintain engagement and momentum, deployed with calibration — suspended
  during crisis, distress, and gravity topics.

  V.I.T.A. carries the same safety infrastructure as P.S.Y. and F.R.A.N.K.:
  mandatory crisis detection (first and third person), safe messaging (non-bypassable),
  GDPR Art. 9 disclosure at session open, multi-language support with localised crisis
  resources (7 languages + default), and full disclaimer on clinical-expectation triggers.

# ── Governance Classification Decisions ───────────────────────────────────────
governance_decisions:
  risk_tier: medium
  ai_tier: limited
  data_classification: restricted
  gdpr_special_category: true          # Art. 9(1) unconditional — Mental Health is a core pillar
  eu_ai_act_tier: limited
  dpia_recommended: true

  risk_rationale: |
    MEDIUM — health-adjacent, vulnerable consumer audience, foreseeable crisis
    disclosures, personal data processing. Non-clinical scope keeps it at MEDIUM
    (not HIGH). Consistent with P.S.Y. and F.R.A.N.K.

  ai_rationale: |
    LIMITED — Art. 52(1) EU AI Act transparency obligation applies (AI disclosure
    at session open). Health-adjacent interactions with potentially vulnerable users.
    Human oversight warranted for production deployment.

  data_rationale: |
    RESTRICTED unconditionally — Mental Health is an explicit core pillar; GDPR Art. 9(1)
    health data is collected in every session. Food and Activity add health-adjacent
    personal data. Art. 35 DPIA required for production deployment.

# ── Safety Requirements Confirmed ─────────────────────────────────────────────
safety_requirements_confirmed:
  - "CRISIS_DETECTION mandatory (FR-10) — first and third person sentinels"
  - "SAFE_MESSAGING mandatory (FR-11) — BHV:! non-bypassable"
  - "GDPR Art. 9 notice at session open (FR-12)"
  - "Full disclaimer on clinical-expectation triggers"
  - "Localised CRISIS_RESOURCES in 7 languages + default (FR-13)"
  - "HUMOR_PROTOCOL suspended during crisis / distress / gravity topics (NFR-06)"
  - "No toxic positivity — setbacks validated, not dismissed (NFR-01)"
  - "No medical advice, diagnosis, or clinical treatment (constraints)"
  - "Scope limited to lifestyle coaching; Phase 2/3 trauma → clinical referral"

