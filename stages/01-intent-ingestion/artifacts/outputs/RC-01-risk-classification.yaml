# ── Risk Tier Assessment ──────────────────────────────────────────────────────
risk_tier: low

criteria_evaluated:

  - criterion: "Impact on natural persons — health, safety, financial, legal"
    applies: false
    rationale: >
      A.T.L.A.S. is a cartography utility. It renders a visual representation of
      coordinates as an ASCII map. It makes no decisions, recommendations, or
      assessments affecting any person's health, safety, financial situation, or
      legal standing. Output is a spatial visualisation — no real-world effects.

  - criterion: "Vulnerable user population"
    applies: false
    rationale: >
      No specific vulnerable population is targeted or likely to be the primary
      user group. Intended users: developers, planners, game designers, anyone
      needing coordinate visualisation. No clinical, therapeutic, or crisis context.

  - criterion: "Personal data processing"
    applies: conditional
    rationale: >
      Coordinates provided by the user could — in principle — be personal data
      under GDPR Art. 4 if they represent a person's location (home address, frequent
      locations). However: (a) the agent has no mechanism to determine whether
      coordinates represent private or public locations; (b) no coordinates are
      stored, aggregated, or processed beyond the single request; (c) the typical
      use case involves geographic features, cities, or game-world positions.
      Conditional classification: PUBLIC by default; user-controlled elevation if
      personal location data is provided.

  - criterion: "Regulated sector (financial, healthcare, critical infrastructure)"
    applies: false
    rationale: >
      Cartography utility. Not operating in any regulated sector by default. Could
      theoretically be used in regulated contexts (e.g., mapping hospital locations)
      but the output itself carries no regulatory implication.

  - criterion: "High volume or automated decision-making"
    applies: false
    rationale: "Single-task, single-output per request. No automated decision-making pipeline."

  - criterion: "Reputational or operational risk to the organisation"
    applies: false
    rationale: >
      Incorrect map rendering (positions out of proportion) is the primary failure
      mode — this is a quality defect with no safety, legal, or reputational
      consequence beyond user dissatisfaction.

risk_tier_rationale: |
  A.T.L.A.S. is a LOW risk utility tool. No safety, health, legal, or financial
  decisions are made. No vulnerable population is targeted. Personal data processing
  is conditional and user-controlled. The worst-case failure mode is an inaccurate
  map rendering — a quality issue, not a harm event. This is the lowest risk tier
  in this repository.

risk_officer_override_required: false
