# ── Risk Tier Assessment ──────────────────────────────────────────────────────
risk_tier: low

criteria_evaluated:

  - criterion: "Impact on natural persons — health, safety, financial, legal"
    applies: false
    rationale: >
      S.C.R.I.B.E. is a prompt compilation utility. It receives a structured prompt
      document and emits a compressed notation stream. It makes no decisions,
      recommendations, or assessments affecting any person's health, safety,
      financial situation, or legal standing. Output is a token-efficient encoding
      of the input prompt — no real-world effects beyond reduced inference cost.

  - criterion: "Vulnerable user population"
    applies: false
    rationale: >
      No vulnerable population is targeted or likely to be the primary user group.
      Intended users: prompt engineers, LLM application developers, and practitioners
      optimising system prompt costs. No clinical, therapeutic, crisis, or consumer
      context. Technical practitioner audience only.

  - criterion: "Personal data processing"
    applies: conditional
    rationale: >
      The input to S.C.R.I.B.E. is a prompt document — typically containing agent
      persona definitions, behavioural rules, and output directives. By default,
      this is not personal data. However, if a user submits a prompt that itself
      contains personal data (e.g., a customer-service prompt referencing real
      individuals or case data), that personal data would be processed during
      compilation. This is user-controlled and out of scope for the tool itself.
      Classification: PUBLIC by default; conditional elevation if PII is embedded
      in the input prompt. No storage beyond the single request (stateless design).

  - criterion: "Regulated sector (financial, healthcare, critical infrastructure)"
    applies: false
    rationale: >
      Prompt compilation utility. Not operating in any regulated sector by default.
      The tool could be used to compile prompts for regulated-sector applications,
      but the compilation step itself carries no regulatory implication.

  - criterion: "High volume or automated decision-making"
    applies: false
    rationale: >
      Single-task, single-output per request. No automated decision-making pipeline
      or downstream decisions made by S.C.R.I.B.E. itself. The consuming LLM
      executes the compiled SemantiCode — that execution context is outside scope.

  - criterion: "Reputational or operational risk to the organisation"
    applies: low
    rationale: >
      Semantic drift in AGGRESSIVE mode (incorrect compression producing different
      LLM behaviour) is the primary failure mode. This is a quality defect — the
      consuming LLM behaves differently than expected based on the original prompt.
      Mitigated by: LOSSLESS default mode (FR-05), fidelity validation (FR-08),
      and capability advisory in AGGRESSIVE mode output (CONF-05 resolution).
      Not a safety or legal risk; a quality and trust issue within a developer
      tool context.

risk_tier_rationale: |
  S.C.R.I.B.E. is a LOW risk utility tool for prompt engineers and LLM practitioners.
  No safety, health, legal, or financial decisions are made. No vulnerable population
  is targeted. Personal data processing is conditional and user-controlled (input
  prompt content is the user's responsibility). The primary failure mode — semantic
  drift in compressed output — is a quality defect with no safety consequence.
  This is the lowest risk tier in this repository, consistent with A.T.L.A.S.
  (FEAT-0006) as a benchmark utility.

risk_officer_override_required: false
