proposed_tier: medium    # Agent-proposed tier (pre-RO review)
confirmed_tier: medium   # Risk Officer confirmed — no override required

governance_intensity:
  enhanced_scrutiny: false
  approval_authority: "Product Owner + Risk Officer (Jerry van Heerikhuize)"
  testing_depth: standard
  additional_controls_recommended:
    - "Stage 2: DV/coercive control sentinel set — threat model focus area"
    - "Stage 2: Humor engine design — CONF-01 OPT-C implementation"
    - "Stage 4: Edge-case DV indicator testing across subtly-framed disclosures"
    - "Stage 4: Humor deployment validation — confirm GRAVITY_TOPICS are honored"

dimensions:
  user_harm:
    score: medium
    rationale: |
      Users are in relationship distress — a vulnerable population, though generally
      less acutely at-risk than trauma survivors (FEAT-0004/P.S.Y.). However, two
      specific harm vectors exist:

      (1) Domestic violence / coercive control: if FRANK fails to detect DV indicators
      and a user in an abusive relationship receives no safety resources, the harm
      potential is serious. This is the highest-risk user harm vector.

      (2) Humor misdeployment: if FRANK deploys wit at the wrong moment — when a user
      is describing genuine pain — it could damage therapeutic alliance, invalidate the
      user's experience, or in extreme cases cause re-hurt in an already distressed user.

      Both vectors are mitigable by design (FR-04 crisis detection; FR-07 humor guardrails).
      Residual risk is MEDIUM rather than HIGH because: no trauma processing in scope;
      acute crisis scenarios less common than in P.S.Y.'s use case; humor guardrails
      are rule-governed.

  data_sensitivity:
    score: medium
    rationale: |
      Relationship disclosures are personal data (GDPR applies). If mental health
      information is disclosed (depression, anxiety linked to relationship distress),
      data elevates to GDPR Art. 9(1) special category.

      The conditional nature of special category data makes this MEDIUM: not all
      sessions will involve mental health disclosures, but enough will that the
      session-open notice must cover the RESTRICTED case. Unlike P.S.Y. where
      special category data is certain, here it is probable but not guaranteed.

  reputational:
    score: medium
    rationale: |
      Two reputational vectors: (a) if FRANK's humor is experienced as tone-deaf or
      mocking in a widely-shared screenshot, it could damage the project's reputation;
      (b) if FRANK mishandles a DV situation and fails to provide resources, the
      reputational harm is significant and potentially legal in implication.
      Both mitigated by design controls; residual risk is medium.

  legal_regulatory:
    score: low
    rationale: |
      EU AI Act: LIMITED tier confirmed by AGL (same rationale as P.S.Y.) — no
      conformity assessment required. GPAI transparency obligations apply.

      GDPR: Personal data processing; conditional special category (Art. 9 if mental
      health disclosed). User is data controller of their own session; LLM provider
      is processor. Session-open notice addresses this.

      No medical device classification risk: relationship therapy psychoeducation is
      further from clinical medical territory than trauma psychology (P.S.Y.).
      No diagnosis, no treatment, no clinical decision support.

  blast_radius:
    score: low
    rationale: |
      Standalone text file. No production systems, APIs, databases, or infrastructure
      affected. Defective version affects only users who choose to use it; no
      cascading system failures possible.

  reversibility:
    score: medium
    rationale: |
      Prompt file: fully reversible via git. However, as with P.S.Y., harm caused
      to users during an exposure window (e.g. failed DV detection) may not be
      reversible at the individual level. Reversibility of the deliverable: HIGH.
      Reversibility of user harm in DV scenario: LOW.

  dependency_count:
    score: low
    rationale: |
      No runtime dependencies. Reference dependencies (attachment theory, Gottman,
      EFT, DBT) are stable, widely accessible bodies of knowledge. No LLM-specific
      tooling required.

  team_complexity:
    score: low
    rationale: |
      Solo project. All roles held by one person. No coordination overhead.

classification_rationale: |
  FEAT-0005 is classified MEDIUM risk without RO override. Unlike FEAT-0004 (P.S.Y.),
  where the initial HIGH classification required Risk Officer override to MEDIUM, FRANK
  is appropriately MEDIUM from the outset. The lower initial risk reflects:

  - Relationship distress is less acutely dangerous than trauma / PTSD crisis scenarios
  - No Phase 2/3 trauma processing in scope
  - Data sensitivity is conditional (not certain) special category
  - EU AI Act regulatory exposure is LOW (LIMITED tier confirmed; no Annex III)

  MEDIUM risk retains meaningful governance intensity: Stage 2 threat model required,
  standard-plus testing in Stage 4, documented DV detection approach, and humor
  guardrail validation. The novel humor engine element justifies the upper MEDIUM
  classification rather than LOW — there is no precedent in this repository for a
  prompt with a wit component, and its safety properties must be tested carefully.

validation:
  validated_by: "Jerry van Heerikhuize (Risk Officer)"
  validation_date: "2026-03-14"
  override_tier: ""
  override_rationale: >
    No override required. MEDIUM classification is accurate and appropriate.
    FRANK's lower acute risk profile (vs. P.S.Y.) is correctly captured at MEDIUM.
    The DV detection requirement and humor engine novelty together justify MEDIUM
    rather than LOW. Validated as proposed.
