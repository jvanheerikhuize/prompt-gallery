# =============================================================================
# RC-01 — Risk Classification
# Control:   RC-01 Risk Classification
# Stage:     1 — Intent Ingestion
# Feature:   FEAT-0010 — S.C.O.U.T. Curriculum Scout
# =============================================================================

meta:
  id: "RC-01-FEAT-0010"
  feature: "FEAT-0010"
  produced_by: "Claude Sonnet 4.6 (Risk Analyst / RC-01)"
  date: "2026-03-18"

risk_tier: low

criteria_evaluated:
  - criterion: "Impact on natural persons — health, safety, financial, legal"
    applies: false
    rationale: >
      S.C.O.U.T. produces curriculum briefings based on public VWO eindterm information.
      Its outputs cannot directly cause harm — they are informational summaries of
      publicly available curriculum content, repackaged for parental clarity.

  - criterion: "Vulnerable user population"
    applies: false
    rationale: >
      Target users are parents — adults seeking curriculum information. No vulnerable
      population characteristics. The student (minor) is the subject of discussion,
      not the user, and their personal data is not processed.

  - criterion: "Personal data processing"
    applies: false
    rationale: >
      Input is a VWO subject name and topic — public curriculum information. No
      personal data is required or collected to produce a THEME_OVERVIEW.

  - criterion: "Regulated sector"
    applies: false
    rationale: >
      Secondary school curriculum information is public domain in the Netherlands
      (SLO publishes eindtermen openly). No regulated sector applies.

  - criterion: "Automated decision-making"
    applies: false
    rationale: >
      S.C.O.U.T. produces informational summaries. No decisions affecting anyone's
      rights, access, or opportunities are made.

risk_tier_rationale: |
  S.C.O.U.T. is LOW risk — the lowest plausible risk profile in this repository.
  It is a stateless public-information synthesis tool operating on openly published
  Dutch VWO curriculum data. No personal data, no vulnerable users, no automated
  decisions. Comparable to A.T.L.A.S. (FEAT-0006) and S.C.R.I.B.E. (FEAT-0007).

risk_officer_override_required: false
approved_by: "Jerry van Heerikhuize (Risk Analyst)"
approval_date: "2026-03-18"
