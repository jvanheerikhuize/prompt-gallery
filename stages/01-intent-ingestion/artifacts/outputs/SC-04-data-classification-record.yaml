rationale: |
  SC-04 is NOT APPLICABLE to this change.

  The T.A.G. prompt does not introduce, modify, or interact with personal data processing:
  - The prompt file itself contains no personal data.
  - Game session data (player character name, attributes, in-game events) is entirely
    fictional and voluntarily entered by the user as part of gameplay.
  - A player-chosen character name entered during game initialization is not PII in the
    GDPR sense: it is a fictional character name, not necessarily the user's real name,
    and it is not collected, stored, transmitted, or processed outside the user's own
    LLM chat session.
  - No profiling, tracking, or data aggregation occurs.
  - No personal data leaves the user's chat session.

  Data classification: PUBLIC (the prompt file is open-source).
