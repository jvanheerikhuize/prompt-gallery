meta:
  id: "SC-04-FEAT-0006"
  feature: "FEAT-0006"
  produced_by: "Claude Sonnet 4.6 (Security Analyst / SC-04)"
  date: "2026-03-15"

# ── Data Classification ───────────────────────────────────────────────────────
classification: public
elevation_trigger: none   # No automatic elevation; see conditional note below

data_elements_assessed:

  - element: "Geographic coordinates (lat/lon of public features)"
    classification: public
    rationale: >
      Coordinates of cities, landmarks, geographic features, or custom-defined
      points in public or game-world contexts are public data by default. No
      personal data concerns.

  - element: "User-provided coordinates of private/personal locations"
    classification: conditional_personal
    rationale: >
      Under GDPR Art. 4(1), precise location data can constitute personal data
      if it can be used to identify or locate a natural person (home address,
      workplace, frequented locations). If the user provides such coordinates,
      the data becomes PERSONAL — classification elevates to INTERNAL.
      The agent cannot determine this from coordinates alone; the user controls
      what they share. The prompt includes a notice advising users to avoid
      sharing identifying location data.
    gdpr_category: "Art. 4(1) personal data (location) — conditional"
    gdpr_special_category: false   # No Art. 9 — location alone is not special category
    user_controlled: true

  - element: "Named labels assigned to POIs"
    classification: public
    rationale: >
      POI labels are user-provided strings (e.g., "Coffee Shop", "City Centre",
      "Spawn Point"). These are typically descriptive, not personally identifying.
      If a user names a POI with their own name or address, that would be
      personal data — same as coordinate case above; user-controlled.

# ── Data Handling Requirements ─────────────────────────────────────────────────
data_handling_requirements:
  - id: DHR-01
    requirement: "Include a brief data notice advising users not to share personally identifying location data (home address, specific private locations)"
    rationale: "GDPR best practice; user-controlled risk mitigation for conditional personal data case"

  - id: DHR-02
    requirement: "No coordinates or labels are stored, aggregated, or processed beyond the single request"
    rationale: "Stateless single-task design; in-context only"

# ── GDPR Assessment ───────────────────────────────────────────────────────────
gdpr_assessment:
  personal_data: conditional   # Default: NO. If personal locations provided: YES.
  special_category: false
  dpia_required: false
  rationale: >
    By default, A.T.L.A.S. processes geographic coordinates of locations (not persons).
    This is public data. GDPR is only engaged if the user provides location data
    that could identify a natural person — this is user-controlled and out-of-scope
    for a cartography utility. A data notice (DHR-01) is appropriate and sufficient.
    Full PIA is not required at Stage 1 for a LOW risk / PUBLIC classification.

