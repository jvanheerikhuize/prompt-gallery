# ── Risk Tier Assessment ──────────────────────────────────────────────────────
risk_tier: low

criteria_evaluated:

  - criterion: "Impact on natural persons — health, safety, financial, legal"
    applies: false
    rationale: >
      M.E.N.T.O.R. is a study coaching companion for a secondary school student.
      Its outputs are explanations, guiding questions, and practice feedback.
      It does not produce clinical assessments, financial recommendations, legal
      advice, or safety-critical outputs. The maximum foreseeable harm is
      an incorrect explanation of a curriculum concept — which is self-limiting
      (student will verify against textbook or teacher) and does not affect
      health, safety, financial standing, or legal status.

  - criterion: "Vulnerable user population"
    applies: conditional
    rationale: >
      The target user is a 14-year-old minor, which warrants data protection
      awareness (GDPR Art. 8 / Dutch age-of-consent = 16). However, vulnerability
      in the child-protection sense is not inherently elevated by academic tutoring.
      The role has no mental health, emotional support, or crisis component — it
      is a study tool. Academic pressure exists but is not a clinical concern
      within this role's scope. Conditional: if a student discloses significant
      distress, the role should acknowledge and refer to parent/school without
      attempting to provide emotional support.

  - criterion: "Personal data processing"
    applies: true
    rationale: >
      Session data includes: optional student name, current subject/topic,
      errors and misconceptions identified, confidence scores, and session notes.
      This is personal data under GDPR Art. 4(1). No GDPR Art. 9(1) special
      category data is collected (education performance data is not a special
      category). User is a minor — GDPR Art. 8 applies for production deployments
      requiring parental consent for processing personal data of under-16s.
      Data is in-session only (no persistence beyond context window).

  - criterion: "Regulated sector (financial, healthcare, critical infrastructure)"
    applies: false
    rationale: >
      Secondary school tutoring is not a regulated sector in the Netherlands
      or under EU law. The role is a study companion, not a registered educational
      institution, accredited examiner, or clinical service. No sectoral regulation
      applies to self-study aids.

  - criterion: "High volume or automated decision-making"
    applies: false
    rationale: >
      M.E.N.T.O.R. is a conversational study companion. It does not make
      automated decisions, produce formal assessments, assign grades, or
      generate outputs that affect academic records or institutional decisions.
      All outcomes (what to study, what to practice) are suggestions the student
      can accept or ignore.

  - criterion: "Reputational or operational risk to the organisation"
    applies: low
    rationale: >
      Risk of incorrect curriculum content exists but is bounded: VWO klas 3
      mathematics, physics, and chemistry content is well-established, verifiable
      against standard Dutch curriculum materials, and the student will cross-check
      against their textbooks and teacher. Academic integrity controls (no homework
      completion) reduce risk of misuse. Reputational risk is LOW.

risk_tier_rationale: |
  M.E.N.T.O.R. is LOW risk. It is a study coaching companion for secondary school
  subjects with no health, clinical, financial, or safety-critical scope. The user
  being a minor warrants data protection awareness but does not elevate functional risk.
  Academic integrity controls (BHV:![NO_HOMEWORK]) prevent the primary misuse vector
  (homework cheating). Risk is consistent with utility-class roles A.T.L.A.S. (FEAT-0006)
  and S.C.R.I.B.E. (FEAT-0007) at LOW tier.

risk_officer_override_required: false
