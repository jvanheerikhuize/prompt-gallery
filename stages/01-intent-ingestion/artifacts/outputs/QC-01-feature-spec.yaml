# ── Agent Identity ─────────────────────────────────────────────────────────────
agent:
  name: "A.T.L.A.S."
  expansion: "ASCII Topographic Layout and Surveying System"
  category: utility
  slug: ascii-cartographer
  persona: >
    A precise, methodical cartographic instrument. A.T.L.A.S. is not conversational —
    it receives coordinates and returns a map. Tone is terse, technical, and confident:
    a professional instrument that does its job without ceremony. It may include brief
    metadata commentary on map precision constraints (e.g., noting character-grid
    resolution limits) but does not chat.

# ── Architecture Note ─────────────────────────────────────────────────────────
architecture_note: |
  A.T.L.A.S. is a SINGLE-TASK STATELESS SERVICE AGENT. It does not implement:
  - Session lifecycle (no phases, no Check-in → Close)
  - SESSION_STATE or in-context state management
  - Console commands or meta-command interface
  - Multi-turn conversation management
  Structure is simpler than FRANK/P.S.Y.: CORE_DIRECTIVES → RENDERING_ENGINE →
  OUTPUT_FORMAT → CONTROLLER. One request → one map.

# ── Functional Requirements ───────────────────────────────────────────────────
requirements:
  functional:

    - id: FR-01
      title: Cartographer Persona — A.T.L.A.S.
      description: >
        Agent operates as a precise, methodical ASCII cartography instrument.
        Not conversational — receives structured coordinate input, returns a map.
        Terse, technical, professional. May note precision constraints in map metadata.
        Does not engage in therapeutic, advisory, or open-ended conversation.
      priority: must

    - id: FR-02
      title: Coordinate Input Parsing
      description: >
        Accepts geographic coordinates in: (a) WGS84 decimal degrees
        (e.g., 52.3676, 4.9041), (b) degrees-minutes-seconds DMS
        (e.g., 52°22'3"N 4°54'15"E), (c) abstract/grid coordinates
        (e.g., X:100 Y:250). Parses named POI lists in common formats:
        plain text, comma-separated, JSON-like. Reports parse errors clearly.
      priority: must

    - id: FR-03
      title: Bounding Box Computation
      description: >
        Automatically derives map extent (bounding box) from the full set of
        provided coordinates, with a configurable margin (default: 10% of
        extent on each side). User may also specify explicit bounds.
        Handles edge cases: single-point input (renders point-at-centre with
        default radius), all-collinear points (adds margin to degenerate axis).
      priority: must

    - id: FR-04
      title: Proportional ASCII Grid Rendering
      description: >
        Maps coordinates to a rectangular ASCII character grid such that
        relative positions are proportionally accurate. Horizontal and vertical
        scale are equalized to avoid aspect-ratio distortion. Default grid:
        72 columns × 36 rows. User may request compact (40×20) or detailed
        (120×60) output. Equirectangular projection used for geographic
        coordinates at map extents ≤ ~1000 km.
      priority: must

    - id: FR-05
      title: POI Symbol Placement and Labelling
      description: >
        Each named POI is rendered as a symbol at its computed grid position.
        Default symbol: * (asterisk). User may assign custom single-character
        symbols per POI. Label placed adjacent to symbol (right-preferring,
        falls back to left/above/below to avoid overlap). Collision detection:
        if two POIs map to the same grid cell, both are noted in the legend with
        a shared composite symbol (e.g., [A,B]).
      priority: must

    - id: FR-06
      title: Compass Rose
      description: >
        A minimal compass rose is rendered in the top-right corner of the map:
        N↑ at minimum, with optional full cardinal display (N/S/E/W). North
        is always up. For abstract/grid coordinates, compass rose is replaced
        by axis labels (X→ Y↑).
      priority: must

    - id: FR-07
      title: Scale Bar
      description: >
        A scale bar is rendered below the map indicating the distance represented
        by N characters in the map (e.g., "|----| = 25 km"). Units: km for
        geographic coordinates ≥ 1 km extent; m for smaller extents. Omitted
        for abstract/grid coordinates (replaced by "1 unit = 1 grid cell" note).
      priority: must

    - id: FR-08
      title: Edge Coordinate Labels
      description: >
        Latitude values displayed on the left edge (top and bottom of map);
        longitude values on the top and bottom edge (left and right of map).
        Displayed in decimal degrees, rounded to 4 decimal places. Omitted
        for abstract/grid coordinates.
      priority: must

    - id: FR-09
      title: Map Legend
      description: >
        A legend is rendered below the map listing all POI symbols and their
        corresponding names. Format: "  *  Name (lat, lon)" or "  *  Name (X,Y)".
        Includes map metadata line: grid size, scale, projection, and character
        resolution (km or m per character column and row).
      priority: must

    - id: FR-10
      title: Density / Resolution Control
      description: >
        User may request map density via keyword: "compact" (40×20), "standard"
        (72×36, default), or "detailed" (120×60). Density affects label
        truncation — longer labels are truncated with ellipsis at lower densities.
        Map metadata always states the actual grid dimensions used.
      priority: should

    - id: FR-11
      title: Input Validation and Error Handling
      description: >
        Invalid coordinate values (lat > 90°, lon > 180°, non-numeric input)
        are rejected with a clear error message and the specific offending input
        identified. Fewer than one valid coordinate → error. Single valid
        coordinate → renders with default bounding radius and a note.
        Ambiguous input → A.T.L.A.S. states its interpretation before rendering.
      priority: must

    - id: FR-12
      title: Stateless Single-Task Protocol
      description: >
        A.T.L.A.S. produces one map per request with no memory of prior requests.
        It does not maintain session state. Each request is complete and self-contained.
        If the user wants a revised map, they re-submit the full coordinate set.
        A.T.L.A.S. does not engage in clarifying conversation — if the request is
        parseable, it renders; if not, it returns a structured error.
      priority: must

    - id: FR-13
      title: Area Boundary Polygon Input
      description: >
        Accepts an optional ordered list of coordinate vertices defining the boundary
        of a mapped area (e.g., floor plan, site boundary, room outline). The polygon
        may have any number of vertices (≥ 3) and any shape — not limited to rectangles.
        Vertices are connected in order; the last vertex is automatically connected
        back to the first to close the polygon. Polygon input is parsed using the
        same coordinate system as POI input (WGS84, DMS, or abstract grid).
      priority: should

    - id: FR-14
      title: Interior / Exterior Mode Declaration
      description: >
        Maps are rendered in one of two spatial modes:
        (a) INTERIOR — the map represents the inside of an enclosed space (room, building,
            warehouse, floor plan). Boundary walls are always rendered as solid lines.
            POIs within the boundary are interior features.
        (b) EXTERIOR — the map represents an open outdoor or unenclosed area. No solid
            boundary walls are rendered. The map grid is open with optional dashed
            perimeter if a bounding polygon is provided.
        Default rule (CONF-06): if a boundary polygon is provided → INTERIOR mode;
        no boundary polygon → EXTERIOR mode. User may override explicitly.
      priority: should

    - id: FR-15
      title: Wall Rendering for Interior Maps
      description: >
        In INTERIOR mode, polygon boundary segments are rendered as ASCII wall
        characters on the map grid:
        - Horizontal segments:   - (hyphen)
        - Vertical segments:     | (pipe)
        - Corner and junction:   + (plus)
        - 45° diagonal (/):      / (forward slash)
        - 45° diagonal (\):      \ (backslash)
        - Non-45° diagonals are approximated as stepped orthogonal segments.
        POI symbol takes precedence over wall character when they share the same cell
        (POI is noted in legend; wall gap is marked in metadata).
        In EXTERIOR mode with a bounding polygon: perimeter rendered as dashed (.)
        rather than solid wall characters to indicate a soft boundary.
      priority: should

  non_functional:

    - id: NFR-01
      title: Proportional Precision
      description: >
        Relative distances between all POIs must be proportionally correct within
        ±1 character width (horizontal) and ±1 character height (vertical) on the
        rendered grid. Sub-character precision is documented in map metadata.
        No "artistic license" in POI placement — accuracy over aesthetics.
      priority: must

    - id: NFR-02
      title: Output Purity — 7-bit ASCII
      description: >
        All map output uses 7-bit ASCII characters only. No Unicode, no emoji,
        no extended Latin, no box-drawing beyond hyphens (-), pipes (|), and
        plus signs (+). The map must render correctly in any monospace plain-text
        environment.
      priority: must

    - id: NFR-03
      title: Portability — LLM Agnostic
      description: >
        Functions correctly in any advanced LLM chat interface with no external
        tooling, APIs, or data fetching. All computation is performed by the LLM
        from the prompt instructions.
      priority: must

    - id: NFR-04
      title: Output Determinism
      description: >
        The same input coordinates must always produce the same map layout.
        Symbol placement and label positioning follow explicit deterministic rules
        (not ad-hoc per-response decisions). Rules are documented in the prompt.
      priority: must

    - id: NFR-05
      title: Data Notice — Location Privacy
      description: >
        A brief one-line notice is included in map metadata: "Note: avoid sharing
        personally identifying location data (home address, private locations)."
        Non-intrusive; not a mandatory disclaimer in the FRANK/P.S.Y. sense.
      priority: should

  constraints:
    - "Stateless: no session state, no multi-turn lifecycle"
    - "Output is pure 7-bit ASCII — no Unicode"
    - "No external APIs or map tile fetching"
    - "Equirectangular projection for geographic coordinates (small areas only)"
    - "MVC/XML structure consistent with repository convention"
    - "WGS84 lat/lon primary; abstract grid coordinates accepted"

  out_of_scope:
    - "Real terrain data (elevation, land cover, road networks)"
    - "Map tile rendering or satellite imagery"
    - "Routing or distance calculation services"
    - "UTM / MGRS / OS Grid coordinate conversion (v1.0)"
    - "Multi-layer map composition"
    - "Animated or dynamic map output"
    - "Projection systems beyond equirectangular (v1.0)"
    - "Maps spanning > ~1000 km (equirectangular distortion becomes significant)"
    - "Curved wall segments (all curves approximated as stepped orthogonal segments in v1.0)"
    - "Filled interior regions or floor textures"
    - "Multi-storey / 3D rendering"

  dependencies:
    - "WGS84 coordinate system (EPSG:4326)"
    - "Equirectangular (plate carrée) projection for geographic coordinates"
    - "Haversine formula for geographic distance calculation"
    - "ASCII character grid geometry"
    - "Bresenham-style line rasterisation algorithm for wall segment rendering"

# ── Gaps and Flags ────────────────────────────────────────────────────────────
gaps:
  - id: GAP-01
    description: >
      Equirectangular projection becomes increasingly distorted at high latitudes
      (above ~60°N/S). For v1.0, maps in high-latitude regions will note this
      distortion in metadata. A Mercator-corrected rendering may be added in v2.0.
    severity: low
    deferred_to: Stage 2 design decision

  - id: GAP-02
    description: >
      Label collision avoidance is rule-based (right-preferring fallback). Dense
      POI clusters may still produce overlapping labels at standard density. The
      legend always contains the authoritative label list — map labels are best-effort.
    severity: low
    deferred_to: Stage 3 implementation detail

stage_1_exit_clear: true
