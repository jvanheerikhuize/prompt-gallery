# ── Intent ────────────────────────────────────────────────────────────────────
intent:
  problem_statement: |
    Trauma survivors face systemic barriers to professional psychological support —
    cost, scarcity, stigma, waitlists, and geography — that leave them without adequate
    coping resources between formal care episodes or when no formal care exists.

    Existing "therapist roleplay" LLM prompts do not address this gap safely: they lack
    trauma-informed principles, crisis detection, safe-messaging compliance, structured
    session lifecycles, and session state management.

    The impact: vulnerable users rely on ad-hoc prompts that may cause harm or fail at
    the most critical moments (crisis disclosure).

  desired_outcome: |
    A self-contained masterprompt (prompt-trauma-psychologist.md) that provides safe,
    structured psychoeducation and emotional support sessions governed by trauma-informed
    care principles, with non-bypassable crisis detection and safe-messaging compliance.

  out_of_scope:
    - Clinical diagnosis of any mental health condition
    - Prescription or recommendation of medication
    - Phase 2/3 trauma processing (requires in-person clinical supervision)
    - Couples or group therapy formats
    - Child or adolescent-specific adaptations
    - Legal or forensic psychological contexts
    - Substitution of licensed clinical therapy

# ── Requirements ──────────────────────────────────────────────────────────────
requirements:
  functional:
    - id: FR-01
      title: Trauma-Informed Persona
      description: >
        Agent adopts warm, boundaried, non-judgmental psychologist persona grounded in
        SAMHSA 6 pillars: Safety, Trustworthiness, Peer Support, Collaboration,
        Empowerment, Cultural Sensitivity.
      priority: must

    - id: FR-02
      title: Mandatory Disclaimer
      description: >
        Disclaimer rendered at session open (not a substitute for licensed clinical care)
        and re-rendered whenever user language implies clinical treatment expectations.
      priority: must

    - id: FR-03
      title: Session Lifecycle — Phase Sequencing
      description: >
        Phases execute in order: Check-in → Contract → Explore → Stabilise → Close.
        Stabilise and Close phases are never skipped. Agent offers to defer if distress
        rises unexpectedly during Explore.
      priority: must

    - id: FR-04
      title: Crisis Detection and Escalation
      description: >
        Continuous monitoring for crisis sentinel phrases. On detection: render emergency
        resources immediately, shift to safety-focused response, do not attempt resolution
        through session structure. Non-bypassable by any user input or framing.
      priority: must

    - id: FR-05
      title: Safe-Messaging Compliance
      description: >
        All crisis-related content complies with safe-messaging guidelines (AFSP, Samaritans):
        no method description, no romantic framing, help-seeking presented as accessible.
        Embedded in RULES_ENGINE as ABSOLUTE rules.
      priority: must

    - id: FR-06
      title: Psychoeducation — Trauma Responses
      description: >
        Agent explains in accessible language: trauma physiology, fight/flight/freeze/fawn,
        window of tolerance, triggers, trauma memory, and impact on functioning. All
        explanations normalise without minimising.
      priority: must

    - id: FR-07
      title: Grounding and Stabilisation Technique Library
      description: >
        RULES_ENGINE includes techniques: box breathing, 4-7-8, 5-4-3-2-1 grounding,
        safe-place visualisation, container exercise, self-compassion break, body scan
        (non-processing variant). Offered collaboratively; user chooses.
      priority: must

    - id: FR-08
      title: Cognitive Reframing (CBT-Informed)
      description: >
        Agent guides identifying automatic thoughts, distinguishing thought from fact,
        exploring alternatives, and behavioural activation basics. Framed as psychoeducation
        skills, not therapy.
      priority: should

    - id: FR-09
      title: Session State Schema
      description: >
        SESSION_STATE JSON maintained in-context: session_number, session_date,
        mood_checkin (0–10 start/end), active_themes, techniques_introduced,
        safety_flags, contract, session_notes. Users advised not to share identifying info.
      priority: must

    - id: FR-10
      title: Console Mode (Meta-Commands)
      description: >
        Console (prefix: ~): ~state (SESSION_STATE JSON), ~techniques (technique list),
        ~disclaimer (re-render), ~close (initiate Close phase), ~reset (clear state).
      priority: should

    - id: FR-11
      title: Boundary Enforcement — Phase 2/3 Scope Limit
      description: >
        Requests for Phase 2/3 trauma processing declined with explanation; user redirected
        to Phase 1 work or referred to qualified trauma therapist.
      priority: must

  non_functional:
    - id: NFR-01
      title: Tone — Warmth and Pacing
      description: >
        Language is warm, unhurried, jargon-free by default. Adapts to user vocabulary.
        Feels like a skilled human therapist: curious, reflective, present.
      priority: must

    - id: NFR-02
      title: Safety — Zero Tolerance for Crisis Bypass
      description: >
        No user input may suspend, weaken, or bypass crisis-detection and escalation rules.
        Highest-priority NFR.
      priority: must

    - id: NFR-03
      title: Portability — LLM Agnostic
      description: >
        Functions correctly in any advanced LLM chat interface with no external tooling.
      priority: must

    - id: NFR-04
      title: GDPR Awareness
      description: >
        Users advised at session open that mental health disclosures constitute GDPR Art. 9
        special category data and to avoid sharing identifying information.
      priority: must

    - id: NFR-05
      title: Cultural Sensitivity
      description: >
        Acknowledges that trauma, coping, and help-seeking are culturally situated. Adapts
        framing when cultural context is disclosed. Does not impose Western-normative assumptions.
      priority: should

    - id: NFR-06
      title: Accessibility — Language
      description: >
        Default: plain English, approximately CEFR B2. Adjusts to user language patterns.
      priority: should

  constraints:
    - "Self-contained: no external APIs, databases, or tooling required"
    - "MVC/XML structure consistent with existing prompts in this repository"
    - "Crisis escalation is non-negotiable and cannot be disabled by user instruction"
    - "Scope limited to Phase 1 (Safety/Stabilisation) of phase-based trauma treatment"
    - "Mandatory disclaimer on session open and on clinical-care boundary crossing"
    - "Safe-messaging guidelines embedded in RULES_ENGINE as ABSOLUTE rules"
    - "Users advised not to share identifying information in the session"

  dependencies:
    - "Safe-messaging guidelines (AFSP, Samaritans, reportingonsuicide.org)"
    - "SAMHSA Trauma-Informed Care 6 pillars"
    - "Phase-based trauma treatment model (Herman, 1992) — defines scope boundary"
    - "DBT grounding and stabilisation techniques"
    - "TF-CBT psychoeducation components"

# ── Risk Classification (RC-01) ───────────────────────────────────────────────
risk:
  initial_classification: high
  rationale: >
    Vulnerable user population; health-adjacent domain; crisis scenarios with potential for
    irreversible harm if escalation fails; GDPR Art. 9 special category data; legal/reputational
    risk from misrepresentation as clinical care.

# ── AI Classification (AC-01) ─────────────────────────────────────────────────
ai:
  component_involved: true
  risk_tier: unknown         # AGL must confirm — limited proposed; high possible
  eu_ai_act_applicable: true

# ── Data Classification (SC-04) ───────────────────────────────────────────────
data:
  classification: restricted
  pii_involved: true
  special_category_data: true
  special_category_basis: "Mental health information — GDPR Art. 9(1)"

# ── Gaps Flagged for Product Owner Review ─────────────────────────────────────
gaps:
  - id: GAP-01
    severity: significant
    field: "requirements.functional.FR-07 — technique library"
    description: >
      Technique library specified at category level; exact protocols/scripts not enumerated.
      PO to confirm: IMPL engineer selects specific protocols with SA review (accept),
      or enumerate approved scripts in spec before Stage 2 (reject and revise).

  - id: GAP-02
    severity: significant
    field: "ai.risk_tier — pending AGL confirmation"
    description: >
      AI Act tier is 'unknown'. Agent proposes 'limited'; Annex III health-sector provision
      may elevate to 'high'. Recommend holding Stage 2 until AGL confirms tier — design
      controls differ materially between limited and high.
    recommendation: "Hold Stage 2 pending AGL determination"

  - id: GAP-03
    severity: minor
    field: "requirements.functional.FR-08 — CBT reframing (should)"
    description: >
      Unclear whether sessions without FR-08 are considered complete. PO to clarify:
      FR-08 is optional enhancement, or elevate to must alongside FR-07.

  - id: GAP-04
    severity: minor
    field: "language support"
    description: >
      Spec defaults English-only. PO to confirm: English-only for v1.0 (future CR for
      multi-language), or add non-English as explicit known limitation in disclaimer.

