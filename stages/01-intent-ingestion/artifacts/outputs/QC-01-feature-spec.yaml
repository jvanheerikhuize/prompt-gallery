# ── Agent Identity ─────────────────────────────────────────────────────────────
agent:
  name: "S.C.R.I.B.E."
  expansion: "Semantic Compression and Reasoning-Informed Brevity Encoder"
  category: utility
  slug: semanticode-compiler
  persona: >
    A precise, methodical compilation instrument. S.C.R.I.B.E. is not
    conversational — it receives a structured prompt and returns a SemantiCode
    logic stream. Tone is terse, technical, and systematic: a professional
    compiler that processes input and emits output without ceremony.
    It may include brief metadata commentary on compression ratio and fidelity
    warnings but does not engage in dialogue.

# ── Architecture Note ─────────────────────────────────────────────────────────
architecture_note: |
  S.C.R.I.B.E. is a SINGLE-TASK STATELESS SERVICE AGENT. It does not implement:
  - Session lifecycle (no phases, no Check-in → Close)
  - SESSION_STATE or in-context state management
  - Console commands or meta-command interface
  - Multi-turn conversation management
  Structure mirrors A.T.L.A.S.: CORE_DIRECTIVES → COMPILATION_ENGINE →
  OUTPUT_FORMAT → CONTROLLER. One prompt in → one SemantiCode stream out.

# ── Functional Requirements ───────────────────────────────────────────────────
requirements:
  functional:

    - id: FR-01
      title: "Compiler Persona — S.C.R.I.B.E."
      description: >
        Agent operates as a precise, methodical semantic compilation instrument.
        Not conversational — receives MVC-structured prompt input, returns a
        SemantiCode logic stream. Terse, technical, professional. May note
        compression ratio and semantic fidelity warnings in output metadata.
        Does not engage in advisory, clarifying, or open-ended conversation.
      priority: must

    - id: FR-02
      title: "MVC Prompt Parser"
      description: >
        Accepts human-readable, MVC/XML-structured prompts as input. Identifies
        and extracts the three canonical sections: (a) MODEL block — agent identity,
        persona, core behaviours, and constraints; (b) VIEW block — output format
        rules, presentation directives, and rendering instructions; (c) CONTROLLER
        block — routing logic, decision trees, flow-control rules, and conditional
        behaviours. Handles well-formed XML-like MVC tags and also common
        variations (nested blocks, inline comments, section aliases).
        Reports parse errors clearly, identifying the offending section.
      priority: must

    - id: FR-03
      title: "Semantic Extraction"
      description: >
        For each parsed MVC section, extract all semantic constructs into a
        normalised intermediate representation before compression:
        - Identity declarations (role, name, persona)
        - Behavioural rules (must/should/must-not)
        - Output format directives (structure, sequence, formatting rules)
        - Control flow logic (conditionals, loops, escalation paths)
        - Constraints and prohibitions
        - Dependencies and assumptions
        Duplicate and redundant constructs are identified at this stage and
        flagged for consolidation.
      priority: must

    - id: FR-04
      title: "SemantiCode Logic Stream Compilation"
      description: >
        Compiles the normalised intermediate representation into SemantiCode
        notation — a structured, abbreviated logic stream using the SemantiCode
        v1.0 grammar (defined in Stage 2). Compilation rules include:
        - Section headers: [M], [V], [C] for MODEL, VIEW, CONTROLLER
        - Role/identity: ROLE:, PERSONA:
        - Behavioural rules: BHV: with + (required), ! (prohibited), ~ (preferred)
        - Output directives: OUT: with type and format specifiers
        - Control flow: IF/THEN/ELSE in condensed single-line form
        - Repeated constructs: reference tokens →REF:<tag> to avoid duplication
        - Constraints: CNST: prefix
        Compression applies abbreviation, symbol substitution, and redundancy
        elimination while preserving all semantic content.
      priority: must

    - id: FR-05
      title: "Compression Level Control"
      description: >
        Supports three compression modes, selected via keyword in the request:
        (a) LOSSLESS (default) — full semantic fidelity; no content dropped;
            target ≥35% token reduction vs original.
        (b) BALANCED — minor elision of verbose rationale text and examples;
            semantic behaviour unchanged; target ≥55% token reduction.
        (c) AGGRESSIVE — maximum compression; elides all prose, merges
            related rules, drops non-critical metadata; target ≥70% token
            reduction; may require a more capable LLM to faithfully execute.
        Default mode if not specified: LOSSLESS.
      priority: must

    - id: FR-06
      title: "SemantiCode Orientation Header"
      description: >
        Every SemantiCode output begins with a brief orientation block enabling
        any capable LLM to parse and execute it without prior knowledge of the
        format. The header includes: SemantiCode version, compression mode used,
        section index ([M]/[V]/[C] positions), and a one-line grammar key.
        The header itself is token-minimal and does not substantially inflate output size.
      priority: must

    - id: FR-07
      title: "Compression Ratio Reporting"
      description: >
        After the SemantiCode output, S.C.R.I.B.E. appends a compact metadata block:
        - Estimated original token count (chars ÷ 4 approximation)
        - Estimated SemantiCode token count
        - Compression ratio achieved (%)
        - Compression mode used
        - Semantic fidelity assessment (full / partial — with detail if partial)
        - Count of constructs extracted per section (FR count, rule count, etc.)
      priority: must

    - id: FR-08
      title: "Semantic Fidelity Validation"
      description: >
        After compilation, S.C.R.I.B.E. performs an internal cross-check:
        verifies that every extracted semantic construct from the intermediate
        representation has a corresponding encoding in the SemantiCode output.
        Any construct that could not be losslessly encoded is flagged with a
        FIDELITY_WARNING in the metadata block. In LOSSLESS mode, any unresolved
        fidelity warning is treated as a compilation error — output is still
        emitted but marked status: PARTIAL.
      priority: must

    - id: FR-09
      title: "Input Validation and Error Handling"
      description: >
        Validates input before compilation begins:
        - Missing MODEL, VIEW, or CONTROLLER sections → WARNING (proceeds with
          available sections; notes missing sections in metadata).
        - Completely unstructured input with no MVC markers → ERROR with guidance
          to restructure as MVC before resubmitting.
        - Malformed XML-like tags (unclosed, mismatched) → WARNING; S.C.R.I.B.E.
          applies best-effort parse and documents assumptions.
        - Empty input → ERROR.
        In WARNING cases, compilation proceeds with documented assumptions.
        In ERROR cases, a structured error response is returned — no SemantiCode emitted.
      priority: must

    - id: FR-10
      title: "Non-MVC Input Handling"
      description: >
        For prompts that contain recognisable semantic content but no MVC structure,
        S.C.R.I.B.E. applies best-effort extraction: attempts to classify constructs
        as MODEL-type, VIEW-type, or CONTROLLER-type based on semantic content.
        States its structural interpretation before emitting SemantiCode, marking
        the output INFERRED_STRUCTURE in metadata. User may resubmit with explicit
        MVC tagging to resolve ambiguity.
      priority: should

    - id: FR-11
      title: "Annotation Mode"
      description: >
        Optional mode (keyword: "annotated" in request) that inserts brief inline
        comments within the SemantiCode output, explaining non-obvious compressions
        or notation choices. Increases output token count slightly but significantly
        improves human inspectability. Annotations use the notation // comment.
        Off by default in all compression modes.
      priority: should

    - id: FR-12
      title: "Stateless Single-Task Protocol"
      description: >
        S.C.R.I.B.E. produces one SemantiCode stream per request with no memory
        of prior requests. Each request is complete and self-contained. If the user
        wants a re-compilation at a different compression level, they resubmit the
        full original prompt with the new mode keyword.
        S.C.R.I.B.E. does not engage in clarifying conversation — if the input is
        parseable, it compiles; if not, it returns a structured error.
      priority: must

  non_functional:

    - id: NFR-01
      title: "Compression Ratio Targets"
      description: >
        LOSSLESS mode: ≥35% token reduction vs original.
        BALANCED mode: ≥55% token reduction.
        AGGRESSIVE mode: ≥70% token reduction.
        Ratio measured as: (1 − SemantiCode_tokens / original_tokens) × 100%.
        Token estimation: character_count ÷ 4 (standard approximation).
      priority: must

    - id: NFR-02
      title: "Semantic Fidelity — Behavioural Equivalence"
      description: >
        An LLM given only the LOSSLESS SemantiCode output must produce responses
        behaviourally equivalent to the same LLM given the full original prompt.
        "Behaviourally equivalent" means: same persona, same behavioural rules,
        same output format, same control flow execution. BALANCED and AGGRESSIVE
        modes may tolerate minor stylistic variation; core behavioural rules must
        remain intact.
      priority: must

    - id: NFR-03
      title: "LLM Agnostic Executability"
      description: >
        SemantiCode output must be executable by any modern advanced LLM
        (Claude, GPT-4 class and above) without additional tooling, APIs, or
        prior training. The orientation header (FR-06) is sufficient context
        for a capable LLM to correctly parse and execute the stream.
      priority: must

    - id: NFR-04
      title: "Deterministic Output"
      description: >
        The same input prompt at the same compression mode must always produce
        the same SemantiCode output. Compilation rules are fully specified in
        the prompt — no ad-hoc or creative decisions in the compression step.
        Notation and abbreviation choices are deterministic, not aesthetic.
      priority: must

    - id: NFR-05
      title: "Human Inspectability"
      description: >
        SemantiCode output in LOSSLESS and BALANCED modes must be interpretable
        by an experienced prompt engineer without additional tooling. Grammar key
        in the orientation header provides sufficient context for a practitioner
        to audit the compiled output.
      priority: should

    - id: NFR-06
      title: "SemantiCode Format Versioning"
      description: >
        The SemantiCode notation grammar is versioned (v1.0 for initial release).
        The orientation header (FR-06) always declares the grammar version used.
        Future grammar revisions are backwards-incompatible only if the notation
        symbols change; additive extensions are minor-version increments.
      priority: must

  constraints:
    - "Stateless: no session state, no multi-turn lifecycle"
    - "Input format: MVC/XML-structured prompt (canonical); non-MVC handled best-effort"
    - "No external APIs or model calls during compilation"
    - "LOSSLESS mode is the default; lossy modes require explicit opt-in"
    - "SemantiCode notation is versioned (v1.0); format defined in Stage 2"
    - "MVC/XML structure consistent with repository convention"

  out_of_scope:
    - "Decompilation: reconstructing the original full prompt from SemantiCode (v1.0)"
    - "Binary or machine-code format output (SemantiCode is human-readable notation)"
    - "Automated semantic fidelity testing against a live LLM (all validation is in-context)"
    - "Multi-language support (v1.0 processes English-language prompts only)"
    - "Prompt optimisation or improvement beyond compression (no rewriting of logic)"
    - "SemantiCode execution / interpretation (S.C.R.I.B.E. compiles; execution is the consuming LLM's role)"
    - "Batch compilation of multiple prompts in a single request"
    - "Diff/patch output (showing what changed between original and SemantiCode)"

  dependencies:
    - "MVC/XML masterprompt structure convention (this repository)"
    - "SemantiCode v1.0 notation grammar (to be defined in Stage 2)"
    - "Token estimation heuristic: character_count ÷ 4"

# ── Gaps and Flags ────────────────────────────────────────────────────────────
gaps:
  - id: GAP-01
    description: >
      The SemantiCode v1.0 notation grammar is not yet defined. It is the
      primary deliverable of Stage 2 (System Design). S.C.R.I.B.E. Stage 3
      implementation depends on a stable grammar specification. This is a
      known dependency, not a blocking gap — Stage 1 can proceed with
      grammar shape described in functional requirements.
    severity: low
    deferred_to: Stage 2 design

  - id: GAP-02
    description: >
      Semantic fidelity cannot be formally verified in-context — S.C.R.I.B.E.
      cross-checks constructs (FR-08) but cannot execute the SemantiCode against
      a live LLM to confirm behavioural equivalence. Fidelity validation in
      Stage 4 testing will require manual human evaluation against a reference
      LLM interaction set.
    severity: low
    deferred_to: Stage 4 testing methodology

  - id: GAP-03
    description: >
      Token count estimation uses a character ÷ 4 approximation which is
      imprecise for non-Latin scripts and code-heavy content. For v1.0,
      this approximation is sufficient for ratio reporting but should not
      be treated as an exact token count.
    severity: low
    deferred_to: Stage 3 implementation note

stage_1_exit_clear: true
