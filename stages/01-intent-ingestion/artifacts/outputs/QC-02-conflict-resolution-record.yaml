conflicts:

  - id: CONF-01
    title: "Lossless fidelity vs maximum token reduction"
    description: >
      The CR requests both "highly compressed, token-efficient" and
      "full semantic fidelity." These objectives are in direct tension: maximum
      compression requires dropping verbose rationale, examples, and prose context;
      lossless fidelity requires preserving everything that affects LLM behaviour.
      The degree to which rationale text and in-prompt examples affect LLM
      behaviour is non-trivial — removing them may cause subtle behavioural drift
      in edge-case scenarios.
    options:
      - id: OPT-A
        description: >
          Single mode: LOSSLESS only. Define "lossless" as preserving only
          constructs that directly govern LLM behaviour; drop all prose, rationale,
          and examples. Accept that this definition of "lossless" involves
          a judgement call on what constitutes "behaviour-governing" content.
      - id: OPT-B
        description: >
          Two modes: LOSSLESS (strict — keeps all behavioural content including
          examples and rationale) and AGGRESSIVE (drops all prose, examples, and
          rationale). No middle ground.
      - id: OPT-C
        description: >
          Three graduated modes: LOSSLESS (≥35% reduction, full fidelity including
          examples), BALANCED (≥55% reduction, elides rationale and verbose prose,
          keeps all rules and examples), AGGRESSIVE (≥70% reduction, drops
          all prose and examples, rules only). Default: LOSSLESS.
    resolution: OPT-C
    rationale: >
      OPT-C is the only option that satisfies both "lossless by default" and
      "highly compressed by choice" without forcing the user to pick a binary.
      Different use cases have different risk tolerances: a production system prompt
      should use LOSSLESS; a rapid-prototype context may use AGGRESSIVE. Making
      LOSSLESS the default honours the CR's "full semantic fidelity" requirement
      while enabling aggressive compression via explicit opt-in (NFR-01).
    approved_by: "Jerry van Heerikhuize (Product Owner)"

  - id: CONF-02
    title: "Human readability vs maximum compression efficiency"
    description: >
      Maximum compression favours dense symbol sequences (e.g., "BHV:!CLF+ESC→SUP")
      that are highly token-efficient but unreadable to humans without a grammar
      reference. Full human readability would result in only modest compression.
      The CR asks for both "human-inspectable" and "highly compressed."
    options:
      - id: OPT-A
        description: >
          Prioritise human readability: use full keyword prefixes (e.g., BEHAVIOUR:,
          CONSTRAINT:), verbose notation. Limits compression ratio to ~20-30%.
      - id: OPT-B
        description: >
          Prioritise compression: use single-character operators, dense symbol
          streams, maximum abbreviation. Uninspectable without grammar reference.
      - id: OPT-C
        description: >
          Balance: abbreviated but interpretable notation (e.g., BHV:, CNST:, OUT:)
          with short symbol operators (+, !, ~, →). Human-inspectable with the
          orientation header grammar key. Optional ANNOTATED mode adds inline
          comments for full human readability at the cost of modest token overhead.
    resolution: OPT-C
    rationale: >
      OPT-C aligns with NFR-05 (human inspectability in LOSSLESS/BALANCED modes).
      The orientation header grammar key provides sufficient context for a practitioner
      to audit any SemantiCode output. The ANNOTATED mode (FR-11) handles cases
      where fuller human readability is required. OPT-B would undermine the
      "inspectable" requirement entirely; OPT-A sacrifices the core value proposition.
    approved_by: "Jerry van Heerikhuize (Product Owner)"

  - id: CONF-03
    title: "Non-MVC input handling — compile or reject"
    description: >
      The canonical input format is MVC/XML-structured. However, practitioners may
      submit prompts that are semantically rich but structurally untagged. Should
      S.C.R.I.B.E. strictly require MVC structure, or attempt best-effort
      compilation of non-MVC prompts?
    options:
      - id: OPT-A
        description: >
          Strict MVC requirement: if no MVC section tags are found, return ERROR
          and instruct the user to restructure the prompt before resubmitting.
          Simple and predictable; zero ambiguity in output.
      - id: OPT-B
        description: >
          Best-effort for all inputs: attempt semantic extraction regardless of
          structure; classify constructs as MODEL/VIEW/CONTROLLER type by content.
          Mark output INFERRED_STRUCTURE. Maximises utility but introduces
          structural ambiguity in the compiled output.
      - id: OPT-C
        description: >
          OPT-A for completely unstructured input; OPT-B for partially structured
          input (has some MVC markers but not all sections). Error on empty input.
          Warn and proceed with documented assumptions on partial/non-MVC input.
    resolution: OPT-C
    rationale: >
      OPT-C reflects real-world usage: partial MVC tagging is common during authoring.
      Refusing to compile anything without perfect MVC structure would create friction
      for legitimate use cases. The INFERRED_STRUCTURE flag and documented assumptions
      give the user full visibility into what the compiler inferred. For completely
      unstructured input, rejecting and guiding the user to restructure is the
      correct behaviour — guessing the intent of a completely untagged prompt risks
      significant semantic misclassification.
    approved_by: "Jerry van Heerikhuize (Product Owner)"

  - id: CONF-04
    title: "SemantiCode grammar versioning and format stability"
    description: >
      The SemantiCode v1.0 grammar is new and will evolve. SemantiCode streams
      compiled today must still be executable by LLMs tomorrow, even if the grammar
      evolves. There is a tension between format stability (all streams must work
      forever) and format improvement (better notation as the grammar matures).
    options:
      - id: OPT-A
        description: >
          One grammar, never versioned. All changes are additive-only, backwards-
          compatible forever. Simple but constraining — no ability to fix notational
          mistakes in v1.0.
      - id: OPT-B
        description: >
          Full semantic versioning: MAJOR.MINOR.PATCH. Any breaking change is a major
          version. Old streams are deprecated after two major versions. Requires
          formal grammar management process.
      - id: OPT-C
        description: >
          Simple major versioning only: v1, v2, etc. The orientation header always
          declares the grammar version. Breaking changes require a new major version.
          Additive extensions are applied within the current major version. LLMs
          receiving a stream with an unknown version should attempt to execute
          (grammar is self-describing via the orientation header) and note uncertainty.
    resolution: OPT-C
    rationale: >
      OPT-C provides the necessary stability guarantee (major version = breaking change)
      without the overhead of full semantic versioning for a prompt-based format.
      The orientation header's grammar key is self-describing — even without a
      version registry, a capable LLM can parse the grammar key and execute the stream.
      This is consistent with NFR-06 and the "no external tooling required" constraint.
    approved_by: "Jerry van Heerikhuize (Product Owner)"

  - id: CONF-05
    title: "Minimum LLM capability floor for AGGRESSIVE mode"
    description: >
      AGGRESSIVE compression (≥70% reduction) produces an extremely dense SemantiCode
      stream with no prose, no examples, and maximum notation abbreviation. Weaker or
      smaller LLMs may fail to correctly execute such a stream. There is a risk that
      AGGRESSIVE mode SemantiCode silently produces incorrect LLM behaviour in less
      capable models.
    options:
      - id: OPT-A
        description: >
          No capability floor stated. User assumes responsibility for choosing the
          correct compression level for their target LLM.
      - id: OPT-B
        description: >
          Block AGGRESSIVE mode entirely from v1.0. Offer only LOSSLESS and BALANCED.
          AGGRESSIVE mode added in v2.0 once fidelity testing is complete.
      - id: OPT-C
        description: >
          Allow AGGRESSIVE mode but include a clear capability advisory in the
          SemantiCode metadata block: "AGGRESSIVE mode — validated for advanced LLMs
          (GPT-4 class / Claude Sonnet class and above). Not recommended for
          lightweight or instruction-tuned-only models."
    resolution: OPT-C
    rationale: >
      OPT-B is overly conservative — practitioners exploring compression limits
      are precisely the target users for AGGRESSIVE mode. OPT-C is the appropriate
      balance: provide the capability, document the risk clearly in the output.
      The metadata advisory (FR-07) is the right place for this warning — it is
      always present and associated with the specific output, not buried in documentation.
      This pattern is consistent with CONF-01 (explicit opt-in required for lossy modes).
    approved_by: "Jerry van Heerikhuize (Product Owner)"

