  feature: "FEAT-0006"
  produced_by: "Claude Sonnet 4.6 (QC Analyst / QC-02)"
  date: "2026-03-15"
  status: approved

conflicts:

  - id: CONF-01
    title: "Geographic precision vs ASCII character resolution"
    description: >
      The user requests "high precision" maps. Geographic precision (sub-metre
      accuracy) is physically impossible to represent at ASCII character grid
      resolution (each character represents potentially kilometres of real space).
      There is a conceptual tension between the word "precision" and the medium.
    options:
      - id: OPT-A
        description: >
          Define "precision" as proportional accuracy within the ASCII grid:
          relative distances between all POIs are correct within ±1 character
          of their true proportional position. Sub-character accuracy is
          documented in map metadata.
      - id: OPT-B
        description: >
          Reject requests where coordinate separation is below the character
          resolution threshold (cannot represent accurately) and report the
          minimum resolvable separation for the requested map size.
      - id: OPT-C
        description: >
          Both OPT-A + OPT-B: render at best-possible precision AND report
          character resolution in metadata, rejecting/warning when inputs
          are below resolvable threshold.
    resolution: OPT-C
    rationale: >
      OPT-C is most honest and useful. "High precision" is redefined as
      "proportionally correct within the limits of the ASCII medium," with full
      transparency about those limits. If two POIs are closer than one character
      width apart, A.T.L.A.S. warns the user and uses a shared composite symbol
      rather than producing a misleading rendering. This is the only intellectually
      honest resolution.
    approved_by: "Jerry van Heerikhuize (Product Owner)"

  - id: CONF-02
    title: "Real-world geographic data vs AI-computed rendering"
    description: >
      A.T.L.A.S. has no access to real map data (terrain, roads, buildings,
      coastlines). Should the agent infer or approximate geographic context
      (e.g., draw a coastline between two coastal cities based on LLM knowledge),
      or should it strictly plot only user-provided coordinates?
    options:
      - id: OPT-A
        description: >
          Plot only user-provided coordinates. No inferred geography. The map
          is a precise representation of what the user gave — nothing more.
          Background is empty grid. Output is accurate for what it shows.
      - id: OPT-B
        description: >
          Infer approximate geographic context from LLM world knowledge
          (coastlines, major rivers, country borders) and render as approximate
          background features.
      - id: OPT-C
        description: >
          OPT-A default, with OPT-B as explicit opt-in via user request
          ("with geographic context" or "with approximate background").
    resolution: OPT-A (with OPT-C as future scope)
    rationale: >
      OPT-B carries significant accuracy risk: LLM-inferred geography may be
      wrong, misleading, or inconsistent across requests (violating NFR-04
      determinism). A map that shows incorrect coastlines is worse than a map
      that shows no coastlines. OPT-A maintains honesty and determinism. OPT-C
      is deferred to v2.0 — if implemented, inferred geography must be clearly
      marked as "approximate" in the output.
    approved_by: "Jerry van Heerikhuize (Product Owner)"

  - id: CONF-03
    title: "Conversational clarification vs stateless rendering"
    description: >
      If the user's input is ambiguous (e.g., "Map Amsterdam" with no coordinates,
      or mixed coordinate systems), should A.T.L.A.S. ask a clarifying question
      or make a best-effort interpretation and proceed?
    options:
      - id: OPT-A
        description: >
          Always ask one clarifying question before rendering, if input is ambiguous.
          Adds a conversational turn but avoids rendering the wrong map.
      - id: OPT-B
        description: >
          State the interpretation and render immediately ("Interpreting 'Amsterdam'
          as 52.3676°N, 4.9041°E — rendering..."). User can re-submit if wrong.
      - id: OPT-C
        description: >
          For unparseable input: return structured error. For parseable-but-ambiguous:
          OPT-B (state interpretation, render). For completely underspecified
          (e.g., a city name only): apply LLM world knowledge to supply approximate
          coordinates, state them, and render.
    resolution: OPT-C
    rationale: >
      A.T.L.A.S. is a stateless service agent — asking clarifying questions
      breaks the single-task contract (FR-12). OPT-B/C is consistent with the
      service-agent pattern: be maximally helpful within one response. Stating
      the interpretation before rendering gives the user the information they
      need to re-submit if incorrect. LLM world knowledge for well-known locations
      (city centres, famous landmarks) is appropriate and useful — A.T.L.A.S.
      should note when it has applied this, and include approximate coordinates
      in the legend so the user can verify.
    approved_by: "Jerry van Heerikhuize (Product Owner)"

  - id: CONF-04
    title: "ASCII character set — box-drawing and decoration"
    description: >
      Rich box-drawing (Unicode ─ │ ┼ etc.) would produce cleaner-looking maps
      but violates the 7-bit ASCII constraint (NFR-02). Basic ASCII (-, |, +)
      produces functional but visually sparse borders.
    options:
      - id: OPT-A
        description: "Strict 7-bit ASCII only: -, |, + for borders; * for points."
      - id: OPT-B
        description: "Use Unicode box-drawing by default; ASCII-only mode on request."
      - id: OPT-C
        description: "ASCII-only for v1.0; Unicode variant deferred to v2.0."
    resolution: OPT-C
    rationale: >
      NFR-02 requires 7-bit ASCII for universal compatibility across terminal
      environments, email, log files, and legacy systems. Unicode box-drawing
      renders incorrectly in many monospace environments. OPT-A/C satisfies this.
      A Unicode-enhanced variant is a valid v2.0 scope item — the architecture
      will make this easy to add by isolating border/symbol rendering in
      the OUTPUT_FORMAT component.
    approved_by: "Jerry van Heerikhuize (Product Owner)"

  - id: CONF-05
    title: "Polygon wall character set — orthogonal vs diagonal"
    description: >
      Boundary polygon segments can run at any angle across the ASCII grid.
      Strictly orthogonal segments (horizontal, vertical) are unambiguous.
      Diagonal segments (any angle other than 0°/90°) are a problem: strict
      7-bit ASCII offers only / and \ for 45° diagonals; other angles have no
      natural ASCII representation. Options:
    options:
      - id: OPT-A
        description: >
          Orthogonal only: force all boundary segments to horizontal or vertical
          rendering (step diagonals with - and | characters). Simple but may
          misrepresent angular walls.
      - id: OPT-B
        description: >
          Orthogonal + 45° diagonals: use -, |, +, /, \ as appropriate.
          Non-45° angles approximated as stepped orthogonal segments.
          A metadata note identifies approximated segments.
      - id: OPT-C
        description: >
          Full Bresenham rasterisation with character-angle selection from
          a wider ASCII set (incl. _ and ' for shallow angles). Most accurate
          but output is harder to read.
    resolution: OPT-B
    rationale: >
      OPT-B provides the best balance of readability and geometric fidelity.
      The /, \ characters are universally understood as diagonals in ASCII art.
      Approximating non-45° angles as stepped segments is well-understood
      practice in ASCII floor plans and maintains 7-bit compatibility (NFR-02).
      Metadata transparently notes any approximated segments so the user can
      assess fidelity. OPT-C's added complexity is not justified for v1.0.
    approved_by: "Jerry van Heerikhuize (Product Owner)"

  - id: CONF-06
    title: "Interior vs exterior mode detection"
    description: >
      When a boundary polygon is provided, the rendered map can represent either
      an interior space (room, building — walls are solid, POIs are inside) or an
      exterior area (park, site boundary — walls are a soft perimeter, POIs may
      be inside or outside). The agent must determine which mode to apply.
    options:
      - id: OPT-A
        description: >
          Always require the user to explicitly declare interior or exterior.
          If not declared and a polygon is given, return an error requesting
          clarification.
      - id: OPT-B
        description: >
          Default to EXTERIOR mode for all polygon inputs. User can explicitly
          request INTERIOR mode via keyword ("interior", "floor plan", "room").
      - id: OPT-C
        description: >
          Default rule: boundary polygon present → INTERIOR mode (solid walls);
          no boundary polygon → EXTERIOR mode (open grid). User may override
          either direction explicitly (e.g., "exterior boundary" or "interior map").
    resolution: OPT-C
    rationale: >
      OPT-C aligns with the product owner's original statement: "inside locations
      always have walls." The heuristic — polygon present implies interior — is
      natural and matches the most common use case (a user providing a floor plan
      boundary expects walls, not a dashed perimeter). The override mechanism
      handles the minority case where a user provides a soft exterior boundary
      polygon. OPT-A breaks the stateless service contract by requiring additional
      clarification. OPT-B's default is counterintuitive given PO intent.
    approved_by: "Jerry van Heerikhuize (Product Owner)"

