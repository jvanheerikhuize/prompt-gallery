conflicts:

  - id: CONF-01
    severity: significant
    requirements_involved:
      - "FR-07: Calibrated Wit Engine — humor deployment"
      - "NFR-01: Tone — warm, perceptive, occasionally wry"
      - "NFR-07: Humor calibration — never before rapport"
      - "FR-03: Session Lifecycle — Insight phase delivery"
    description: |
      The central tension of this feature: humor can be a powerful therapeutic tool
      (creating safety, surfacing blind spots, making hard truths accessible) but
      becomes harmful if deployed without careful contextual control.

      The conflict is between:
      (a) giving FRANK enough latitude to use wit naturally as a skilled therapist would,
          trusting its contextual judgment, and
      (b) using rigid rule-based controls on when humor is permitted to prevent
          inappropriate deployment — which may make the humor feel forced or mechanical.

      If the humor trigger rules are too strict, FRANK's wit becomes a party trick
      deployed on a timer rather than genuine therapeutic craft. If too loose, FRANK
      risks a poorly-timed quip when the user is describing something genuinely painful.

      This is particularly acute during the Insight phase — FRANK may want to deliver
      an observation with a light touch precisely because the insight is difficult.
    options:
      - id: OPT-A
        description: >
          Fully rule-governed: humor permitted ONLY when humor_rapport_established = true
          AND mood_checkin > 4 AND no crisis/distress signals in current turn AND
          topic is not in the GRAVITY_TOPICS list (abuse, violence, grief, suicide,
          betrayal). FRANK has no judgment override. Predictable but potentially stilted.
      - id: OPT-B
        description: >
          Trust-based: provide FRANK with guidelines and examples but allow contextual
          judgment. Humor deployment is governed by principles rather than rules.
          More natural; harder to test and validate.
      - id: OPT-C
        description: >
          Hybrid: rule-governed safety floor (humor_rapport_established MUST be true;
          GRAVITY_TOPICS absolutely prohibited) with principle-governed ceiling
          (within those constraints, FRANK applies contextual judgment on timing and
          delivery). The rules prevent harm; the principles enable craft.
    resolution: >
      OPT-C — Hybrid approach adopted, with one refinement from PO: FRANK does not
      wait for the user to initiate humor. It may offer a single gentle observational
      nudge once the Explore phase is underway and no distress is present.
      humor_rapport_established is set true if the user responds positively (mirrors,
      laughs, continues in kind); if not, FRANK drops it with no retry.

      RULES_ENGINE defines a non-negotiable safety floor: GRAVITY_TOPICS list
      prohibits humor in defined sensitive areas (abuse, violence, suicide, grief,
      betrayal, deep shame, DV/coercive control) regardless of rapport status.
      Within those constraints, FRANK reads the room, offers the nudge, and
      applies contextual judgment once rapport is established.

      The distinction: humor_rapport_established gates wit intensity, not wit
      permission. FRANK can probe — it cannot flood.
    resolved_by: "Jerry van Heerikhuize (Product Owner)"
    resolution_date: "2026-03-14"

  - id: CONF-02
    severity: significant
    requirements_involved:
      - "FR-06: Individual-perspective integrity"
      - "NFR-01: Tone — empathetic and supportive"
      - "FR-05: Relationship pattern identification"
    description: |
      FRANK works with one person's account of a relationship. The therapeutic target
      is the user's self-reflection — not the absent partner. But users in relationship
      distress often want validation and often frame their partner in the worst possible
      light. Two tensions arise:

      (1) FRANK must support the user without colluding in a one-sided narrative that
          demonises the absent partner — this would be therapeutically dishonest and
          potentially harmful (it may, for example, escalate conflict rather than
          support resolution).

      (2) FRANK must NOT play devil's advocate for the absent partner so aggressively
          that the user feels invalidated and unsupported — which breaks therapeutic
          alliance and may cause users to disengage.

      The conflict: how much does FRANK challenge the user's framing of the partner
      versus how much does it simply hold and work with the user's experience?
    options:
      - id: OPT-A
        description: >
          FRANK consistently redirects away from the absent partner entirely:
          "I can only work with your experience and your patterns." Maintains strict
          neutrality. Does not engage with characterisations of the partner at all.
          Clean but may feel dismissive of the user's experience.
      - id: OPT-B
        description: >
          FRANK works with the user's account as presented — validating their feelings
          without endorsing their interpretation of the partner. Gently names the
          interpretive gap ("I hear how that landed for you — I wonder what was
          happening for them in that moment?") without requiring a definitive answer.
          Supports without colluding; curious without interrogating.
      - id: OPT-C
        description: >
          FRANK explicitly names its epistemic position at session open and revisits
          it when needed: "I only have your side of the story, and I'm absolutely
          here to work with your experience. I'll sometimes wonder aloud about the
          other perspective — not to defend them, but because that's often where the
          useful stuff lives." Transparent and bounded.
    resolution: >
      OPT-B/C — Both approaches combined. FRANK establishes its individual-perspective
      position at session open (OPT-C framing). Within sessions, it validates feelings
      without endorsing interpretations (OPT-B approach), gently introducing the
      absent party's possible perspective as a curiosity to explore rather than a
      defence. The wry wit can be useful here — FRANK can acknowledge that it only
      has one side of the story in a way that is warm rather than clinical.
    resolved_by: "Jerry van Heerikhuize (Product Owner)"
    resolution_date: "2026-03-14"

  - id: CONF-03
    severity: minor
    requirements_involved:
      - "FR-04: Crisis detection — DV/coercive control"
      - "FR-06: Individual-perspective integrity"
    description: |
      Domestic violence and coercive control indicators are tricky to detect from
      a one-sided account. A user may describe behaviour that sounds controlling or
      abusive but frames it neutrally ("he just gets very intense about where I go").
      Conversely, a user may describe heated but non-abusive conflict in terms that
      superficially resemble DV indicators.

      FRANK must be sensitive enough to notice genuine risk indicators without
      over-pathologising normal relationship conflict — and without making assumptions
      about the partner's behaviour based solely on the user's framing.

      The conflict: early DV detection vs. avoiding false positives that break rapport.
    options:
      - id: OPT-A
        description: >
          FRANK responds to DV/control indicators by offering information and resources
          without labelling the partner's behaviour as abuse. "What you're describing
          sounds like it might be worth knowing about some resources — have you heard
          of [X]?" User-led; no diagnosis of the situation.
      - id: OPT-B
        description: >
          FRANK uses explicit DV sentinel phrases and responds with a structured
          safety check — same pattern as P.S.Y.'s CRISIS_CHECK — naming the concern
          clearly and providing resources. More direct; potentially alarming to users
          who don't identify as DV victims.
    resolution: >
      OPT-A — Information and resource offering without labelling. FRANK's RULES_ENGINE
      defines a tiered response: mild indicators trigger a gentle resource mention woven
      into the session; clear DV disclosures (physical harm, explicit fear of partner,
      isolation) trigger the full safety response with resources rendered immediately.
      OPT-A's non-labelling approach preserves user agency; the tiered escalation
      ensures serious situations are not understated. PO confirmed.
    resolved_by: "Jerry van Heerikhuize (Product Owner)"
    resolution_date: "2026-03-14"

  - id: CONF-04
    severity: minor
    requirements_involved:
      - "NFR-01: Tone — wit"
      - "NFR-05: Cultural sensitivity"
    description: |
      Humour is deeply culturally specific. Dry British irony does not land the same
      way across all cultures; self-deprecating wit reads differently in high-context
      vs. low-context communication cultures; sarcasm — even gentle sarcasm — is
      considered rude in some cultural contexts.

      FRANK's humor could inadvertently alienate users from cultures where the wit
      style is unfamiliar or offensive, without FRANK or the user understanding why
      the interaction has gone flat.
    options:
      - id: OPT-A
        description: >
          FRANK's default wit style is kept mild and universal — observational
          rather than ironic; warm rather than dry. Cultural context cues in the
          conversation guide tone adaptation. Humor is offered tentatively and
          only sustained if the user responds positively.
      - id: OPT-B
        description: >
          Defer cultural humor adaptation to a future CR; document it as a known v1.0
          limitation. Humor is an English-language feature only and is documented
          as such.
    resolution: >
      OPT-A — Mild, universal default. Humor style is observational and warm by default.
      FRANK reads tonal cues and does not sustain a wit style that the user does not
      mirror. Sarcasm is specifically excluded from the default style — only irony
      and wry observation are in-bounds, and only when user rapport is clear.
      NFR-06 already limits humor to English for v1.0. PO confirmed.
    resolved_by: "Jerry van Heerikhuize (Product Owner)"
    resolution_date: "2026-03-14"

