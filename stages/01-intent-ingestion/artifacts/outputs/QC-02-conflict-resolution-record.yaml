conflicts:

  - id: CONF-01
    severity: significant
    requirements_involved:
      - "FR-02: Mandatory disclaimer (not a substitute for clinical care)"
      - "NFR-01: Tone — warmth and immersive presence"
    description: |
      There is a tension between maintaining an immersive, warm therapeutic persona (NFR-01)
      and rendering a clinical disclaimer that breaks the immersive frame (FR-02).

      A disclaimer that interrupts the session with legalistic language risks:
      (a) reducing user trust and engagement at a vulnerable moment, or
      (b) being written so softly that it fails its legal/ethical purpose.

      The conflict is between maximising therapeutic rapport and maintaining honest,
      explicit boundary communication.
    options:
      - id: OPT-A
        description: >
          Disclaimer is rendered once at session open in warm, plain language that is
          honest but not clinical or legalistic. It is woven into the persona's introduction,
          not delivered as a formal legal notice. Re-render on boundary crossing only.
      - id: OPT-B
        description: >
          Disclaimer is rendered as a distinct, clearly marked section separate from the
          therapeutic persona — unambiguous, clinical in tone, cannot be misread. Immersion
          is secondary to transparency.
      - id: OPT-C
        description: >
          Render a brief warm disclaimer at session open (OPT-A style), then a full formal
          disclaimer if the user explicitly requests clinical guidance (diagnosis, medication,
          Phase 2 processing). Two-tier approach.
    resolution: >
      OPT-C — Two-tier disclaimer adopted. A brief, warm disclaimer is woven into the
      persona's session-open introduction. A full, formally worded disclaimer re-renders
      whenever the user's language implies clinical treatment expectations (diagnosis,
      medication, Phase 2 processing). This balances therapeutic rapport with unambiguous
      boundary communication.
    resolved_by: "Jerry van Heerikhuize (Product Owner)"
    resolution_date: "2026-03-14"

  - id: CONF-02
    severity: significant
    requirements_involved:
      - "FR-09: Session State Schema — tracks themes, safety flags, techniques"
      - "NFR-04: GDPR awareness — special category data, advise no PII"
      - "SC-04: Data classification — RESTRICTED"
    description: |
      The SESSION_STATE schema tracks mental health data (mood scores, themes, safety flags,
      session notes) in the LLM context window. This is beneficial for session coherence (FR-09)
      but creates a tension with GDPR Art. 9 special category data obligations (NFR-04).

      Specifically: the same schema that provides therapeutic continuity also aggregates
      sensitive mental health information in a context window that may be retained by the
      LLM provider (OpenAI, Anthropic, Google, etc.) per their data policies.

      The prompt cannot control LLM provider data retention, but it can:
      (a) restrict what it records in STATE, and/or
      (b) warn users about provider retention at session open.
    options:
      - id: OPT-A
        description: >
          SESSION_STATE is kept minimal: mood scores and technique names only. No free-text
          session notes or explicit theme labels that could identify the user's disclosures.
          Reduces data sensitivity at cost of session coherence.
      - id: OPT-B
        description: >
          SESSION_STATE includes full schema as specified. Warn users explicitly at session
          open that LLM providers may retain conversation data per their privacy policy,
          and advise not to share identifying information. Rich state; informed user.
      - id: OPT-C
        description: >
          SESSION_STATE includes full schema. Prompt includes a ~privacy console command
          that explains what is held in state and reminds users of provider retention risk.
          State is also clearable via ~reset.
    resolution: >
      OPT-B/C — Full SESSION_STATE schema retained for session coherence. Explicit user
      notice rendered at session open (GDPR Art. 9 special category data, LLM provider
      retention risk, advice not to share identifying information). A ~privacy console
      command is added to FR-10 that on demand explains what STATE holds and reminds
      users of provider data retention. State remains clearable via ~reset.
      This satisfies both GDPR transparency and therapeutic continuity requirements.
    resolved_by: "Jerry van Heerikhuize (Product Owner)"
    resolution_date: "2026-03-14"

  - id: CONF-03
    severity: minor
    requirements_involved:
      - "FR-11: Boundary enforcement — Phase 2/3 scope limit"
      - "FR-06: Psychoeducation — trauma responses"
    description: |
      The boundary between psychoeducation about trauma (Phase 1 — permitted) and
      trauma memory processing (Phase 2 — out of scope) is clinically real but
      contextually fluid in an LLM session. A user may begin with a psychoeducation
      question and organically move toward re-experiencing narratives.

      The RULES_ENGINE must detect this drift and redirect, but if the detection
      trigger is too sensitive it may interrupt legitimate Phase 1 work. If too
      permissive, it allows drift into Phase 2 territory.
    options:
      - id: OPT-A
        description: >
          Define explicit sentinel patterns for Phase 2 drift in the RULES_ENGINE
          (e.g. "tell me about what happened", "I keep seeing...", "I want to go back
          to the memory"). On detection, gentle redirect offered once; if user persists,
          firmer redirect with explanation.
      - id: OPT-B
        description: >
          Trust the user: only redirect if user explicitly requests Phase 2 processing
          by name. Allow narrative exploration within Explore phase without proactive
          interruption.
    resolution: "OPT-A recommended by agent — defining sentinel patterns is safer for vulnerable population.
      PO to confirm or override."
    resolved_by: "— pending"
    resolution_date: "— pending"

  - id: CONF-04
    severity: minor
    requirements_involved:
      - "NFR-05: Cultural sensitivity (should)"
      - "FR-06, FR-07: Psychoeducation and techniques"
    description: |
      Several grounding and stabilisation techniques in the library have Western cultural
      origins (mindfulness from MBSR, self-compassion from Neff, visualisation). These
      may not be appropriate, accessible, or culturally congruent for all users.

      NFR-05 is marked 'should', meaning cultural adaptation is desirable but not
      mandatory for v1.0. However, the technique library should at minimum avoid
      presenting these practices as universally applicable.
    options:
      - id: OPT-A
        description: >
          Techniques are introduced with cultural context acknowledged: "Some people find
          this helpful; feel free to tell me if it doesn't resonate." User can ask for
          alternatives. No additional cultural-specific techniques required for v1.0.
      - id: OPT-B
        description: >
          Defer cultural adaptation to a future CR. Document English/Western-centric
          technique library as a known v1.0 limitation.
    resolution: "OPT-A — agent recommendation. Techniques offered with explicit invitation to
      decline or request alternatives. PO to confirm."
    resolved_by: "— pending"
    resolution_date: "— pending"

