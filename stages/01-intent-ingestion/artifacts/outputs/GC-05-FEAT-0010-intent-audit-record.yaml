intent_summary: |
  FEAT-0010 introduces S.C.O.U.T. (Strategic Curriculum Overview and Understanding
  Translator), a stateless parental support tool and companion to M.E.N.T.O.R.
  (FEAT-0009). Where M.E.N.T.O.R. coaches the student, S.C.O.U.T. briefs the parent.

  S.C.O.U.T. is a single-task agent: given a VWO subject and topic, it produces a
  structured THEME_OVERVIEW in four parts — Focus (what the student must master),
  De Logica (an adult-world analogy), De Valkuilen (the 3 most common errors), and
  De Lakmoesproef (one diagnostic question the parent can use). Output is entirely
  in Dutch. The persona is direct and businesslike — an intelligence officer for the
  curriculum, not an educator.

  The draft masterprompt was provided by the requester in SemantiCode-style notation.
  S.C.O.U.T. will be expanded into a full MVC/XML prompt with complete subject coverage
  across all VWO core subjects (klas 1-6) and anchored to SLO eindtermen.

  Governance profile is the lightest in the repository: stateless, public data only,
  no personal data, no vulnerable users, no safety controls beyond scope enforcement.

