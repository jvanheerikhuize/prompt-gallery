  feature: "FEAT-0006"
  produced_by: "Claude Sonnet 4.6 (Governance / GC-05)"
  date: "2026-03-15"

# ── Intent Traceability ───────────────────────────────────────────────────────
original_request: |
  "i want to create a new masterprompt for an agent who specializes in the
  creation of top view maps with high precision based on coordinates, his
  output should be a map in ASCII. can you enter stage one to start working
  this is a typical service agent which handles only one task"

requester: "Jerry van Heerikhuize (Product Owner)"
request_date: "2026-03-15"

# ── Intent Extraction ─────────────────────────────────────────────────────────
intent_extracted:
  primary_goal: "ASCII top-view map generator from coordinate input"
  agent_type: "Single-task stateless service agent"
  key_constraints_from_request:
    - "Top view (orthographic/plan view)"
    - "High precision"
    - "Coordinates as input"
    - "ASCII output"
    - "Single task — no multi-turn session management"

# ── Interpretation Decisions ─────────────────────────────────────────────────
interpretations:
  - item: "Agent name proposed as A.T.L.A.S. — ASCII Topographic Layout and Surveying System"
    rationale: "Thematically appropriate acronym consistent with naming convention in this repository"
    approved_by_po: implicit   # PO will confirm at Stage 1 exit

  - item: "'High precision' interpreted as proportional accuracy within ASCII character grid resolution, not geographic sub-metre precision"
    rationale: "ASCII medium physically cannot represent sub-metre precision; CONF-01 resolves this with transparent metadata approach"
    approved_by_po: implicit

  - item: "'Single task' interpreted as stateless: no SESSION_STATE, no lifecycle phases, no console commands"
    rationale: "Explicit user statement; consistent with service-agent pattern"
    approved_by_po: confirmed_in_request

  - item: "Category: utility (new category proposed)"
    rationale: "A.T.L.A.S. is neither entertainment, engineering/code-review, nor health — utility is the most accurate descriptor"
    approved_by_po: implicit

  - item: "WGS84 lat/lon as primary coordinate system; abstract grid coordinates also supported"
    rationale: "Geographic coordinates are the natural interpretation of 'coordinates'; abstract grids extend utility to game and planning contexts"
    approved_by_po: implicit

