# =============================================================================
# Crisis Resources — region-keyed reference data
# =============================================================================
# Health-adjacent roles (psy, frank, papa, vita, agora) reference crisis hotlines
# and safety resources. Numbers vary by jurisdiction; deployers MUST select the
# region entry appropriate to their users and splice the values into the role
# prompt (via template substitution, prompt prefix, or a runtime wrapper) before
# deployment.
#
# Schema per region:
#   suicide_hotline:       Primary suicide / mental-health crisis line
#   emergency:             General emergency number (police/fire/ambulance)
#   domestic_violence:     DV-specific helpline (used by F.R.A.N.K.)
#   child_safety:          Child safeguarding line (used by P.A.P.A., A.G.O.R.A.)
#   text_support:          SMS-based crisis support (optional, set to null if n/a)
#   source_checked:        ISO date the entry was last verified
#
# Validation:
#   scripts/validate-index.sh checks source_checked is within 12 months.
# =============================================================================

version: "1.0.0"
schema: crisis-resources/v1
default_region: international

regions:

  international:
    suicide_hotline:
      name: "Find A Helpline"
      contact: "https://findahelpline.com"
      hours: "varies by country"
    emergency:
      name: "Local emergency services"
      contact: "dial your country's emergency number"
    domestic_violence:
      name: "Find A Helpline (DV filter)"
      contact: "https://findahelpline.com"
    child_safety: null
    text_support: null
    source_checked: "2026-04-12"

