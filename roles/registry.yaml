  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------

  - id: psy
    name: "P.S.Y. — Trauma-Specialised Psychologist"
    slug: trauma-psychologist
    category: health
    version: "1.0"
    status: stable

    files:
      prompt: roles/health/trauma-psychologist/prompt.md
      variant: null
      semanticode: roles/health/trauma-psychologist/prompt-semanticode.md

    description: >
      A trauma-informed psychoeducation and emotional support companion grounded in
      the SAMHSA six pillars of trauma-informed care. Provides Phase 1 (Safety and
      Stabilisation) support only: psychoeducation, grounding techniques, CBT-informed
      reflection, and crisis escalation. Scoped strictly to Phase 1 — Phase 2/3
      trauma processing requires in-person clinical supervision. Features mandatory
      crisis detection, safe-messaging enforcement, GDPR Art. 9 disclosure, and
      multi-language support (7 languages + default).

    tags:
      - health
      - trauma-informed
      - psychoeducation
      - crisis-safety
      - gdpr
      - multi-language
      - stateful

    usage:
      paste_in: true
      system_prompt: true
      auto_init: true

    safety_notes: |
      This prompt is health-adjacent and targets a vulnerable user population.
      Before deploying in any product context, review:
      - Crisis line numbers are current and correct for your target region
      - Safe-messaging guidelines are appropriate for your jurisdiction
      - GDPR Art. 9 disclosure wording meets your legal obligations
      - Phase 1 scope limits are appropriate for your use case
      This prompt is NOT a substitute for licensed clinical care.

    governance:
      feat_id: FEAT-0004
      risk_tier: medium
      ai_tier: limited
      data_classification: restricted
      gdpr_special_category: true      # GDPR Art. 9 — mental health data
      eu_ai_act_tier: limited

    provenance:
      author: "Jerry van Heerikhuize"
      created: "2026-03-14"
      last_updated: "2026-03-14"
      implementation: "Agent-assisted — Claude Sonnet 4.6 / FEAT-0004 Stage 3"

  - id: frank
    name: "F.R.A.N.K. — Forthright Relationship Analyst Navigating Knots"
    slug: relationship-therapist
    category: health
    version: "1.0"
    status: stable

    files:
      prompt: roles/health/relationship-therapist/prompt.md
      variant: null
      semanticode: roles/health/relationship-therapist/prompt-semanticode.md

    description: >
      A relationship psychoeducation and self-reflection agent grounded in attachment
      theory, Emotionally Focused Therapy (EFT), and Gottman-informed practice.
      Guides single-user sessions through a structured lifecycle (Check-in → Explore
      → Insight → Action → Close). Features calibrated dry wit (HUMOR_PROTOCOL),
      relationship pattern identification (Four Horsemen, pursue-withdraw, attachment
      styles), domestic violence crisis detection with tiered response, individual-
      perspective integrity guard, and multi-language support (7 languages + default).
      Wit is deployed with a single-nudge pre-rapport rule and suspended automatically
      during distress and GRAVITY_TOPICS engagement.

    tags:
      - health
      - relationship-therapy
      - psychoeducation
      - attachment-theory
      - gottman
      - eft
      - crisis-safety
      - domestic-violence
      - gdpr
      - multi-language
      - stateful
      - humor

    usage:
      paste_in: true
      system_prompt: true
      auto_init: true

    safety_notes: |
      This prompt is health-adjacent and may surface domestic violence, mental health,
      and suicidal ideation disclosures. Before deploying in any product context, review:
      - Crisis and DV helpline numbers are current and correct for your target region
      - GDPR Art. 9 disclosure wording meets your legal obligations
      - Individual-perspective scope limits are appropriate for your use case (FRANK
        works with one person's account only — it is not a couples therapy tool)
      - HUMOR_PROTOCOL behavior has been tested on your chosen LLM (Stage 4 ACG-01)
      This prompt is NOT a substitute for licensed relationship or couples therapy.

    governance:
      feat_id: FEAT-0005
      risk_tier: medium
      ai_tier: limited
      data_classification: confidential    # RESTRICTED elevation trigger: mental health / DV
      gdpr_special_category: conditional   # Art. 9(1) if mental health / DV data disclosed
      eu_ai_act_tier: limited

    provenance:
      author: "Jerry van Heerikhuize"
      created: "2026-03-14"
      last_updated: "2026-03-14"
      implementation: "Agent-assisted — Claude Sonnet 4.6 / FEAT-0005 Stage 3"

  - id: vita
    name: "V.I.T.A. — Values-Integrated Transformation Agent"
    slug: lifestyle-coach
    category: health
    version: "1.0"
    status: stable

    files:
      prompt: roles/health/lifestyle-coach/prompt.md
      variant: roles/health/lifestyle-coach/prompt-optimized.md
      semanticode: roles/health/lifestyle-coach/prompt-semanticode.md

    description: >
      A personal lifestyle coaching companion covering three pillars: Food, Activity,
      and Mental Health. Guides users through a structured session lifecycle
      (OPEN → CHECK_IN → FOCUS_AREA → EXPLORE → ACTION_PLAN → CLOSE) and produces
      one micro-habit commitment per session. Applies Motivational Interviewing (OARS),
      CBT reframing, habit loop analysis, and positive psychology. Features dry/witty
      HUMOR_PROTOCOL (suspended during crisis and gravity topics), mandatory crisis
      detection, safe-messaging enforcement, GDPR Art. 9 disclosure, and multi-language
      support (7 languages + default). Not a substitute for clinical care.

    tags:
      - health
      - lifestyle-coaching
      - habit-formation
      - motivational-interviewing
      - cbt
      - crisis-safety
      - gdpr
      - multi-language
      - stateful
      - humor

    usage:
      paste_in: true
      system_prompt: true
      auto_init: true

    safety_notes: |
      This prompt covers the Mental Health pillar, which means GDPR Art. 9(1) health
      data is collected unconditionally in every session. Before deploying in any
      product context, review:
      - Crisis line numbers are current and correct for your target region
      - GDPR Art. 9 disclosure wording meets your legal obligations
      - A DPIA (Art. 35) is required for large-scale production deployment
      - Scope limits (no diagnosis, no clinical advice, no trauma processing) are
        appropriate for your use case
      This prompt is NOT a substitute for licensed medical, dietary, or mental health care.

    governance:
      feat_id: FEAT-0008
      risk_tier: medium
      ai_tier: limited
      data_classification: restricted
      gdpr_special_category: true      # GDPR Art. 9 — Mental Health is a core pillar
      eu_ai_act_tier: limited

    provenance:
      author: "Jerry van Heerikhuize"
      created: "2026-03-17"
      last_updated: "2026-03-17"
      implementation: "Agent-assisted — Claude Sonnet 4.6 / FEAT-0008 Stage 3"

  # ---------------------------------------------------------------------------
  # Education
  # ---------------------------------------------------------------------------

  - id: scout
    name: "S.C.O.U.T. — Strategic Curriculum Overview and Understanding Translator"
    slug: curriculum-scout
    category: education
    version: "1.0"
    status: stable

    files:
      prompt: roles/education/curriculum-scout/prompt.md
      variant: roles/education/curriculum-scout/prompt-optimized.md
      semanticode: roles/education/curriculum-scout/prompt-semanticode.md

    description: >
      A stateless, single-task parental support tool and companion to M.E.N.T.O.R.
      (FEAT-0009). Given a VWO subject and topic, produces a structured four-part
      THEME_OVERVIEW in Dutch: Focus (what the student must master for the test),
      De Logica (one adult-world analogy from finance/engineering/logistics/law),
      De Valkuilen (the 3 most common student errors), and De Lakmoesproef (one
      sharp diagnostic question for the parent to use). Anchored to SLO VWO
      eindtermen. Persona is direct and businesslike — an intelligence officer for
      the curriculum. Addressed to the parent throughout; never to the student.

    tags:
      - education
      - parental-support
      - curriculum-briefing
      - dutch
      - vwo
      - stateless
      - single-task
      - slo-eindtermen

    usage:
      paste_in: true
      system_prompt: true
      auto_init: false     # Waits for [VAK + ONDERWERP] input

    governance:
      feat_id: FEAT-0010
      risk_tier: low
      ai_tier: minimal
      data_classification: public
      gdpr_special_category: false

    provenance:
      author: "Jerry van Heerikhuize"
      created: "2026-03-18"
      last_updated: "2026-03-18"
      implementation: "Agent-assisted — Claude Sonnet 4.6 / FEAT-0010 Stage 3"

  - id: mentor
    name: "M.E.N.T.O.R. — Methodical Educational Navigator for Teaching, Outcomes, and Review"
    slug: study-coach
    category: education
    version: "1.0"
    status: stable

    files:
      prompt: roles/education/study-coach/prompt.md
      variant: roles/education/study-coach/prompt-optimized.md
      semanticode: roles/education/study-coach/prompt-semanticode.md

    description: >
      A study and exam coaching companion for VWO klas 3 students covering wiskunde,
      natuurkunde, and scheikunde. Guides through a structured session lifecycle
      (OPEN → TOPIC_SELECT → DIAGNOSE → TEACH → PRACTICE → REVIEW → CLOSE) using the
      Socratic method — asks before telling, never gives answers outright. Detects and
      addresses root misconceptions, not just surface errors. Includes exam preparation
      mode with VWO-format questions and structured feedback. Dutch output by default.
      HUMOR_PROTOCOL: dark, sarcastic, deadpan academic nihilism targeting abstract
      concepts and the curriculum — never the student. Academic integrity enforced:
      will not complete homework or write answers for the student.

    tags:
      - education
      - study-coach
      - socratic-method
      - dutch
      - vwo
      - stateful
      - humor
      - academic-integrity

    usage:
      paste_in: true
      system_prompt: true
      auto_init: true

    governance:
      feat_id: FEAT-0009
      risk_tier: low
      ai_tier: minimal
      data_classification: internal
      gdpr_special_category: false
      minors_involved: true         # User is 14; GDPR Art. 8 parental consent applies in production

    provenance:
      author: "Jerry van Heerikhuize"
      created: "2026-03-17"
      last_updated: "2026-03-17"
      implementation: "Agent-assisted — Claude Sonnet 4.6 / FEAT-0009 Stage 3"

  # ---------------------------------------------------------------------------
  # Utility
  # ---------------------------------------------------------------------------

  - id: atlas
    name: "A.T.L.A.S. — ASCII Topographic Layout and Surveying System"
    slug: ascii-cartographer
    category: utility
    version: "1.0"
    status: stable

    files:
      prompt: roles/utility/ascii-cartographer/prompt.md
      variant: null
      semanticode: roles/utility/ascii-cartographer/prompt-semanticode.md

    description: >
      A stateless, single-task ASCII cartography service agent. Accepts geographic
      coordinates (WGS84 decimal degrees, DMS, or named locations) and abstract grid
      coordinates, then renders a proportionally accurate top-view ASCII map with
      compass rose, scale bar, edge coordinate labels, and a full legend. Supports
      optional polygon boundary input for interior floor plans (any shape) with wall
      rendering (|, -, +, /, \). Interior and exterior spatial modes auto-detected from
      input. Map precision is documented in metadata with character-resolution warnings.

    tags:
      - utility
      - cartography
      - ascii-art
      - stateless
      - single-task
      - floor-plan
      - geographic

    usage:
      paste_in: true
      system_prompt: true
      auto_init: false     # Waits for coordinate input

    governance:
      feat_id: FEAT-0006
      risk_tier: low
      ai_tier: minimal
      data_classification: public    # Conditional personal data if private locations provided
      gdpr_special_category: false
      eu_ai_act_tier: minimal

    provenance:
      author: "Jerry van Heerikhuize"
      created: "2026-03-15"
      last_updated: "2026-03-15"
      implementation: "Agent-assisted — Claude Sonnet 4.6 / FEAT-0006 Stage 3"

  - id: scribe
    name: "S.C.R.I.B.E. — Semantic Compression and Reasoning-Informed Brevity Encoder"
    slug: semanticode-compiler
    category: utility
    version: "1.0"
    status: stable

    files:
      prompt: roles/utility/semanticode-compiler/prompt.md
      variant: null
      semanticode: roles/utility/semanticode-compiler/prompt-semanticode.md

    description: >
      A stateless, single-task semantic compilation agent. Accepts any MVC/XML-structured
      masterprompt and compiles it into a SemantiCode logic stream — a token-efficient,
      abbreviated notation that retains full semantic fidelity and is directly executable
      by any advanced LLM. Three compression modes: LOSSLESS (≥35% token reduction,
      default), BALANCED (≥55%), and AGGRESSIVE (≥70%, advanced LLMs recommended).
      Optional ANNOTATED mode adds inline // comments explaining compression decisions.
      Outputs a self-describing orientation header, the compiled stream, and a YAML
      metadata block with compression ratio, fidelity status, and construct counts.

    tags:
      - utility
      - compiler
      - compression
      - stateless
      - single-task
      - prompt-engineering
      - semanticode

    usage:
      paste_in: true
      system_prompt: true
      auto_init: false     # Waits for a prompt to compile

    governance:
      feat_id: FEAT-0007
      risk_tier: low
      ai_tier: minimal
      data_classification: public    # Conditional internal if submitted prompt contains PII
      gdpr_special_category: false
      eu_ai_act_tier: minimal

    provenance:
      author: "Jerry van Heerikhuize"
      created: "2026-03-17"
      last_updated: "2026-03-17"
      implementation: "Agent-assisted — Claude Sonnet 4.6 / FEAT-0007 Stage 3"
