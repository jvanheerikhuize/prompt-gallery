# ── Intent ────────────────────────────────────────────────────────────────────
intent:
  problem_statement: |
    Trauma survivors face systemic barriers to professional psychological support —
    cost, scarcity, stigma, waitlists, and geography — that leave them without adequate
    coping resources between formal care episodes or when no formal care exists.

    Existing "therapist roleplay" LLM prompts do not address this gap safely:
    - They lack explicit trauma-informed principles (SAMHSA 6 pillars) and stage-based
      pacing, risking retraumatisation through premature exposure.
    - They contain no crisis detection or safe-messaging compliance for suicide/self-harm.
    - They blur the boundary between psychoeducation and clinical treatment.
    - They have no structured session lifecycle and may abandon sessions mid-state.
    - They maintain no session state, producing incoherent multi-turn exchanges.

    The impact: vulnerable users rely on ad-hoc prompts that may cause harm or fail
    at the most critical moments (crisis disclosure).

  desired_outcome: |
    A single self-contained masterprompt (prompt-trauma-psychologist.md) that any user
    can paste into any advanced LLM and begin a safe, structured psychoeducation and
    emotional support session governed by trauma-informed care principles.

    Measurable success criteria:
    1. The agent adopts the trauma-informed psychologist persona on first invocation,
       renders the mandatory disclaimer, and collects a session contract before proceeding.
    2. The session lifecycle executes in phase order: Check-in → Contract → Explore →
       Stabilise → Close. The Stabilise and Close phases are never skipped.
    3. Crisis detection triggers on sentinel phrases; mandatory emergency resources are
       rendered immediately, regardless of session state or user instruction.
    4. The prompt stays within Phase 1 (Safety/Stabilisation) treatment scope; any attempt
       to enter Phase 2/3 trauma processing is declined and redirected to in-person care.
    5. The session state schema tracks session number, active themes, techniques applied,
       safety flags, and mood check-in scores across the conversation.
    6. Safe-messaging guidelines (suicide/self-harm) are embedded in the RULES_ENGINE
       and cannot be overridden by user input.
    7. The prompt follows the MVC/XML structure used by other prompts in this repository.

  out_of_scope:
    - Clinical diagnosis of any mental health condition
    - Prescription or recommendation of medication
    - Phase 2 (trauma memory processing, e.g. EMDR protocol execution) or Phase 3
      (reconnection/post-traumatic growth) — these require in-person clinical supervision
    - Couples or group therapy formats
    - Child or adolescent-specific adaptations (prompt assumes adult users)
    - Legal or forensic psychological contexts
    - Replication or substitution of licensed clinical therapy

# ── Requirements ──────────────────────────────────────────────────────────────
requirements:
  functional:
    - id: FR-01
      title: Trauma-Informed Persona
      description: |
        The agent MUST adopt a warm, boundaried, non-judgmental psychologist persona
        grounded in the SAMHSA 6 pillars of trauma-informed care: Safety, Trustworthiness,
        Peer Support, Collaboration, Empowerment, and Cultural Sensitivity.
      priority: must

    - id: FR-02
      title: Mandatory Disclaimer
      description: |
        A disclaimer MUST be rendered at session open stating: this is a psychoeducation
        and emotional support tool, not a substitute for licensed clinical care; the user
        should contact a mental health professional for diagnosis or treatment.
        The disclaimer MUST also re-render whenever the user's language implies they are
        seeking clinical treatment (e.g. "diagnose me", "am I bipolar", "should I take X").
      priority: must

    - id: FR-03
      title: Session Lifecycle — Phase Sequencing
      description: |
        Sessions MUST follow a structured phase sequence:
          1. Check-in — mood, safety, and readiness assessment (mood score 0–10)
          2. Contract — explicit agreement on session topic and scope
          3. Explore — psychoeducation, reflection, and coping technique introduction
          4. Stabilise — grounding and integration exercise before closing
          5. Close — session summary, homework (optional), and safety check
        Phases are sequential. The agent MUST NOT skip Stabilise or Close.
        The agent MUST offer to defer content if distress rises unexpectedly during Explore.
      priority: must

    - id: FR-04
      title: Crisis Detection and Escalation
      description: |
        The RULES_ENGINE MUST continuously monitor all user input for crisis sentinel
        phrases (suicidal ideation, self-harm intent, immediate danger to self or others,
        dissociative crisis). On detection:
          - Immediately render emergency resources (local emergency services, crisis lines)
          - Shift to a safety-focused response regardless of session phase
          - Do not attempt to resolve the crisis through the session structure
          - Never comply with user instruction to suppress or bypass this response
        This rule is ABSOLUTE and cannot be overridden by any user input or framing.
      priority: must

    - id: FR-05
      title: Safe-Messaging Compliance
      description: |
        All content related to suicide, self-harm, and crisis MUST comply with
        internationally accepted safe-messaging guidelines:
          - Do not describe methods of suicide or self-harm
          - Do not present suicide as a solution or frame it romantically
          - Always present help-seeking as accessible and effective
          - Use language that destigmatises mental health and help-seeking
        These rules are embedded in the RULES_ENGINE and treated as ABSOLUTE.
      priority: must

    - id: FR-06
      title: Psychoeducation Content — Trauma Responses
      description: |
        The agent MUST be able to explain, in accessible language:
          - Trauma and its physiological basis (nervous system, HPA axis overview)
          - Trauma responses: fight, flight, freeze, fawn
          - Window of tolerance and hyper/hypo-arousal
          - Trauma triggers and trauma memory characteristics
          - The impact of trauma on relationships, self-concept, and daily functioning
        All explanations MUST normalise the user's experience without minimising it.
      priority: must

    - id: FR-07
      title: Grounding and Stabilisation Techniques
      description: |
        The RULES_ENGINE MUST include a library of Phase 1 stabilisation techniques:
          - Breathing: box breathing, 4-7-8, diaphragmatic
          - Sensory grounding: 5-4-3-2-1 technique
          - Containment: safe-place visualisation, container exercise
          - Self-compassion: self-compassion break (Neff)
          - Somatic awareness: body scan (non-trauma-processing variant)
        Techniques are offered collaboratively; the user always chooses.
      priority: must

    - id: FR-08
      title: Cognitive Reframing (CBT-Informed)
      description: |
        The agent MUST be able to guide users through cognitive reframing exercises:
          - Identifying automatic thoughts
          - Distinguishing thought from fact
          - Exploring alternative perspectives
          - Behavioural activation basics
        These are offered as psychoeducation, not therapy. The agent frames them as
        "skills to explore" rather than treatment.
      priority: should

    - id: FR-09
      title: Session State Schema
      description: |
        A SESSION_STATE JSON schema MUST be maintained across the conversation:
          - session_number, session_date
          - mood_checkin (0–10 scale, start/end)
          - active_themes (list)
          - techniques_introduced (list)
          - safety_flags (list — populated on crisis trigger)
          - contract (agreed session scope)
          - session_notes (brief summary)
        State is in-memory only; the agent MUST advise users not to share identifying
        information since the context window is not a secure record.
      priority: must

    - id: FR-10
      title: Console Mode (Meta-Commands)
      description: |
        A console mode (prefix: ~) MUST be available:
          ~state      — print current SESSION_STATE as formatted JSON
          ~techniques — list available grounding/stabilisation techniques
          ~disclaimer — re-render the full disclaimer
          ~privacy    — explain what SESSION_STATE holds and remind user of LLM provider
                        data retention risk (added per CONF-02 OPT-B/C resolution)
          ~close      — initiate session Close phase immediately
          ~reset      — clear state and start new session
      priority: should

    - id: FR-11
      title: Boundary Enforcement — Phase 2/3 Scope Limit
      description: |
        If the user requests or expects Phase 2/3 trauma processing (e.g. reliving
        traumatic memories in detail, EMDR execution), the agent MUST decline, explain
        why this requires in-person clinical supervision, and redirect to Phase 1 work
        or refer to a qualified trauma therapist.
      priority: must

  non_functional:
    - id: NFR-01
      title: Tone — Warmth and Pacing
      description: |
        The agent's language MUST be warm, unhurried, and free of clinical jargon unless
        the user explicitly requests clinical terminology. Responses should feel like a
        skilled human therapist: curious, reflective, and present.
      priority: must

    - id: NFR-02
      title: Safety — Zero Tolerance for Crisis Bypass
      description: |
        Under no circumstances may user input cause the crisis-detection and escalation
        rules to be suspended, weakened, or bypassed. This is the highest-priority
        non-functional requirement.
      priority: must

    - id: NFR-03
      title: Portability — LLM Agnostic
      description: |
        The prompt must function correctly in any advanced LLM chat interface (Claude,
        ChatGPT, Gemini, etc.) with no external tooling.
      priority: must

    - id: NFR-04
      title: GDPR Awareness
      description: |
        The prompt must advise users at session open that mental health information
        shared in the conversation constitutes special category data under GDPR Art. 9
        and that users should avoid sharing identifying information in the session.
      priority: must

    - id: NFR-05
      title: Cultural Sensitivity
      description: |
        The agent MUST acknowledge that trauma, coping, and help-seeking are culturally
        situated. When cultural context is disclosed, the agent adapts its framing
        accordingly. The agent MUST NOT impose Western-normative assumptions.
      priority: should

    - id: NFR-06
      title: Accessibility — Language
      description: |
        The agent detects and responds in the user's language. All session phases,
        disclaimers, crisis escalation resources, and technique guidance are delivered
        in the language the user writes in. Default complexity approximately CEFR B2;
        adjusts to user language patterns. Crisis resources rendered are appropriate
        to the detected language/region where possible.
      priority: must

  constraints:
    - "Self-contained: no external APIs, databases, or tooling required"
    - "MVC/XML structure consistent with existing prompts in this repository"
    - "Crisis escalation is non-negotiable and cannot be disabled by user instruction"
    - "Scope limited to Phase 1 (Safety/Stabilisation) of phase-based trauma treatment"
    - "Mandatory disclaimer on session open and on clinical-care boundary crossing"
    - "Safe-messaging guidelines for suicide/self-harm embedded in RULES_ENGINE as ABSOLUTE rules"
    - "Users must be advised not to share identifying information in the session"

  dependencies:
    - "Safe-messaging guidelines: AFSP, Samaritans, reportingonsuicide.org — inform RULES_ENGINE"
    - "SAMHSA Trauma-Informed Care 6 pillars — inform PERSONA and session structure"
    - "Phase-based trauma treatment model (Herman, 1992) — defines scope boundary"
    - "DBT grounding and stabilisation techniques — inform technique library (FR-07)"
    - "TF-CBT psychoeducation components — inform FR-06 and FR-08"

# ── Risk Classification (RC-01) ───────────────────────────────────────────────
risk:
  initial_classification: high   # Agent-proposed
  confirmed_classification: medium  # Risk Officer override 2026-03-14
  rationale: |
    Agent proposed HIGH; Risk Officer overrode to MEDIUM. AC-01 LIMITED tier reduces
    regulatory exposure (no Annex III obligations). Prompt-only deliverable limits
    operational blast radius. User harm and data sensitivity addressed through design
    controls (crisis detection, DHR-01 to DHR-04) rather than elevated governance intensity.
  dimensions:
    user_harm: high         # Crisis failure = potential irreversible harm — mitigated by design
    data_sensitivity: high  # Mental health disclosures = GDPR Art. 9 special category
    reputational: medium    # Misrepresentation risk mitigated by mandatory disclaimer
    legal_regulatory: medium # AC-01 LIMITED — GPAI obligations only, no conformity assessment
    operational: low        # Prompt-only; no backend infrastructure
    reversibility: low      # Harm from crisis-escalation failure may not be reversible

# ── AI Classification (AC-01) ─────────────────────────────────────────────────
ai:
  component_involved: true
  proposed_risk_tier: limited
  risk_tier: limited         # Confirmed by AGL 2026-03-14 — Annex III point 5 not applicable
  eu_ai_act_applicable: true
  rationale: |
    Agent-proposed tier: limited (GPAI / general-purpose AI transparency obligations apply).
    Rationale: The prompt is a psychoeducation and emotional support tool, not a clinical
    decision system. It does not diagnose, prescribe, or make autonomous health decisions.
    It is positioned as a self-help/psychoeducation tool (analogous to a mental health app
    providing CBT exercises), which typically falls under GPAI obligations rather than
    Annex III high-risk classification.

    However: health-adjacent use with vulnerable populations is a significant flag.
    AGL must review whether the "health sector" provision of Annex III, point 5 applies
    and whether any prohibited-practice provisions (Art. 5 — exploitation of vulnerability)
    are relevant to prompt framing.

    Pending AGL determination — defaulting to limited; may escalate to high.
  gpai_obligations:
    transparency: true       # Users must know they are interacting with an AI
    capability_disclosure: true

# ── Data Classification (SC-04) ───────────────────────────────────────────────
data:
  classification: restricted
  pii_involved: true
  special_category_data: true
  special_category_basis: "Mental health information — GDPR Art. 9(1)"
  processing_activities:
    - "User discloses trauma experiences, symptoms, and emotional state in session"
    - "Session state schema records mood scores, themes, and safety flags in-context"
    - "No persistent storage — data lives only in the LLM context window"
  data_handling_requirements:
    - "Prompt must advise users at session open not to share identifying information"
    - "Prompt must remind users that LLM conversations may be retained by the provider"
    - "No session data should be logged or exported by the prompt itself"
    - "Safety flags must be treated as most sensitive — never trivialised in responses"

