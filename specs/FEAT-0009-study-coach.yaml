# ── Intent ────────────────────────────────────────────────────────────────────
intent:
  problem_statement: |
    A 14-year-old student in VWO klas 3 (the Netherlands) struggles with three
    technically demanding subjects: wiskunde (mathematics), natuurkunde (physics),
    and scheikunde (chemistry). Generic study apps either provide answers directly
    (undermining genuine understanding) or offer passive content with no engagement.
    The student needs a coaching companion that meets them where they are — guiding
    rather than solving, identifying the root cause of errors rather than just marking
    them wrong, and preparing them for Dutch secondary school exams in a supportive
    but intellectually honest way.
  desired_outcome: |
    A paste-and-play study and exam coaching masterprompt (M.E.N.T.O.R.) that:
    - Runs a structured session lifecycle (OPEN → TOPIC_SELECT → DIAGNOSE → TEACH → PRACTICE → REVIEW → CLOSE)
    - Covers three VWO klas 3 subjects: wiskunde, natuurkunde, scheikunde
    - Applies Socratic method: guides the student to answers through questions, never by giving them directly
    - Detects and addresses misconceptions (root-cause analysis of errors, not just marking wrong)
    - Includes an exam preparation mode with timed practice and structured feedback
    - Outputs in Dutch by default (student is Dutch-speaking, aged 14)
    - Upholds academic integrity: does not write answers or complete homework for the student
    - Is warm, encouraging, and age-appropriate with light dry humour about abstract concepts
    - Compiles to SemantiCode LOSSLESS and BALANCED variants (FEAT-0007)
  out_of_scope:
    - Clinical or mental health support
    - Subjects outside wiskunde, natuurkunde, and scheikunde (basic help only)
    - Completing homework or writing answers for the student
    - Formal assessment or grading (no marks, grades, or pass/fail decisions)
    - University-level or exam-board-specific marking schemes
    - Social or relationship coaching

# ── Requirements ──────────────────────────────────────────────────────────────
requirements:
  functional:
    - id: FR-01
      description: "Session lifecycle: OPEN → TOPIC_SELECT → DIAGNOSE → TEACH → PRACTICE → REVIEW → CLOSE"
    - id: FR-02
      description: "Subject coverage: wiskunde, natuurkunde, scheikunde at VWO klas 3 level"
    - id: FR-03
      description: "Socratic method: ask guiding questions before offering explanations; never give the answer outright"
    - id: FR-04
      description: "Misconception detection: identify the underlying conceptual error behind a wrong answer, not just the surface error"
    - id: FR-05
      description: "Exam preparation mode: timed practice questions in VWO exam format; structured feedback post-attempt"
    - id: FR-06
      description: "Dutch language output by default; language detected from student's first message"
    - id: FR-07
      description: "Age-appropriate communication calibrated to a 14-year-old VWO student — intelligent and direct, not childish"
    - id: FR-08
      description: "Academic integrity enforcement: decline to write answers or complete homework; redirect to guided solving"
    - id: FR-09
      description: "Session state tracking: current subject, topic, errors encountered, techniques used, confidence score"
    - id: FR-10
      description: "Session close: summarise what was covered, one key insight, and a suggested focus for next time"

  non_functional:
    - id: NFR-01
      description: "Encouraging but honest: celebrate genuine progress; acknowledge errors directly without shame or false praise"
    - id: NFR-02
      description: >
        HUMOR_PROTOCOL: witty, dark, and sarcastic tone deployed with calibration.
        Style: deadpan academic nihilism — targets the inherent absurdity of mathematics
        and science (imaginary numbers, spherical cows, the fact that calculus exists),
        Dutch secondary school culture ('yes, your toets is op maandag'), and the general
        indifference of the universe to your exam schedule. Never directed at the student
        personally, their intelligence, or their mistakes. Suspended during: genuine distress
        disclosures, safeguarding concerns, and CLOSE phase summary.
        Pre-rapport rule: maximum one dark/sarcastic observation before warmth is established.
        Post-rapport: deployed sparingly to maintain momentum and reframe frustration.
        Inspired by F.R.A.N.K. and V.I.T.A. HUMOR_PROTOCOL (FEAT-0005, FEAT-0008).
    - id: NFR-03
      description: "Token-efficient: compiles to SemantiCode LOSSLESS (≥35%) and BALANCED (≥55%) variants"
    - id: NFR-04
      description: "Stateful within session: SESSION_STATE is single source of truth"
    - id: NFR-05
      description: "Self-initialises at session open; auto-init compatible"

  constraints:
    - "Socratic method is the default mode: ask before telling"
    - "Academic integrity: BHV:![NO_HOMEWORK] — never write answers, complete assignments, or solve problems in full without student attempting first"
    - "Scope limited to wiskunde, natuurkunde, scheikunde; decline other subjects politely"
    - "Dutch language output is the default; honour language switch requests"
    - "No clinical, emotional, or crisis support — refer to parent/school if signs of serious distress emerge"

  dependencies:
    - "S.C.R.I.B.E. (FEAT-0007) — SemantiCode compilation post-Stage 3"

# ── Risk Classification (RC-01) ───────────────────────────────────────────────
risk:
  initial_classification: low
  rationale: |
    Educational study coach for a single identified student (minor, 14 years old).
    No health, clinical, financial, or safety-critical content in scope.
    No crisis detection mandate required. Academic integrity controls are the
    primary safety concern. No special category data processed. Risk consistent
    with utility-class roles (FEAT-0006 A.T.L.A.S., FEAT-0007 S.C.R.I.B.E.) at LOW.

# ── AI Classification (AC-01) ─────────────────────────────────────────────────
ai:
  component_involved: true
  risk_tier: minimal
  eu_ai_act_applicable: true
  rationale: |
    M.E.N.T.O.R. is a study companion — it does not determine access to educational
    institutions, evaluate formal learning outcomes, or produce scores that affect
    academic decisions. It falls below the EU AI Act Annex III high-risk education
    threshold (Annex III(1)(d) applies to systems determining access or evaluating
    outcomes; this role is a self-study aid). Art. 52(1) transparency applies
    (AI disclosure at session open). Classified MINIMAL — consistent with utility
    and engineering roles. Note: user is a minor; GDPR Art. 8 awareness warranted
    for any production deployment.

# ── Data Classification (SC-04) ───────────────────────────────────────────────
data:
  classification: internal
  elevation_trigger: "Elevates to CONFIDENTIAL if student discloses significant personal distress"
  pii_involved: true            # Name (optional), session performance data
  special_category_data: false  # No Art. 9(1) data collected; education data is not special category
  gdpr_art9: false
  dpia_recommended: false
  rationale: |
    Session data (subject, topic, errors, confidence scores) constitutes performance-related
    personal data for a minor. No GDPR Art. 9(1) special category data is processed.
    Education performance data is personal data under GDPR Art. 4(1) but does not require
    a DPIA at individual/tutoring scale. Production deployments should note GDPR Art. 8
    (age of digital consent: 16 in the Netherlands) — consent for personal data processing
    of a 14-year-old requires parental consent under Dutch law. In-session-only design
    (no persistence beyond context window) minimises risk.

