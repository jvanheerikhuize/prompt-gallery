# ── Intent ────────────────────────────────────────────────────────────────────
intent:
  problem_statement: |
    The library has no social-deduction or mystery genre entertainment role.
    T.A.G. covers dungeon-crawl text adventure but a murder mystery game master
    requires a fundamentally different state model: hidden information, NPC deception
    management, and a win condition based on deduction rather than exploration or survival.

  desired_outcome: |
    A self-contained masterprompt (D.I.C.E.) that generates a unique, internally
    consistent murder case at every session start, tracks a hidden TRUTH_RECORD,
    plays all NPCs with per-character deception and knowledge boundaries, and issues
    a VERDICT when the player files an ACCUSATION. Tone is dry, witty, sarcastic
    Infocom-style narration. Output language mirrors the player's input language.

  out_of_scope:
    - Multiplayer or multi-session continuity
    - Real-world persons as characters
    - Graphic gore (implied violence only)
    - External tools, APIs, or infrastructure

# ── Requirements ──────────────────────────────────────────────────────────────
requirements:
  functional:
    - id: FR-01
      description: "Generate a unique, internally consistent murder case at every session start (victim, suspects ×3-5, motive, means, opportunity, timeline, red herrings ×1-2)"
    - id: FR-02
      description: "Maintain a hidden TRUTH_RECORD (true killer, true motive, true means, true timeline) that is set at case generation and never directly disclosed to the player"
    - id: FR-03
      description: "Track per-suspect STATE including: alibi, knowledge_of_truth, deception_level, disposition_toward_player, and what they will reveal under pressure"
    - id: FR-04
      description: "Respond to player commands: EXAMINE [location/object], INTERROGATE [suspect], REVIEW NOTES, ACCUSE [suspect] OF [crime] WITH [evidence]"
    - id: FR-05
      description: "Issue a VERDICT block when ACCUSATION is filed: correct (case solved) or wrong (case continues or game over)"
    - id: FR-06
      description: "Adapt output language to match the player's input language (CNST:LANGUAGE_MIRROR)"
    - id: FR-07
      description: "Apply HUMOR_PROTOCOL: dry, witty, sarcastic narrator voice in the style of classic Infocom text adventures"
  non_functional:
    - id: NFR-01
      description: "Stateful: full STATE_SCHEMA tracking case facts, discovered clues, suspect states, player notes, and turn count"
    - id: NFR-02
      description: "Tone: direct, balanced verbosity — atmospheric description without padding; wit deployed via narrator voice not NPC dialogue"
    - id: NFR-03
      description: "Self-initialising: generates and presents the opening scene without player input"
    - id: NFR-04
      description: "Consistent NPC behaviour: suspects give answers consistent with their knowledge_of_truth and deception_level across multiple interrogations"
    - id: NFR-05
      description: "Adult themes in scope: dark humour, deception, implied violence — no graphic gore"

  constraints:
    - "No real-world persons as characters"
    - "Implied violence only — no graphic description of injuries"
    - "Language mirrors player input — no fixed output language"
    - "No external tools or infrastructure required"
    - "Case truth locked at generation — cannot be retconned by player pressure"

  dependencies:
    - "T.A.G. (FEAT-0001/0002) — entertainment role standard for this library"

# ── Risk Classification (RC-01) ───────────────────────────────────────────────
risk:
  initial_classification: low
  rationale: |
    Entertainment game role. No personal data, no health content, no minors-specific
    targeting, no safety-critical decisions. Adult themes (dark humour, implied murder)
    are within normal creative fiction scope. Low risk.

# ── AI Classification (AC-01) ─────────────────────────────────────────────────
ai:
  component_involved: true
  risk_tier: minimal
  eu_ai_act_applicable: true
  rationale: |
    LLM-powered game master for a text-based mystery game. No autonomous decisions
    with real-world impact on persons. No Annex III categories apply. Minimal tier.

# ── Data Classification (SC-04) ───────────────────────────────────────────────
data:
  classification: public
  pii_involved: false
  special_category_data: false
  rationale: |
    Player input is game commands and fictional dialogue. No personal data collected
    or processed. Public classification appropriate.

# ── Communication Style ────────────────────────────────────────────────────────
communication_style:
  tone: direct
  humor: dry/witty/sarcastic
  verbosity: balanced
  persona_notes: |
    Classic Infocom narrator voice: precise atmospheric description, dry wit, sarcastic
    asides. The narrator knows everything and is faintly amused that you don't.
    Wit deployed through narration, not through NPCs breaking character.
    Language mirrors the player — if the player writes Dutch, the case is Dutch.

