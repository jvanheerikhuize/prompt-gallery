# =============================================================================
# Feature Specification Template (QC-01 output)
# =============================================================================
# Generated by the agent during Stage 1 (Intent Ingestion) from a Change Request.
# This is the source of truth for all subsequent stages.
#
# Schema: a-sdlc/schema/feature-spec.schema.json
#
# Usage:
#   - This file is produced by the agent — do not create it manually
#   - Agent saves it here after QC-01 completes
#   - Human reviews and approves before Stage 2 begins (RC-02)
# =============================================================================

meta:
  id: "FEAT-0000"
  title: ""
  status: draft              # draft | approved | in-progress | complete | cancelled
  created: ""                # ISO 8601
  last_updated: ""
  source_cr: "CR-0000"       # Change Request that triggered this spec
  stage_reached: 1           # Highest stage completed so far

provenance:
  created_by: ""             # Agent ID or human name
  reviewed_by: ""
  approved_by: ""
  approval_date: ""

# ── Intent ────────────────────────────────────────────────────────────────────
intent:
  problem_statement: |
    # Structured problem statement (refined from CR by agent)
  desired_outcome: |
    # Clear, measurable success criteria
  out_of_scope: []

# ── Requirements ──────────────────────────────────────────────────────────────
requirements:
  functional: []
  non_functional: []
  constraints: []
  dependencies: []

# ── Risk Classification (RC-01) ───────────────────────────────────────────────
risk:
  initial_classification: unknown   # low | medium | high | critical
  rationale: ""

# ── AI Classification (AC-01) ─────────────────────────────────────────────────
ai:
  component_involved: unknown       # true | false
  risk_tier: unknown                # minimal | limited | high | unacceptable
  eu_ai_act_applicable: unknown

# ── Data Classification (SC-04) ───────────────────────────────────────────────
data:
  classification: unknown           # public | internal | confidential | restricted
  pii_involved: unknown
  special_category_data: unknown

# ── Audit Trail ───────────────────────────────────────────────────────────────
audit:
  gc01_entry: ""                    # GC-01 audit log entry ID
  intent_audit_record: ""           # GC-05 record reference
