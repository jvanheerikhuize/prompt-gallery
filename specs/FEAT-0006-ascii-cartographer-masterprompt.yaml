# ── Governance Classification ─────────────────────────────────────────────────
governance:
  risk_tier: low
  ai_tier: minimal
  data_classification: public    # Conditional personal data if private locations provided
  eu_ai_act_tier: minimal
  gdpr_special_category: false

# ── Intent ────────────────────────────────────────────────────────────────────
intent:
  problem_statement: |
    Visualising the spatial relationship between a set of geographic or grid
    coordinates is a common need with few frictionless options. Dedicated GIS
    tools are heavyweight; graphing libraries require code; asking an LLM to
    "draw a map" typically produces imprecise, ad-hoc ASCII scribbles with no
    respect for actual proportional distances.

  desired_outcome: |
    A self-contained masterprompt that takes coordinates as input and produces
    a proportionally accurate, clearly labelled top-view ASCII map as output —
    consistently, with scale bar, compass rose, legend, and edge coordinate labels.

    A.T.L.A.S.: ASCII Topographic Layout and Surveying System.

  out_of_scope:
    - Real terrain data (elevation, land cover, road networks)
    - Map tile rendering or satellite imagery
    - Routing or distance calculation services
    - UTM / MGRS / OS Grid coordinate conversion (v1.0)
    - Multi-layer map composition
    - Projection systems beyond equirectangular (v1.0)
    - Maps spanning > ~1000 km (distortion becomes significant)
    - Multi-turn session management or console commands

# ── Requirements ──────────────────────────────────────────────────────────────
requirements:
  functional:
    - {id: FR-01, title: "Cartographer Persona — A.T.L.A.S.", priority: must}
    - {id: FR-02, title: "Coordinate Input Parsing (WGS84 + abstract grid)", priority: must}
    - {id: FR-03, title: "Bounding Box Computation with margin", priority: must}
    - {id: FR-04, title: "Proportional ASCII Grid Rendering", priority: must}
    - {id: FR-05, title: "POI Symbol Placement and Labelling with collision detection", priority: must}
    - {id: FR-06, title: "Compass Rose (or axis labels for abstract coordinates)", priority: must}
    - {id: FR-07, title: "Scale Bar with distance units", priority: must}
    - {id: FR-08, title: "Edge Coordinate Labels", priority: must}
    - {id: FR-09, title: "Map Legend with POI list and metadata", priority: must}
    - {id: FR-10, title: "Density / Resolution Control (compact / standard / detailed)", priority: should}
    - {id: FR-11, title: "Input Validation and Error Handling", priority: must}
    - {id: FR-12, title: "Stateless Single-Task Protocol", priority: must}
    - {id: FR-13, title: "Area Boundary Polygon Input (any-shape vertex list)", priority: should}
    - {id: FR-14, title: "Interior / Exterior Mode Declaration", priority: should}
    - {id: FR-15, title: "Wall Rendering for Interior Maps (|, -, +, /, \\)", priority: should}

  non_functional:
    - {id: NFR-01, title: "Proportional Precision (±1 character)", priority: must}
    - {id: NFR-02, title: "Output Purity — 7-bit ASCII", priority: must}
    - {id: NFR-03, title: "Portability — LLM Agnostic", priority: must}
    - {id: NFR-04, title: "Output Determinism", priority: must}
    - {id: NFR-05, title: "Data Notice — Location Privacy", priority: should}

  constraints:
    - "Stateless: no session state, no multi-turn lifecycle"
    - "Output is pure 7-bit ASCII"
    - "No external APIs or map tile fetching"
    - "Equirectangular projection for geographic coordinates (small areas)"
    - "MVC/XML structure consistent with repository convention"

# ── Conflict Resolutions ──────────────────────────────────────────────────────
conflict_resolutions:
  CONF-01: "OPT-C — Proportional accuracy within ASCII grid; sub-character precision documented in metadata; warn on below-resolution inputs"
  CONF-02: "OPT-A — Plot user-provided coordinates only; no inferred geography in v1.0"
  CONF-03: "OPT-C — Unparseable input: structured error; ambiguous: state interpretation then render; known locations: apply LLM world knowledge, state coordinates used"
  CONF-04: "OPT-C — 7-bit ASCII only for v1.0; Unicode variant deferred to v2.0"
  CONF-05: "OPT-B — Orthogonal walls (|, -, +) plus 45° diagonals (/, \\); non-45° angles approximated as stepped orthogonal segments; metadata notes approximations"
  CONF-06: "OPT-C — Boundary polygon present → INTERIOR mode (solid walls) by default; no boundary → EXTERIOR (open grid); user may override explicitly"

