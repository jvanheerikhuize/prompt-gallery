  risk_tier: low
  ai_tier: minimal
  data_classification: public    # Conditional internal if input prompt contains PII
  eu_ai_act_tier: minimal
  gdpr_special_category: false

# ── Intent ────────────────────────────────────────────────────────────────────
intent:
  problem_statement: |
    Masterprompts in this repository are rich, verbose, and human-readable by
    design. This is ideal for authoring and review but expensive at inference time:
    long system prompts consume large portions of a model's context window and
    significantly increase per-request token cost.

    There is no current mechanism to translate a fully specified MVC masterprompt
    into a compact, machine-optimised form that retains all its semantic fidelity.
    Practitioners must choose between a verbose, expensive system prompt and a
    manually abbreviated one that likely loses nuance.

  desired_outcome: |
    A self-contained masterprompt (S.C.R.I.B.E.) that receives any MVC-structured
    prompt as input and outputs a SemantiCode logic stream. The SemantiCode:
      - Is token-efficient (≥35% reduction in LOSSLESS mode)
      - Retains full semantic fidelity (no behavioural changes under any capable LLM)
      - Follows a defined, versioned SemantiCode notation grammar (v1.0)
      - Is human-inspectable by an experienced practitioner
      - Includes an orientation header enabling any capable LLM to parse it

    S.C.R.I.B.E.: Semantic Compression and Reasoning-Informed Brevity Encoder.

  out_of_scope:
    - Decompilation (reconstructing original prompt from SemantiCode) — v1.0
    - Binary or machine-code format output
    - Automated semantic fidelity testing against a live LLM
    - Multi-language support (English-language prompts only, v1.0)
    - Prompt optimisation or logic rewriting beyond compression
    - SemantiCode execution / interpretation
    - Batch compilation of multiple prompts in a single request
    - Diff/patch output

# ── Requirements ──────────────────────────────────────────────────────────────
requirements:
  functional:
    - {id: FR-01, title: "Compiler Persona — S.C.R.I.B.E.", priority: must}
    - {id: FR-02, title: "MVC Prompt Parser (MODEL / VIEW / CONTROLLER)", priority: must}
    - {id: FR-03, title: "Semantic Extraction to Normalised Intermediate Representation", priority: must}
    - {id: FR-04, title: "SemantiCode Logic Stream Compilation", priority: must}
    - {id: FR-05, title: "Compression Level Control (LOSSLESS / BALANCED / AGGRESSIVE)", priority: must}
    - {id: FR-06, title: "SemantiCode Orientation Header", priority: must}
    - {id: FR-07, title: "Compression Ratio Reporting", priority: must}
    - {id: FR-08, title: "Semantic Fidelity Validation with FIDELITY_WARNING", priority: must}
    - {id: FR-09, title: "Input Validation and Error Handling", priority: must}
    - {id: FR-10, title: "Non-MVC Input Handling (best-effort, INFERRED_STRUCTURE)", priority: should}
    - {id: FR-11, title: "Annotation Mode (inline comments, // notation)", priority: should}
    - {id: FR-12, title: "Stateless Single-Task Protocol", priority: must}

  non_functional:
    - {id: NFR-01, title: "Compression Ratio Targets (≥35% / ≥55% / ≥70%)", priority: must}
    - {id: NFR-02, title: "Semantic Fidelity — Behavioural Equivalence", priority: must}
    - {id: NFR-03, title: "LLM Agnostic Executability", priority: must}
    - {id: NFR-04, title: "Deterministic Output", priority: must}
    - {id: NFR-05, title: "Human Inspectability (LOSSLESS / BALANCED modes)", priority: should}
    - {id: NFR-06, title: "SemantiCode Format Versioning (v1, v2, ...)", priority: must}

  constraints:
    - "Stateless: no session state, no multi-turn lifecycle"
    - "Input format: MVC/XML-structured prompt (canonical); non-MVC handled best-effort"
    - "No external APIs or model calls during compilation"
    - "LOSSLESS mode is the default; lossy modes require explicit opt-in"
    - "SemantiCode notation is versioned (v1.0); grammar defined in Stage 2"
    - "MVC/XML structure consistent with repository convention"

# ── Conflict Resolutions ──────────────────────────────────────────────────────
conflict_resolutions:
  CONF-01: "OPT-C — Three graduated modes (LOSSLESS / BALANCED / AGGRESSIVE); LOSSLESS default honours fidelity requirement; lossy modes require explicit opt-in"
  CONF-02: "OPT-C — Abbreviated but interpretable notation (BHV:, CNST:, OUT:, +/!/~/→); human-inspectable with grammar key; ANNOTATED mode for full readability"
  CONF-03: "OPT-C — Completely unstructured input → ERROR with guidance; partial/non-MVC → WARNING + best-effort parse with INFERRED_STRUCTURE flag"
  CONF-04: "OPT-C — Major versioning only (v1, v2); orientation header always declares version; self-describing grammar key enables LLMs to execute any version"
  CONF-05: "OPT-C — AGGRESSIVE mode allowed with capability advisory in metadata: 'validated for GPT-4 class / Claude Sonnet class and above'"

