# ── Intent ────────────────────────────────────────────────────────────────────
intent:
  problem_statement: |
    Users seeking lifestyle improvement lack access to structured, non-judgmental
    coaching that meets them where they are. Licensed lifestyle coaching is
    expensive and inaccessible; generic wellness apps are prescriptive rather than
    collaborative. There is no self-contained LLM-agnostic prompt in this
    repository that covers holistic lifestyle coaching with evidence-based
    techniques, accountability structures, and the health-category safety
    infrastructure required for conversations that may surface mental health
    disclosures.
  desired_outcome: |
    A paste-and-play personal lifestyle coaching masterprompt (V.I.T.A.) that:
    - Runs a structured, phase-gated session lifecycle
    - Covers three lifestyle pillars: Food, Activity, Mental Health
    - Applies motivational interviewing (OARS), CBT reframing, habit loop analysis,
      and positive psychology tools
    - Produces one micro-habit commitment and a concrete action plan per session
    - Includes mandatory crisis detection, safe messaging, and GDPR Art. 9 disclosure
    - Supports 7 languages with localised crisis resources
    - Compiles to SemantiCode LOSSLESS and BALANCED variants (FEAT-0007)
  out_of_scope:
    - Clinical diagnosis or psychiatric assessment
    - Medical advice, prescription, or treatment recommendations
    - Phase 2/3 trauma memory processing
    - Nutrition or exercise prescription (medical-grade)
    - Dietitian, personal trainer, or clinical psychologist services
    - Couples or group coaching (individual perspective only)

# ── Requirements ──────────────────────────────────────────────────────────────
requirements:
  functional:
    - id: FR-01
      description: "Session lifecycle: OPEN → CHECK_IN → FOCUS_AREA → EXPLORE → ACTION_PLAN → CLOSE"
    - id: FR-02
      description: "Three lifestyle pillars — Food, Activity, Mental Health — with 0–10 self-reported pillar scores at check-in"
    - id: FR-03
      description: "Single-pillar focus per session; user selects or agent recommends lowest-scored pillar"
    - id: FR-04
      description: "Motivational interviewing: OARS (Open questions, Affirmations, Reflective listening, Summaries)"
    - id: FR-05
      description: "CBT-informed cognitive reframing and thought-vs-fact distinction"
    - id: FR-06
      description: "Habit loop analysis: cue, routine, reward identification"
    - id: FR-07
      description: "Positive psychology tools: strength spotting, gratitude anchoring, growth-mindset reframe"
    - id: FR-08
      description: "Micro-habit commitment: one small, specific, achievable action agreed per session"
    - id: FR-09
      description: "Action plan output at session close with commitment, obstacle, and coping strategy"
    - id: FR-10
      description: "Mandatory crisis detection — first-person and third-person sentinels — before every operation"
    - id: FR-11
      description: "Safe messaging enforcement — non-bypassable BHV:! rule"
    - id: FR-12
      description: "GDPR Art. 9 notice at session open; full disclaimer on clinical expectation triggers"
    - id: FR-13
      description: "Multi-language support: en, nl, fr, de, es, pt, it + default; localised crisis resources"
    - id: FR-14
      description: "Mood check-in at open (0–10) and close; reflect delta at session end"

  non_functional:
    - id: NFR-01
      description: "Warm, energising, grounded persona — no toxic positivity; validates setbacks"
    - id: NFR-02
      description: "Ask permission before offering advice (MI principle — autonomy-supportive)"
    - id: NFR-03
      description: "Token-efficient: compiles to SemantiCode LOSSLESS (≥35%) and BALANCED (≥55%) variants"
    - id: NFR-04
      description: "Stateful within session; SESSION_STATE is single source of truth"
    - id: NFR-05
      description: "Self-initialises at session open; auto-init compatible"
    - id: NFR-06
      description: >
        HUMOR_PROTOCOL: dry, witty, sarcastic humor deployed with calibration.
        Wit targets the absurdity of modern lifestyle traps (doom scrolling, 'I'll start Monday'),
        never the user. Suspended automatically during: crisis disclosures, mental health
        discussion, distress elevation. Single-nudge pre-rapport rule (no wit before warmth
        is established). Post-rapport: deployed sparingly to maintain momentum and reframe
        resistance. Inspired by F.R.A.N.K. HUMOR_PROTOCOL (FEAT-0005).

  constraints:
    - "Phase lifecycle advances forward only; STABILISE and CLOSE phases cannot be skipped"
    - "CRISIS_DETECTION runs before every other operation without exception"
    - "Scope limited to lifestyle coaching — no clinical, medical, or therapeutic treatment"
    - "No unsolicited advice — permission asked before offering suggestions"

  dependencies:
    - "P.S.Y. (FEAT-0004) — reference implementation for health safety controls"
    - "F.R.A.N.K. (FEAT-0005) — reference for session lifecycle and multi-language patterns"
    - "S.C.R.I.B.E. (FEAT-0007) — SemantiCode compilation post-Stage 3"

# ── Risk Classification (RC-01) ───────────────────────────────────────────────
risk:
  initial_classification: medium
  rationale: |
    Health-adjacent role targeting users who may be in distress (burnout, poor sleep,
    social isolation). Lifestyle coaching conversations frequently surface mental health
    disclosures. Mandatory crisis detection and safe messaging apply. Not clinical
    (no diagnosis or treatment) which distinguishes it from high-risk; medium is
    consistent with P.S.Y. and F.R.A.N.K. as benchmark health-category peers.

# ── AI Classification (AC-01) ─────────────────────────────────────────────────
ai:
  component_involved: true
  risk_tier: limited
  eu_ai_act_applicable: true
  rationale: |
    Interacts with natural persons on health-adjacent topics (wellbeing, habits,
    emotional state). Lifestyle coaching conversations may surface mental health
    disclosures. Art. 52(1) transparency obligation applies (user must know they are
    interacting with an AI). Human oversight warranted. Consistent with P.S.Y. and
    F.R.A.N.K. as LIMITED tier benchmark health-category peers.

# ── Data Classification (SC-04) ───────────────────────────────────────────────
data:
  classification: confidential
  elevation_trigger: "Elevates to RESTRICTED on DV or clinical mental health disclosure"
  pii_involved: true
  special_category_data: true          # Art. 9(1) GDPR — Mental Health is a core pillar; health data collected in every session
  gdpr_art9: true
  dpia_recommended: true
  rationale: |
    With Mental Health as an explicit core pillar, GDPR Art. 9(1) health data is
    collected in every session (mental health self-assessment score 0–10, plus
    open exploration of mental health themes). This unconditionally engages Art. 9
    — not conditionally as in P.S.Y./F.R.A.N.K. Food and Activity pillar data are
    health-adjacent personal data. GDPR Art. 9 notice mandatory at session open.
    A DPIA is required for any production deployment under Art. 35.

