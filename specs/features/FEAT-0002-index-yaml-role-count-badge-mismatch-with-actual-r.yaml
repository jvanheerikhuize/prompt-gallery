metadata:
  id: FEAT-0002
  title: Index.yaml role count badge mismatch with actual role inventory
  version: 1.0.0
  status: draft
  priority: medium
  author: RSI Audit Agent
  created_at: "2026-04-12"
  updated_at: "2026-04-12"
  tags:
    - rsi-audit
    - functional
    - bug
description:
  summary: 'Automated audit finding: Index.yaml role count badge mismatch with actual role inventory'
  problem_statement: |-
    - The README displays a badge showing 20 roles, but counting the actual role directories reveals 20 roles. However, there's no automated validation that the index.yaml file accurately reflects the current role inventory, creating risk of stale metadata and broken automation.
    - The resolve.sh script appears to be a core utility for the repository but has no visible error handling for network failures, missing dependencies, or malformed YAML. This could lead to silent failures or partial role loading in automated systems.
  proposed_solution: |-
    - Add a validation script that counts actual role directories and compares against index.yaml entries. Include this check in any CI/CD pipeline or pre-commit hooks to ensure metadata consistency.
    - Add comprehensive error handling including network timeout handling, YAML validation, and dependency checks. Implement proper exit codes and logging for integration with CI/CD systems.
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: The index.yaml file(s) exist in the repository
    when: The changes from this spec are applied
    then: Add a validation script that counts actual role directories and compares against index.yaml entries. Include this check in any CI/CD pipeline or pre-commit hooks to ensure metadata consistency.
  - id: AC-002
    given: The resolve.sh file(s) exist in the repository
    when: The changes from this spec are applied
    then: Add comprehensive error handling including network timeout handling, YAML validation, and dependency checks. Implement proper exit codes and logging for integration with CI/CD systems.
technical_notes: 'Files affected: README.md, index.yaml, resolve.sh, roles/'
testing_requirements:
  unit_tests: true
  integration_tests: false
  e2e_tests: false
  performance_tests: false
  test_scenarios:
