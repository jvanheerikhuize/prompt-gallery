metadata:
  id: FEAT-0003
  title: Missing contribution guidelines for role quality and safety standards
  version: 1.0.0
  status: draft
  priority: medium
  author: RSI Audit Agent
  created_at: "2026-04-12"
  updated_at: "2026-04-12"
  tags:
