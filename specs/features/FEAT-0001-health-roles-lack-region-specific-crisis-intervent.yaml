description:
  summary: 'Automated audit finding: Health roles lack region-specific crisis intervention safeguards'
  problem_statement: '- The health roles (P.S.Y., F.R.A.N.K., V.I.T.A., P.A.P.A.) contain hardcoded crisis line numbers and safety protocols that may not be appropriate for all geographic regions where these roles are deployed. The README acknowledges this need but doesn''t provide a systematic solution for regional customization or validation.'
  proposed_solution: '- Create a configuration system or template variables for region-specific crisis resources. Add validation scripts to ensure crisis line numbers are current and region-appropriate before deployment. Consider adding geolocation-based safety resource selection.'
  out_of_scope:
    - Changes unrelated to the identified findings
  dependencies: []
technical_requirements:
  constraints: []
  security: []
acceptance_criteria:
  - id: AC-001
    given: The roles/health/psy file(s) exist in the repository
    when: The changes from this spec are applied
    then: Create a configuration system or template variables for region-specific crisis resources. Add validation scripts to ensure crisis line numbers are current and region-appropriate before deployment. Consider adding geolocation-based safety resource selection.
technical_notes: 'Files affected: README.md, roles/health/frank, roles/health/papa, roles/health/psy, roles/health/vita'
testing_requirements:
  unit_tests: true
  integration_tests: false
  e2e_tests: false
  performance_tests: false
