metadata:
  id: FEAT-0001
  title: Health roles lack region-specific crisis intervention safeguards
  version: 1.0.0
  status: draft
  priority: high
  author: RSI Audit Agent
  created_at: "2026-04-12"
  updated_at: "2026-04-12"
  tags:
