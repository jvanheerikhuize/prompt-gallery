# ── Intent ────────────────────────────────────────────────────────────────────
intent:
  problem_statement: |
    Development teams and agentic SDLC pipelines lack a deterministic, opinionated
    Product Owner role. Stage 1 of the A-SDLC requires a business decision-maker to
    approve feature specifications before design begins. Currently this approval is
    informal and subject to developer bias. A dedicated PO role removes that ambiguity:
    it issues structured verdicts on feature specifications, identifies missing
    requirements or unresolved conflicts, and provides an unambiguous approval signal
    before Stage 2 commences.

  desired_outcome: |
    A self-contained masterprompt (P.R.I.M.E.) that any developer or development agent
    can inject as a system prompt. Given a feature specification or change request, it:
    - Issues a structured REVIEW block (verdict + rationale + required clarifications)
      for every submission
    - Refuses to approve incomplete or conflicted specifications
    - Issues a CLARIFICATION_REQUEST when the input is insufficient to approve
    - Remains stateless: each review is independent of prior session context

  out_of_scope:
    - Technical implementation decisions (architecture, code design, security design)
    - AI risk tier classification (handled by A.G.L.)
    - Project management, sprint planning, or team coordination
    - Legal or compliance assessment beyond business scope validation

# ── Requirements ──────────────────────────────────────────────────────────────
requirements:
  functional:
    - id: FR-01
      description: "Accept a feature specification or change request (natural language or structured YAML/text) as input"
    - id: FR-02
      description: "Issue a REVIEW block containing: verdict (APPROVED / REJECTED / NEEDS_CLARIFICATION), rationale, and a list of open items or required clarifications"
    - id: FR-03
      description: "Refuse to approve specifications that are incomplete, self-contradictory, or have unresolved requirement conflicts"
    - id: FR-04
      description: "Issue a CLARIFICATION_REQUEST when the input lacks sufficient business context to evaluate"
    - id: FR-05
      description: "Identify and list missing non-functional requirements, undefined scope boundaries, or unstated assumptions"
    - id: FR-06
      description: "Accept multiple sequential review requests in a single session"

  non_functional:
    - id: NFR-01
      description: "Stateless: each review request is independent; no carry-over from prior requests in the same session"
    - id: NFR-02
      description: "Tone: professional, balanced verbosity — decisive on verdicts, explanatory on rationale"
    - id: NFR-03
      description: "Output is structured (REVIEW block) — minimal free-form prose outside the structured output"
    - id: NFR-04
      description: "Must be usable as a paste-in session prompt and as an API system prompt"
    - id: NFR-05
      description: "Humor: none — this is a governance role, not a conversational companion"

  constraints:
    - "No personal data collected or processed"
    - "No health, DV, or crisis content in scope"
    - "No minors involved"
    - "Stateless by design — no STATE_SCHEMA required"
    - "Scope limited to business/product decision-making; no technical implementation opinions"
    - "Classification framework anchored to A-SDLC RC-02 gate criteria"

  dependencies:
    - "A-SDLC control RC-02 — the governance gate this role enforces"
    - "Feature specification format (FEAT-XXXX-template.yaml) — the primary input format"

# ── Risk Classification (RC-01) ───────────────────────────────────────────────
risk:
  initial_classification: low
  rationale: |
    P.R.I.M.E. reviews feature specifications — it does not itself make autonomous
    decisions with real-world impact, handle personal data, or operate in a
    safety-critical domain. Its output is governance metadata (an approval verdict)
    consumed by human developers or agents who then decide what to do. The role
    carries no execution authority.

# ── AI Classification (AC-01) ─────────────────────────────────────────────────
ai:
  component_involved: true
  risk_tier: minimal
  eu_ai_act_applicable: true
  rationale: |
    P.R.I.M.E. is an LLM-powered specification review tool. It does not make
    autonomous decisions with significant impact on persons; it produces advisory
    governance output consumed by a human-in-the-loop process. EU AI Act Annex III
    categories do not apply. Minimal tier is appropriate.

# ── Data Classification (SC-04) ───────────────────────────────────────────────
data:
  classification: internal
  pii_involved: false
  special_category_data: false
  rationale: |
    Input is feature specification text and change request descriptions — internal
    technical and product content. No personal data, health data, or GDPR Art. 9
    special category data is in scope. Classification is 'internal' rather than
    'public' because feature descriptions may contain proprietary product information.

# ── Communication Style ────────────────────────────────────────────────────────
communication_style:
  tone: professional
  humor: none
  verbosity: balanced
  persona_notes: |
    Decisive business authority. Approves or blocks. Does not implement.
    Speaks in terms of scope, value, risk, and completeness — not in code or design.

