# ── Intent ────────────────────────────────────────────────────────────────────
intent:
  problem_statement: |
    The v2.1 masterprompt delivers a correct core game loop but lacks simulation
    layers that make a text adventure feel alive, tactical, and consequential:

    - All locations feel environmentally identical: there is no weather, no temperature,
      no atmospheric variation. A storm-wracked mountain and a sunlit meadow produce
      the same game mechanics.

    - Inventory is weightless: the player can carry an unlimited number of items with
      no trade-off, removing a classic category of adventure-game decisions.

    - NPCs have no structured dialogue: their first-meeting tone, their hostile dialogue,
      and their knowledge of specific topics are improvised by the LLM on each turn,
      producing inconsistent character voices across sessions.

    - There is no way to visualise the full world: the ASCII_MAP_BOT shows one room,
      but there is no map of how locations connect. Players cannot build a mental model
      of the world geography.

    - Factions exist as a flag on individual NPCs but carry no world-level weight.
      Killing a faction member has no persistent cross-NPC consequence structure.

    - Merchant NPCs are flagged in the schema but have no inventory or pricing.
      Trading is possible in narrative only, with no state to verify or persist.

    - Health recovery is undefined outside of discovering items. There is no rest
      mechanic, no safe room concept, no tie between recovery and the world clock.

    - Puzzles are implied by the scoring rules but have no formal representation in the
      STATE_SCHEMA. The hint command has no structured objective to point toward.

  desired_outcome: |
    A v2.2 prompt adding eleven game mechanics, each expressed entirely as STATE_SCHEMA
    additions and SESSION_RULES entries — no external infrastructure required.

    Measurable success criteria:
    1. Weather: each location has a weather block; fog, storm, and freezing conditions
       apply defined modifiers; weather updates are woven into step_narrative.
    2. Encumbrance: item weights and player.weight_capacity are tracked; exceeding
       capacity costs movement turns and blocks fleeing combat.
    3. NPC dialogue: every NPC has a dialogue object; greeting fires on first contact,
       hostile fires when relationship_score drops below threshold.
    4. Exit leads_to: every exit declares a leads_to location_id, enabling world graph
       traversal and the worldmap console command.
    5. Status effects: player.status_effects tracks active modifiers with duration;
       each status applies its modifier and decrements each turn.
    6. Faction reputation: world.factions map tracks reputation_score per faction;
       NPC responses are informed by the faction score, not just relationship_score.
    7. World Map Bot: worldmap console command renders all discovered locations as an
       ASCII connection graph; undiscovered locations are hidden.
    8. Economy: player.currency and merchant NPC inventory/prices enable item trading.
    9. Rest / recovery: rest action restores HP proportional to max_health; requires
       a safe location and costs turns; tied to world clock.
    10. Puzzle schema: world.puzzles entries link clues, solutions, and scoring;
        hint command references puzzle.clues[] for structured hints.
    11. musicprompt: console command outputs an ambient music prompt in a codeblock,
        consistent with imageprompt and videoprompt.

  out_of_scope:
    - Structural or architectural changes to the prompt skeleton (see FEAT-0002)
    - Multi-player or networked play
    - External APIs, server infrastructure, or image/video/music generation itself
    - Sub_quests schema and save_version field (handled in FEAT-0002 as A-07 / A-08)

# ── Requirements ──────────────────────────────────────────────────────────────
requirements:
  functional:
    - id: FR-01
      title: Weather System
      priority: must
      audit_ref: F-01
      description: >
        STATE_SCHEMA: Add a weather block to each location:
          "weather": {
            "condition": "<clear|rain|fog|storm|snow>",
            "visibility": "<full|reduced|poor|none>",
            "temperature": "<freezing|cold|mild|warm|hot>"
          }
        Add global weather to world.global_flags:
          "weather_global": {
            "condition": "<string>",
            "wind": "<calm|breeze|strong|gale>",
            "forecast": "<string — optional flavour>"
          }
        RULES_ENGINE additions:
          - Fog (visibility: poor|none): hidden items require an extra successful EXAMINE.
          - Storm (condition: storm): player takes 1 damage per turn while in an
            outdoor location (flag: outdoor: true).
          - Freezing (temperature: freezing): player.attack_power reduced by 2 while
            in a freezing location; modifier removed on leaving.
        CONTROLLER: weather updates every 8–16 turns or on narrative events;
        update location.weather and global_flags.weather_global; weave transition
        naturally into step_narrative.
        ASCII_MAP_BOT: display a W symbol in the top-right interior corner if
        location.weather.condition is not "clear".

    - id: FR-02
      title: Item Weight and Encumbrance
      priority: must
      audit_ref: F-02
      description: >
        STATE_SCHEMA: Add "weight": "<integer>" to every item object (inventory and
        world objects). Add to player:
          "weight_capacity": "<integer>",
          "weight_carried": 0
        RULES_ENGINE: Track weight_carried as the sum of all item weights in inventory.
        Update weight_carried in MODEL on every item pickup or drop.
        Encumbrance rule: if weight_carried > weight_capacity —
          - Movement costs 2 turns per location transition instead of 1.
          - Player cannot attempt to flee combat.
          - Narrate encumbrance state on the turn it is first exceeded or cleared.
        WORLD_GENERATION: assign weight values to items scaled to setting realism.

    - id: FR-03
      title: NPC Dialogue Trees
      priority: must
      audit_ref: F-03
      description: >
        STATE_SCHEMA: Add a dialogue object to every NPC entry:
          "dialogue": {
            "greeting": "<string — what NPC says when first encountered in session>",
            "hostile": "<string — what NPC says when relationship_score drops below 20>",
            "topics": {}
          }
        topics is a map of keyword → response string, populated during WORLD_GENERATION
        based on the NPC's role, faction, and knowledge of the world.
        RULES_ENGINE: Use dialogue.greeting the first time the player speaks to an NPC
        in a session (tracked via a flag "met": false → true). Use dialogue.hostile
        when relationship_score < 20. Standard NPC responses reference topics when
        the player's input matches a topic keyword.

    - id: FR-04
      title: Exit leads_to Field
      priority: must
      audit_ref: F-05
      description: >
        STATE_SCHEMA: Add "leads_to": "<location_id>" to every exit object in every
        location. The value must match a key in world.locations.
        WORLD_GENERATION: populate leads_to for all exits when building the world.
        This field is required by FEAT-0003/FR-07 (World Map Bot) and improves save
        portability by making world topology explicit rather than implicit in narrative.

    - id: FR-05
      title: Status Effects
      priority: must
      audit_ref: F-06
      description: >
        STATE_SCHEMA: Add to player:
          "status_effects": [
            {
              "id": "<string>",
              "name": "<string>",
              "turns_remaining": "<integer>",
              "modifier": "<string — human-readable description of effect>"
            }
          ]
        Core status effects (applied by items, combat, environment):
          - poisoned: lose 1 hp per turn; turns_remaining counts down each SESSION_LOOP.
          - blessed: +5 to attack_power for duration.
          - cursed: -5 to defense for duration.
          - stunned: cannot act offensively this turn; clears after 1 turn.
          - encumbered: (auto-applied by FR-02 weight rule when over capacity).
        RULES_ENGINE: At step 4 (UPDATE_MODEL), apply each active status_effect modifier,
        decrement turns_remaining by 1, and remove effects where turns_remaining reaches 0.
        Narrate expiry naturally in step_narrative when a status effect clears.

    - id: FR-06
      title: Faction and Reputation System
      priority: must
      audit_ref: F-10
      description: >
        STATE_SCHEMA: Add to world:
          "factions": {
            "<faction_id>": {
              "name": "<string>",
              "reputation_score": "<integer 0-100>",
              "description": "<string>"
            }
          }
        NPCs already have flags.faction; link faction_id to a world.factions key.
        RULES_ENGINE:
          - Reputation score: 50 = neutral, 0-25 = hostile, 75-100 = allied.
          - Attacking a non-hostile NPC: reputation_score for their faction -10.
          - Killing a non-hostile NPC: reputation_score for their faction -25.
          - Completing a quest from a faction-aligned NPC: +15 to faction reputation.
          - NPC whose faction reputation is below 25 greets the player with dialogue.hostile
            even on first meeting, regardless of individual relationship_score.
        WORLD_GENERATION: generate 1–3 factions appropriate to the setting; assign
        every NPC to a faction; set initial reputation_score at 50.

    - id: FR-07
      title: World Map Bot
      priority: must
      audit_ref: F-07
      description: >
        CONSOLE_COMMANDS: Add worldmap command (tier: READ).
        Invokes WORLD_MAP_BOT in UTILS.
        WORLD_MAP_BOT rules:
          - Render only locations where a "discovered": true flag has been set.
          - Represent each discovered location as a labelled node: [location name]
          - Connect nodes with ASCII lines (─, │, ┼) based on exit direction.
          - Mark exits leading to undiscovered locations with a ? symbol.
          - Include a LEGEND below the graph defining node and connector symbols.
          - Present the entire output in a single code block.
          - If no locations have been discovered beyond the start, render start only.
        STATE_SCHEMA: Add "discovered": false to each location object; set to true
        on the player's first visit.
        Prerequisite: FR-04 (leads_to field) must be implemented.

    - id: FR-08
      title: Merchant and Economy System
      priority: should
      audit_ref: F-08
      description: >
        STATE_SCHEMA: Add to player: "currency": "<integer>".
        Add to NPC (when flags.merchant == true):
          "merchant_inventory": {
            "<item_id>": {
              "name": "<string>",
              "description": "<string>",
              "weight": "<integer>",
              "price": "<integer>",
              "stock": "<integer>"
            }
          }
        RULES_ENGINE — Trading:
          - Buy: player must be in same location as a living merchant with relationship_score ≥ 20.
            Deduct item.price from player.currency; add item to player inventory;
            decrement merchant stock by 1. Fail if currency insufficient or stock == 0.
          - Sell: player offers an item from inventory; merchant accepts portable items.
            Add floor(item.price × 0.5) to player.currency; remove item from inventory.
          - Fail gracefully: if relationship_score < 20, merchant refuses with dialogue.hostile.
        WORLD_GENERATION: at least one merchant NPC for Normal difficulty and above;
        merchant inventory contains 3–6 items appropriate to the setting.

    - id: FR-09
      title: Rest and Recovery
      priority: should
      audit_ref: F-09
      description: >
        STATE_SCHEMA: Add "safe": false to the location flags object.
        WORLD_GENERATION: mark at least one location as safe: true (e.g., a tavern,
        base camp, or safehouse appropriate to the setting).
        RULES_ENGINE — Rest action:
          - Valid only if player is in a location where flags.safe == true and
            player.is_alive == true and no hostile NPC is in the same location.
          - Costs 8 turns (= 2 world-clock hours at default turns_per_hour: 4).
          - Restores floor(player.max_health × 0.25) hit points, capped at max_health.
          - Clears status effects with id: poisoned (rest purges poison).
          - If the player attempts rest in an unsafe location or during combat,
            fail with a narrative reason ("You can't rest here — it's not safe.").

    - id: FR-10
      title: Puzzle Formalization
      priority: should
      audit_ref: F-13
      description: >
        STATE_SCHEMA: Add to world:
          "puzzles": {
            "<puzzle_id>": {
              "title": "<string>",
              "description": "<string>",
              "clues": ["<string>"],
              "solution_flags": {},
              "attempts": 0,
              "solved": false,
              "score_value": "<integer>"
            }
          }
        RULES_ENGINE:
          - When the player performs an action that satisfies solution_flags, set
            solved: true, append a scoring_ledger entry for score_value points,
            and narrate the solve moment.
          - Increment attempts on each failed puzzle interaction.
        Console / hint command: when the player requests a hint and a puzzle is
        active in the current location, pull the next undelivered clue from clues[].
        WORLD_GENERATION: generate 1–3 puzzles per world, each linked to a location
        and with score_value factored into max_score calculation (per FEAT-0002/FR-11).

    - id: FR-11
      title: musicprompt Console Command
      priority: could
      audit_ref: F-11
      description: >
        CONSOLE_COMMANDS: Add musicprompt command (tier: READ).
        Behaviour: generate a text prompt suitable for submission to a music or ambient
        sound generation tool, describing the current scene's mood, genre, tempo, and
        instrumentation cues based on the current location, time period, and active
        narrative tension.
        Output in a code block, consistent with imageprompt and videoprompt.
        The command generates a prompt only; no actual audio is produced.

  non_functional:
    - id: NFR-01
      title: Self-contained
      priority: must
      description: >
        All new mechanics must be expressible as STATE_SCHEMA additions and SESSION_RULES
        prose. No external APIs, tools, databases, or infrastructure may be required.
        The prompt must remain a single copy-pasteable file.

    - id: NFR-02
      title: LLM-agnostic compatibility
      priority: must
      description: >
        All new features must produce correct behaviour on Claude 3+, GPT-4+, and
        Gemini 1.5+. No model-specific APIs, tool calls, or structured output formats
        may be used.

    - id: NFR-03
      title: Compressed variant synchronisation
      priority: must
      description: >
        All STATE_SCHEMA additions and new SESSION_RULES must be reflected in
        prompt-compressed.md using the existing DSL notation. Functional equivalence
        between the two variants must be maintained.

    - id: NFR-04
      title: Savegame portability
      priority: must
      description: >
        All new STATE_SCHEMA fields must be present in the savegame JSON output.
        A save produced after this feature is implemented must be loadable in a new
        session with full state integrity including weather, status effects, factions,
        and puzzle state.

    - id: NFR-05
      title: No functional regression
      priority: must
      description: >
        All existing ATC-01 through ATC-04 acceptance tests must continue to pass.
        New features extend the game; they do not alter existing SESSION_RULES
        values, combat formulae, or scoring milestones.

  constraints:
    - "Prompt must remain a single copy-pasteable text file"
    - "Both prompt variants (verbose and compressed) must remain in sync"
    - "a-sdlc/ governance submodule is read-only"
    - "No LLM-specific API calls or features"
    - "All existing ATC acceptance tests must pass"

  dependencies:
    - "FEAT-0001 complete — v2.1 baseline must exist"
    - "FEAT-0002/FR-13 (sub_quests schema) and FEAT-0002/FR-14 (save_version) must
       be implemented before or alongside this feature to avoid schema conflicts"
    - "FR-04 (exit leads_to) is a hard prerequisite for FR-07 (World Map Bot)"
    - "FR-02 (item weight) must be implemented before FR-05 (status: encumbered)"

# ── Acceptance Criteria ────────────────────────────────────────────────────────
acceptance_criteria:
  - id: ATC-11
    title: Weather affects gameplay mechanics
    given: a game is running with a location in storm condition (outdoor: true)
    when: the player remains in the location for one turn
    then: player.health decreases by 1 and the step_narrative references the storm

  - id: ATC-12
    title: Encumbrance blocks fleeing
    given: player.weight_carried exceeds player.weight_capacity
    when: the player attempts to flee combat
    then: the flee attempt is rejected with a narrative reason referencing weight

  - id: ATC-13
    title: NPC dialogue fires on first meeting
    given: an NPC with a dialogue.greeting value and flags met == false
    when: the player speaks to the NPC for the first time
    then: the NPC responds with dialogue.greeting and met is set to true

  - id: ATC-14
    title: worldmap shows only discovered locations
    given: the player has visited 3 of 7 generated locations
    when: the player types ~ worldmap
    then: the output shows exactly 3 discovered nodes and ? symbols on exits to unknown

  - id: ATC-15
    title: Status effect expires correctly
    given: player has a poisoned status effect with turns_remaining == 2
    when: the player completes 2 more turns
    then: health decreases by 1 each turn and the effect is removed after the second turn

  - id: ATC-16
    title: Faction reputation propagates to NPC dialogue
    given: the player has killed an NPC belonging to faction "Iron Guard"
    when: the player approaches a second Iron Guard NPC (relationship_score 50)
    then: the NPC uses dialogue.hostile despite the individual relationship_score being neutral

  - id: ATC-17
    title: Rest restores health in a safe location
    given: player is in a location with flags.safe == true and has 50% health
    when: the player rests
    then: player.health increases by 25% of max_health (capped) and 8 turns pass

  - id: ATC-18
    title: Merchant trade updates currency and inventory
    given: a merchant NPC is present with an item priced at 10 and player.currency >= 10
    when: the player buys the item
    then: player.currency decreases by 10, item appears in player inventory,
      merchant stock decreases by 1

# ── Risk Classification (RC-01) ───────────────────────────────────────────────
risk:
  initial_classification: low
  rationale: |
    LOW: additive text edits to a standalone prompt file with no runtime dependencies.
    All new mechanics are prose rules and JSON schema additions. Fully reversible via git.
    No PII, no production systems, no external integrations. Solo project.

# ── AI Classification (AC-01) ─────────────────────────────────────────────────
ai:
  component_involved: true
  risk_tier: minimal
  eu_ai_act_applicable: true
  rationale: |
    This feature modifies a system prompt governing LLM behaviour — AI component confirmed.
    No change to risk tier from FEAT-0001: entertainment/creative tool, no Annex III
    domains, no unacceptable-risk indicators. Art. 52 transparency satisfied.

# ── Data Classification (SC-04) ───────────────────────────────────────────────
data:
  classification: public
  pii_involved: false
  special_category_data: false

# ── Gaps Flagged for Product Owner Review ─────────────────────────────────────
gaps:
  - id: GAP-03
    field: "requirements.functional.FR-08 (merchant economy)"
    severity: minor
    description: >
      The currency system requires a unit name (gold, credits, caps, etc.) that is
      appropriate to the setting. WORLD_GENERATION will generate one contextually, but
      a default unit for random games has not been specified. PO to confirm whether
      a neutral default ("coins") is acceptable or if it should always be setting-derived.

  - id: GAP-04
    field: "requirements.functional.FR-07 (World Map Bot ASCII rendering)"
    severity: minor
    description: >
      The World Map Bot uses box-drawing characters (─, │, ┼) for connections. These
      may not render correctly in all LLM output contexts or terminal fonts. PO to
      confirm whether a plain-ASCII fallback (-, |, +) should be specified as an
      alternative, or if box-drawing is acceptable given the target platforms.

