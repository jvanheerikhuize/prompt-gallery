# =============================================================================
# A-SDLC Consumer Project Manifest
# =============================================================================
# Edit this file to configure your project.
# Agents load this file at session start to understand project context.
# =============================================================================

project:
  id: "A-SDLC-AGENTROLE-DEFINITIONS-MODULE"              # Unique project identifier (e.g. PRJ-0001)
  name: "A-SDLC-AGENTROLE-DEFINITIONS-MODULE"            # Human-readable project name
  description: |
    Module repository of structured agent-role masterprompts. Each prompt is self-contained
    and assigns a specific role to any LLM (game master, code reviewer, psychologist, etc.).
    Consumed as a git submodule or direct reference in agentic projects.
  status: active                   # active | paused | archived

  # ── Team ──────────────────────────────────────────────────────────────────
  team:
    product_owner: "Jerry van Heerikhuize"
    security_architect: "Jerry van Heerikhuize"
    tech_lead: "Jerry van Heerikhuize"
    contact: "jvanheerikhuize@gmail.com"

  # ── Stack ─────────────────────────────────────────────────────────────────
  # Describe the technology stack — agents use this for language-specific guidance
  stack:
    languages: [prompt, markdown]
    frameworks: []
    runtime: [agent-prompt]
    databases: []
    cloud: []
    ci_cd: []

  # ── AI Components ─────────────────────────────────────────────────────────
  # Required for AC-01 (AI Risk Classification) in Stage 1
  ai_component_involved: true
  ai_risk_tier: minimal
                                   # Determined during Stage 1 → AC-01

  # ── Regulatory Scope ──────────────────────────────────────────────────────
  regulatory_scope:
    dora_applicable: true
    eu_ai_act_applicable: true
    other: []                      # Other applicable frameworks

# ── Governance ──────────────────────────────────────────────────────────────
governance:
  framework: a-sdlc
  framework_version: "1.0"
  framework_path: a-sdlc/         # Relative path to submodule
  framework_repo: https://github.com/jvanheerikhuize/a-sdlc

  # Controls to skip (requires justification — subject to audit)
  skipped_controls: []
  # Example:
  # skipped_controls:
  #   - id: SC-15
  #     reason: "No AI/ML model in scope for this release"
  #     approved_by: ""
  #     approved_date: ""

  # Artifact retention (inherited from DORA Art. 8(6) unless overridden)
  artifact_retention_years: 7

# ── Feature Tracking ─────────────────────────────────────────────────────────
features:
  id_prefix: FEAT                  # Prefix for feature specification IDs
  next_id: 9                       # Increment after each new feature spec is created
  cr_prefix: CR                    # Prefix for change request IDs
  next_cr_id: 9                    # Increment after each new change request

# ── Paths ────────────────────────────────────────────────────────────────────
paths:
  specs: specs/
  stages: stages/
  governance: a-sdlc/
