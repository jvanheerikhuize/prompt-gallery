# =============================================================================
# Role Ingestion — Process Entrypoint
# =============================================================================
# Read this file to add a new role to the module.
# An agent executing ingestion should read this file first, then follow the
# PROCESS steps in order. Everything needed — inputs, output specs, file
# templates, and validation — is defined here.
# =============================================================================

version: "1.0"

# ── Invoke ────────────────────────────────────────────────────────────────────
# To start role ingestion, run from the repository root:
#
#   ./src/ingest.sh
#
# Or paste the following into any AI coding agent manually:
#
#   Read src/ingest.yaml and execute the role ingestion process from STEP-01.
#   Guide me through each step, pause at COLLECT and REVIEW, and do not
#   proceed until I confirm.
# =============================================================================

# ── Process ───────────────────────────────────────────────────────────────────

process:

  - id: STEP-01
    name: COLLECT
    type: human_gate
    description: >
      Collect all required inputs defined in the `inputs` block below by asking
      for each field ONE AT A TIME in the order listed. For each field:
        1. Show the field name and a short description of what it is.
        2. Show the example or allowed values from the inputs spec.
        3. Wait for the user's answer before moving to the next field.
      Do not bundle multiple fields into a single prompt.
      Do not proceed to STEP-02 until every required field has a confirmed value.
      Derived values (acronym, id, slug) are generated in STEP-02 — do not ask the user for them.

      Field order:
        1. concept        — show the example from the inputs spec
        2. category       — list the allowed values
        3. target_user    — show the example from the inputs spec
        4. persona.tone   — list allowed values; ask for one
        5. persona.humor  — list allowed values; ask for one
        6. persona.verbosity — list allowed values; ask for one
        7. persona.voice  — describe what is expected and give a brief example
        8. constraints    — go through each sub-field one by one, show its description,
                            and ask the user to answer true/false (or provide the value
                            for language_requirements and scope_limits)

  - id: STEP-02
    name: DESIGN
    type: agent
    description: >
      Using the collected inputs, derive: acronym, full name, id, slug, category path,
      and governance tier. Confirm:
        - id is unique in index.yaml
        - slug is unique across all directories in roles/
      Present a brief design summary to the user and wait for confirmation before writing.

  - id: STEP-03
    name: WRITE_PROMPT
    type: agent
    description: >
      Write roles/<category>/<slug>/prompt.md using the `outputs.prompt_md` spec.
      The prompt must use the XML/MVC structure (<MASTER_PROMPT> → <CORE_DIRECTIVES>,
      <VIEW>, <CONTROLLER>). Include conditional blocks as specified in the output spec.

  - id: STEP-04
    name: COMPILE_SEMANTICODE
    type: agent
    description: >
      Compile roles/<category>/<slug>/prompt-semanticode.md from the canonical prompt.
      Use LOSSLESS mode (≥35% token reduction). Follow the SemantiCode v1.0 grammar
      defined in `outputs.semanticode_md`. Target: fully executable by any advanced LLM.

  - id: STEP-06
    name: WRITE_README
    type: agent
    description: >
      Write roles/<category>/<slug>/README.md using the `outputs.role_readme` spec.
      All sections are required. Usage examples must be concrete and runnable.
      The Files table must list only files that exist on disk.

  - id: STEP-07
    name: REGISTER
    type: agent
    description: >
      Append a new role entry to index.yaml following the `outputs.index_entry` schema.
      Insert under the correct category comment block.
      Increment nothing — there is no counter to manage.

  - id: STEP-08
    name: UPDATE_README
    type: agent
    description: >
      Add a new row to the role table in README.md under the correct category section.
      Follow the `outputs.readme_update` row format.

  - id: STEP-09
    name: VALIDATE
    type: agent
    description: >
      Run all checks in the `validation` block. Report pass/fail for each.
      Do not proceed to STEP-10 if any check fails — fix and re-validate.

  - id: STEP-10
    name: REVIEW
    type: human_gate
    description: >
      Present the user with a summary of all produced files and their locations.
      List the index.yaml entry and README.md row that were added.
      Wait for explicit user approval before committing.

  - id: STEP-11
    name: COMMIT
    type: agent
    description: >
      Stage all new and modified files. Commit with message:
        feat(<slug>): introduce [ACRONYM] — [short description] — [category] masterprompt v1.0
      Push to remote.

# ── Inputs ────────────────────────────────────────────────────────────────────

inputs:
  required:

    - id: concept
      description: "What the role does — its primary function and purpose"
      example: "A negotiation coach grounded in Harvard principled negotiation"

    - id: category
      description: "Which category this role belongs to"
      allowed: [entertainment, engineering, health, education, utility, productivity]

    - id: target_user
      description: "Who will interact with this role and in what context"
      example: "Product managers preparing for vendor negotiation sessions"

    - id: persona
      fields:
        tone:
          allowed: [formal, casual, warm, direct, clinical, playful]
        humor:
          allowed: [none, dry, sarcastic, dark, witty]
        verbosity:
          allowed: [concise, balanced, detailed]
        voice:
          type: free_text
          description: "Character and voice — what makes this persona distinctive"

    - id: constraints
      description: "Check each for applicability and set true/false"
      fields:
        gdpr_special_category:
          description: "Handles mental health, biometric, health, or political data (GDPR Art. 9)"
        minors_involved:
          description: "Target users may be under 18"
        crisis_risk:
          description: "Role may surface crisis disclosures (suicidal ideation, DV, abuse)"
        language_requirements:
          description: "Non-English primary output required"
          example: "Dutch output for VWO students"
        scope_limits:
          description: "Explicit boundaries this role must not cross"
          example: "Phase 1 stabilisation only — no trauma processing"

  generated:
    # Derived by the agent in STEP-02 — not collected from the user.

    - id: acronym
      rule: >
        Choose a memorable, role-appropriate acronym where each letter maps to a word
        in the full expanded name. Format in prompts and docs: ACRONYM — Full Expanded Name.
        Verify the resulting id is not already taken in index.yaml.

    - id: id
      rule: >
        Lowercase acronym letters only, no punctuation. Must be unique in index.yaml.
        Examples: tag, mentor, frank, vita.

    - id: slug
      rule: >
        Lowercase, hyphenated, descriptive of the role function — not the acronym.
        Must be unique across all existing directories under roles/.
        Examples: negotiation-coach, study-coach, trauma-psychologist.

# ── Outputs ───────────────────────────────────────────────────────────────────

outputs:

  prompt_md:
    path: "roles/<category>/<slug>/prompt.md"
    description: "Canonical masterprompt. Full-length, maximally readable, uncompressed."
    template_file: "src/templates/prompt.md"
    template_note: >
      Use src/templates/prompt.md as the structural baseline. Replace all {{PLACEHOLDER}}
      tokens with role-specific content. Remove optional blocks that do not apply.
      The file contains inline comments explaining each section and placeholder.
    structure:
      mvc_sections:
        - name: CORE_DIRECTIVES
          contains: [PERSONA, RULES, CONSTRAINTS, LANGUAGE_DETECTION]
          required: true
        - name: VIEW
          contains: "Output format, response templates, display rules"
          required: true
        - name: CONTROLLER
          contains: "Session lifecycle, state machine, command parsing, error handling"
          required: true
      prohibitions:
        - "Do NOT append a SCRIBE_META block or any trailing metadata section inside or after the code block"
        - "All prompt content must be inside a single fenced code block opened with ```text and closed with ```"
        - "No content may appear after the closing ``` of the code block"

      default_blocks:
        - block: LANGUAGE_DETECTION
          always: true
          note: >
            Always include in CORE_DIRECTIVES. Detect user's written language from their
            first message; respond in that language for all output. If uncertain or mixed,
            ask before proceeding: "Which language feels most natural to you?"
            Override with LANGUAGE_DIRECTIVE when constraints.language_requirements is set.

      conditional_blocks:
        - block: HUMOR_PROTOCOL
          when: "persona.humor != none"
          note: "Define activation conditions, scope (concepts/situations, never the user), and suspension triggers"
        - block: CRISIS_PROTOCOL
          when: "constraints.crisis_risk is true"
          note: "Mandatory detection keywords, tiered response levels, crisis line numbers (placeholder), safe-messaging rules"
        - block: GDPR_DISCLOSURE
          when: "constraints.gdpr_special_category is true"
          note: "Session-start disclosure statement, Art. 9(1) reference, data minimisation commitment"
        - block: SCOPE_LIMITS
          when: "constraints.scope_limits is set"
          note: "Explicit list of what this role will NOT do, with redirect behaviour"
        - block: LANGUAGE_DIRECTIVE
          when: "constraints.language_requirements is set"
          note: "Default output language and mirror/switch rules"

  semanticode_md:
    path: "roles/<category>/<slug>/prompt-semanticode.md"
    description: "LOSSLESS SemantiCode variant. ≥35% token reduction. Always produced."
    mode: LOSSLESS
    template_file: "src/templates/prompt-semanticode.md"
    template_note: >
      Use src/templates/prompt-semanticode.md as the structural baseline. Replace all
      {{PLACEHOLDER}} tokens with compressed role-specific content. The [M]/[V]/[C] section
      line numbers (@LXX) must reflect actual line positions in the produced file.
    prohibitions:
      - "Do NOT append a SCRIBE_META block, --- separator, or any trailing metadata inside or after the code block"
      - "All SemantiCode content must be inside a single fenced code block opened with ``` and closed with ```"
      - "No content may appear after the closing ``` of the code block"

    grammar_reference:
      sections: "[M] model  [V] view  [C] ctrl"
      behaviour: "BHV:+must  BHV:!prohibit  BHV:~prefer"
      constraint: "CNST:<rule>"
      output: "OUT:<type>:<format>"
      conditional: "IF <cond>:THEN <act>:ELSE <act>"
      error: "ON_ERR:<condition>:<response>"
      gate: "GATE:<condition>:pass|fail"
      define: "DEF:<tag>:<value>"
      reference: "REF:<tag>"

  role_readme:
    path: "roles/<category>/<slug>/README.md"
    description: "Per-role human documentation."
    template_file: "src/templates/README.md"
    template_note: >
      Use src/templates/README.md as the structural baseline. Replace all {{PLACEHOLDER}}
      tokens with role-specific content. The Safety Notes section is commented out in the
      template — uncomment and complete it when constraints.crisis_risk or
      constraints.gdpr_special_category is true. Remove the comment block entirely otherwise.
    required_sections: [title, metadata, overview, quick_start, usage_examples, api_framework, files]
    conditional_sections:
      - name: safety_notes
        required_when: "constraints.crisis_risk is true OR constraints.gdpr_special_category is true"

  index_entry:
    file: index.yaml
    action: "Append to roles list under the correct category comment block"
    required_fields:
      - id
      - name
      - slug
      - category
      - version           # "1.0"
      - status            # "stable"
      - files.prompt
      - files.variant     # always null — no optimized or compressed variants are produced
      - files.semanticode
      - description       # 3-5 sentences, same content as README overview paragraph 1
      - tags              # minimum 4, drawn from category + key role attributes
      - usage.paste_in    # true
      - usage.system_prompt  # true
      - usage.auto_init   # true if role initialises without user input, false if it waits
      - governance.risk_tier
      - governance.ai_tier
      - governance.data_classification
      - governance.gdpr_special_category
      - provenance.author
      - provenance.created
      - provenance.last_updated
    conditional_fields:
      - field: safety_notes
        when: "constraints.crisis_risk or constraints.gdpr_special_category"
      - field: governance.eu_ai_act_tier
        when: "governance role or risk_tier is medium or high"
      - field: governance.minors_involved
        when: "constraints.minors_involved is true"

  readme_update:
    file: README.md
    action: "Add one row to the role table under the correct category heading"
    row_format: "| [name] | [prompt link] | [one-line description] |"
    health_row_format: "| [name] | [prompt link] | [description] | ⚠️ See safety notes |"
    link_format: "[prompt](roles/<category>/<slug>/prompt.md)"

# ── Validation ────────────────────────────────────────────────────────────────
# Run all checks after STEP-08 and before STEP-10. Fix any failures before presenting to user.

validation:

  - id: V-01
    check: "Role id is unique in index.yaml — no existing entry has the same id"

  - id: V-02
    check: "Slug matches the actual directory name created under roles/<category>/"

  - id: V-03
    check: "All file paths declared in index.yaml files block exist on disk"

  - id: V-04
    check: "Files table in role README.md lists only files that exist on disk — no broken links"

  - id: V-05
    check: "README.md role table contains a new row for this role under the correct category section"

  - id: V-06
    check: "Roles with crisis_risk=true contain CRISIS_PROTOCOL in prompt.md AND safety_notes in index.yaml AND a Safety Notes section in README.md"

  - id: V-07
    check: "Roles with gdpr_special_category=true contain GDPR_DISCLOSURE in prompt.md"

  - id: V-08
    check: "Roles with minors_involved=true have governance.minors_involved: true in index.yaml"

  - id: V-09
    check: "prompt-semanticode.md header has: correct source path, mode LOSSLESS, Grammar: SemantiCode v1.0"

  - id: V-10
    check: "No FEAT-ID, SDLC, or governance framework references appear in any produced file"

  - id: V-11
    check: "Role README.md metadata line has no governance/FEAT reference (Version + Category only)"

  - id: V-12
    check: "index.yaml entry description matches the first paragraph of the role README.md Overview section"

  - id: V-13
    check: "No SCRIBE_META block appears anywhere in any produced file — prompt.md or prompt-semanticode.md"

  - id: V-14
    check: "prompt.md contains exactly one fenced code block opened with ```text and closed with ``` — all prompt XML is inside it, nothing after the closing ```"

  - id: V-15
    check: "prompt-semanticode.md contains exactly one fenced code block opened with ``` and closed with ``` — all SemantiCode content is inside it, nothing after the closing ```"

  - id: V-16
    check: "No prompt-optimized.md or prompt-compressed.md file was created — these variants are permanently retired; files.variant in index.yaml must be null"

  - id: V-17
    check: >
      prompt.md contains a LANGUAGE_DETECTION block inside CORE_DIRECTIVES — unless
      constraints.language_requirements is set (in which case LANGUAGE_DIRECTIVE takes
      precedence and LANGUAGE_DETECTION may be omitted). S.C.O.U.T. is the canonical
      exception: Dutch-only output, no detection.
